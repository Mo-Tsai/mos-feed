<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f1ea; --bg-elevated: #ede9e1;
    --text: #1c1a17; --text-secondary: #5e5b56;
    --text-tertiary: #8a8680; --divider: #ddd9d1;
    --noise-opacity: 0.035;
  }
  [data-theme="dark"] {
    --bg: #0f0e0c; --bg-elevated: #161410;
    --text: #e8e4dc; --text-secondary: #9a9691;
    --text-tertiary: #6a6663; --divider: #2e2a24;
    --noise-opacity: 0.06;
  }
  body {
    background: var(--bg); -webkit-font-smoothing: antialiased;
    font-family: Georgia, 'Times New Roman', serif;
    transition: background 0.4s ease, color 0.4s ease; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    opacity: var(--noise-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 180px 180px;
  }
  #root { position: relative; z-index: 1; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInOut {
    0% { opacity: 0; }
    15% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 4px; }
  .masthead-title { font-family: Georgia, serif; font-weight: 400; font-style: italic; letter-spacing: -0.02em; color: var(--text); line-height: 1; }
  .tab-nav { display: flex; align-items: baseline; gap: 28px; padding: 0 32px; }
  .tab-nav button { background: none; border: none; cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: Georgia, serif; transition: all 0.3s ease; padding: 0; line-height: 1.2; }
  .sub-pill { background: none; border: none; cursor: pointer; font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 0; transition: all 0.2s ease; border-bottom: 1px solid transparent; }
  .swipe-area { position: relative; overflow-y: auto; overflow-x: hidden; touch-action: pan-y; -webkit-overflow-scrolling: touch; }
  .card-slide { position: absolute; inset: 0; padding: 16px 32px 80px; display: flex; flex-direction: column; justify-content: flex-start; transition: transform 0.3s ease, opacity 0.3s ease; will-change: transform, opacity; overflow-y: auto; }
  .expand-row { display: flex; align-items: center; gap: 20px; margin-top: 18px; }
  .source-link { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.1em; text-decoration: none; border-bottom: 1px solid var(--divider); padding-bottom: 1px; transition: all 0.2s ease; color: var(--text-tertiary); }
  .source-link:hover { color: var(--text-secondary); border-color: var(--text-secondary); }
  .end-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; height: 100%; }
  .end-btn { padding: 12px 28px; background: none; border: 1px solid var(--divider); color: var(--text-tertiary); font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.25s ease; }
  .end-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
  .progress-bar { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.14em; color: var(--text-tertiary); text-transform: uppercase; }
  .theme-toggle { position: fixed; top: 28px; right: 12px; z-index: 100; background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text-tertiary); padding: 4px; line-height: 1; transition: color 0.3s ease; font-family: 'Courier New', monospace; }
  .theme-toggle:hover { color: var(--text-secondary); }
  .rule { height: 1px; background: var(--divider); }
  .running-header { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); }
  .word-popup { position: fixed; z-index: 200; background: var(--bg-elevated); border: 1px solid var(--divider); border-radius: 8px; padding: 12px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); min-width: 120px; max-width: 260px; }
  .word-popup-word { font-family: Georgia, serif; font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .word-popup-trans { font-family: system-ui, -apple-system, 'PingFang TC', sans-serif; font-size: 14px; color: var(--text-secondary); line-height: 1.6; font-weight: 300; }
  .speak-btn { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text-tertiary); padding: 2px; transition: color 0.2s; line-height: 1; }
  .speak-btn:hover { color: var(--text-secondary); }
  .speak-btn.active { color: var(--text); }
  .clickable-word { cursor: pointer; border-radius: 2px; transition: background 0.15s; }
  .clickable-word:hover { background: var(--bg-elevated); }
  [data-theme="dark"] .word-popup { box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .az-input { width:100%; background:var(--bg); border:1px solid var(--divider); color:var(--text); padding:7px 10px; font-family:'Courier New',monospace; font-size:11px; outline:none; -webkit-appearance:none; appearance:none; border-radius:0; }
  .az-input:focus { border-color:var(--text-secondary); }
  .nav-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:680px; display:flex; justify-content:space-between; align-items:center; padding:10px 24px 14px; background:var(--bg); border-top:1px solid var(--divider); z-index:50; }
  .nav-btn { background:none; border:1px solid var(--divider); color:var(--text-secondary); font-family:'Courier New',monospace; font-size:16px; cursor:pointer; padding:10px 22px; transition:all 0.2s ease; -webkit-tap-highlight-color:transparent; line-height:1; }
  .nav-btn:hover { border-color:var(--text-secondary); color:var(--text); }
  .nav-btn:active { background:var(--bg-elevated); }
  .nav-btn:disabled { opacity:0.25; cursor:default; border-color:var(--divider); color:var(--text-tertiary); }
  .nav-count { font-family:'Courier New',monospace; font-size:10px; letter-spacing:0.14em; color:var(--text-tertiary); text-transform:uppercase; }
</style>

const { useState, useMemo } = React;

// ===== AZURE TTS =====
let _azToken = null, _azTokenExp = 0, _azAbort = null;
function _xmlEsc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
async function _getAzToken(key, region, signal) {
  const now = Date.now();
  if (_azToken && now < _azTokenExp) return _azToken;
  const res = await fetch(`https://${region}.api.cognitive.microsoft.com/sts/v1.0/issueToken`, { method:'POST', headers:{'Ocp-Apim-Subscription-Key':key}, signal });
  if (!res.ok) throw new Error('Token ' + res.status);
  _azToken = await res.text();
  _azTokenExp = now + 9*60*1000;
  return _azToken;
}
function azureStop() { if (_azAbort) { _azAbort.abort(); _azAbort = null; } }
async function azureSpeak(text, { rate='0%', onStart, onEnd, onError }={}) {
  const key = localStorage.getItem('mf_azureKey') || '';
  const region = localStorage.getItem('mf_azureRegion') || 'eastus';
  const voice = localStorage.getItem('mf_azureVoice') || 'en-US-AriaNeural';
  if (!key) return false;
  azureStop();
  const ctrl = new AbortController(); _azAbort = ctrl;
  try {
    const token = await _getAzToken(key, region, ctrl.signal);
    const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='en-US'><voice name='${voice}'><prosody rate='${rate}'>${_xmlEsc(text)}</prosody></voice></speak>`;
    const res = await fetch(`https://${region}.tts.speech.microsoft.com/cognitiveservices/v1`, {
      method:'POST', signal:ctrl.signal,
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/ssml+xml','X-Microsoft-OutputFormat':'audio-16khz-128kbitrate-mono-mp3'},
      body:ssml
    });
    if (!res.ok) throw new Error('TTS ' + res.status);
    const blob = await res.blob();
    if (ctrl.signal.aborted) return true;
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    if (onStart) onStart(audio);
    audio.onended = () => { URL.revokeObjectURL(url); if (onEnd) onEnd(); };
    audio.onerror = () => { URL.revokeObjectURL(url); if (onError) onError(); };
    await audio.play();
    return true;
  } catch(e) {
    if (e.name === 'AbortError') return true;
    _azToken = null;
    if (onError) onError(e);
    return false;
  }
}

const NAVAL_CARDS = [
  { id:"n1", channel:"Naval", tag:"財富", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Every hour you sell, you lose twice. Once for the hour itself — and once for the leverage that hour could have built. Renting time is not income. It's a slow exit.", zh:"你每賣出一個小時，就輸了兩次：一次是那個小時本身，一次是那個小時原本能建立的槓桿。用時間換錢不叫收入，叫做慢慢離場。", ja:"一時間を売るたびに、二度負ける——その一時間そのものと、その一時間が本来生み出せたレバレッジだ。時間をお金に換えることは収入ではない。ゆっくりと退場しているだけだ。" },
  { id:"n2", channel:"Naval", tag:"槓桿", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Code and media don't sleep. They don't ask for raises. They don't need to be convinced. Build something once — and let it work while you're not watching. This is the only leverage that requires no permission.", zh:"程式碼和媒體不需要睡覺，不會要求加薪，不需要被說服。做一次，然後讓它在你不看的時候繼續運轉。這是唯一不需要任何人許可的槓桿。", ja:"コードとメディアは眠らない。昇給を求めない。説得する必要もない。一度つくれば、あとは見ていなくても回り続ける。これが誰の許可も要らない唯一のレバレッジだ。" },
  { id:"n3", channel:"Naval", tag:"獨特知識", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"If your job can be described in a training manual, you can be replaced by someone cheaper — or eventually, by software. Specific knowledge isn't a skill you learn. It's something you discover by following what genuinely fascinates you, even when it makes no obvious financial sense.", zh:"如果你的工作可以被寫進教學手冊，你就可以被更便宜的人取代——或遲早被軟體取代。獨特知識不是你學來的技能，而是你在跟隨真正讓你著迷的事物時，自然發現的東西。", ja:"もし君の仕事がマニュアルに書けるなら、もっと安い人間に——やがてはソフトウェアに置き換えられる。独自の知識とは学んだスキルではない。本当に心を奪われるものを追いかける中で、自然と見つかるものだ。" },
  { id:"n4", channel:"Naval", tag:"幸福", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Desire is borrowed unhappiness. Each one is a quiet announcement that you're not enough right now. The mind that is always reaching for the next thing never actually arrives anywhere. Happiness isn't achieved — it's what's left when you stop manufacturing reasons to be miserable.", zh:"欲望是預支的痛苦。每一個欲望都在悄悄宣告：你現在還不夠好。一個永遠在伸手抓下一件事的心，其實從未真正抵達任何地方。幸福不是追求來的——而是當你停止製造痛苦理由之後，剩下的東西。", ja:"欲望とは痛みの前借りだ。すべての欲望がひそかにこう宣言している——今の自分ではまだ足りない、と。次の何かに手を伸ばし続ける心は、実はどこにもたどり着いていない。幸福は追い求めるものではない——苦しみの理由をつくるのをやめたとき、そこに残るものだ。" },
  { id:"n5", channel:"Naval", tag:"長期賽局", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Short-term thinkers optimize for the deal. Long-term thinkers optimize for the relationship. The compounding that matters most isn't financial — it's the trust built over years with people who are also playing for keeps.", zh:"短期思維的人為這筆交易而優化，長期思維的人為這段關係而優化。最重要的複利不是財務上的——而是多年來與同樣在認真玩長期遊戲的人，一點一點累積起來的信任。", ja:"短期思考の人はその取引を最適化し、長期思考の人はその関係を最適化する。最も重要な複利は財務的なものではない——長期のゲームを本気でプレイしている人たちと、何年もかけて少しずつ積み上げてきた信頼だ。" },
  { id:"n6", channel:"Naval", tag:"清晰思考", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Your identity is the cage you can't see. Every strong opinion about who you are makes it harder to see who you could become. The clearest thinkers hold their self-concept loosely — willing to be wrong about themselves.", zh:"你的身份認同是你看不見的牢籠。每一個關於「我是這種人」的強烈想法，都讓你更難看清你可以成為什麼。想得最清楚的人，對自我概念的抓握都很輕——他們願意對自己也犯錯。", ja:"アイデンティティは目に見えない檻だ。「自分はこういう人間だ」という強い思い込みの一つひとつが、自分が何になれるかを見えなくしている。最も明晰に考える人たちは、自己概念を軽く握っている——自分についても間違えることを許せる人たちだ。" },
  { id:"n7", channel:"Naval", tag:"責任感", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Put your name on your work. If you won't sign it, you probably shouldn't be doing it. The people who build real reputation take public accountability for outcomes — not just credit when things go well, but ownership when they don't.", zh:"把你的名字放在你的作品上。如果你不敢簽名，你可能就不該做這件事。真正建立名聲的人，對結果承擔公開責任——不只是在事情順利時領功，而是在事情不順時認下來。", ja:"自分の名前を作品に刻め。署名する勇気がないなら、それはやるべきことではないのかもしれない。本当に信用を築く人間は、結果に対して公に責任を負う——うまくいったときだけ手柄を取るのではなく、うまくいかなかったときにも引き受ける。" },
  { id:"n8", channel:"Naval", tag:"閱讀", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Read to understand principles, not to collect facts. Physics, mathematics, philosophy, economics — these are the operating systems of the world. Everything else is just an app running on top of them.", zh:"閱讀是為了理解原則，不是為了收集事實。物理、數學、哲學、經濟學——這些是世界的作業系統，其他所有東西不過是跑在上面的應用程式。", ja:"読書は原理を理解するためにある。事実を集めるためではない。物理学、数学、哲学、経済学——これらは世界のOSだ。他のすべては、その上で動くアプリケーションに過ぎない。" },
  { id:"n9", channel:"Naval", tag:"退休", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Retirement isn't an age or an account balance. It's the moment when what you do and what you love to do are the same thing. Most people never get there because they never stopped to ask what they actually want.", zh:"退休不是一個年紀或一個帳戶數字。退休是你做的事和你想做的事變成同一件事的那一刻。大多數人永遠到不了那裡，因為他們從未停下來問自己真正想要什麼。", ja:"引退とは年齢でも口座の数字でもない。やっていることと、やりたいことが同じになった瞬間——それが引退だ。ほとんどの人がそこにたどり着けないのは、自分が本当に何を望んでいるか、立ち止まって問うことがないからだ。" },
  { id:"n10", channel:"Naval", tag:"決策", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Most decisions are reversible. Treat them like experiments, not commitments. The few that aren't reversible — choose slowly, choose carefully. The asymmetry between these two types is where most people get it wrong.", zh:"大多數決定都是可逆的，把它們當成實驗而不是承諾。少數真正不可逆的決定——慢慢選，仔細選。這兩種決定之間的不對稱性，正是大多數人搞錯的地方。", ja:"ほとんどの決断はやり直せる。コミットメントではなく実験として扱え。本当にやり直せない少数の決断は——ゆっくり選べ、慎重に選べ。この二つの非対称性こそ、大半の人が見誤っているところだ。" },
];

const ELON_CARDS = [
  { id:"e1", channel:"Elon", tag:"第一原理", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"Analogy is how you copy. First principles is how you invent. When everyone else in the rocket industry was buying components, Musk asked: what is a rocket actually made of? Steel, fuel, electronics. He bought the raw materials and built it himself for 2% of the market price.", zh:"類比是你複製的方式，第一原理是你發明的方式。當火箭產業所有人都在買零件時，Musk 問的是：火箭究竟是由什麼組成的？鋼、燃料、電子元件。他直接買原料自己組裝，成本是市價的 2%。", ja:"アナロジーはコピーの方法、第一原理は発明の方法だ。ロケット業界の全員が部品を買っていた時、Muskが問うたのは「ロケットは結局何でできているのか？」——鉄鋼、燃料、電子部品。彼は原材料を直接買い付け、自分で組み立てた。コストは市場価格の2%。" },
  { id:"e2", channel:"Elon", tag:"The Algorithm", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"Step one: question every requirement. Most requirements are wrong — especially ones handed down without explanation. Step two: delete. The best part is the part you don't have to build. Step three: only then simplify. Automating a broken process makes it fail faster.", zh:"第一步：質疑每一個需求，大多數需求都是錯的——尤其是那些沒有解釋就傳下來的。第二步：刪除。最好的部分是你根本不需要做的部分。第三步：才開始簡化。把一個壞掉的流程自動化，只會讓它壞得更快。", ja:"第一ステップ：すべての要件を疑え。大半の要件は間違っている——特に説明なしに降りてきたものは。第二ステップ：削除しろ。最高のパーツは、そもそもやらなくていいパーツだ。第三ステップ：そこからやっと簡素化に入れ。壊れたプロセスを自動化しても、壊れるスピードが上がるだけだ。" },
  { id:"e3", channel:"Elon", tag:"失敗", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"SpaceX's first three rockets exploded. After the third failure, they had enough money for exactly one more attempt. That fourth launch succeeded. If Musk had treated failure as a verdict rather than data, the company would have died with the third rocket.", zh:"SpaceX 前三枚火箭全部爆炸。第三次失敗後，他們剩下的錢只夠再試一次。第四次成功了。如果 Musk 把失敗當成判決而不是數據，這家公司就會跟著第三枚火箭一起消失。", ja:"SpaceXの最初の3機のロケットはすべて爆発した。3回目の失敗後、残された資金はあと1回分だけ。4回目で成功した。もしMuskが失敗を「判決」ではなく「データ」として扱わなかったら、この会社は3機目のロケットと一緒に消えていた。" },
  { id:"e4", channel:"Elon", tag:"使命", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"The goal doesn't have to be achievable to be worth pursuing. The goal of becoming a multi-planetary species might take 200 years. That doesn't make it less real. Direction matters more than arrival — it determines every decision made along the way.", zh:"一個目標不需要在你有生之年達成，才值得追求。讓人類成為多星球物種可能需要 200 年。這不讓這個目標變得不真實。方向比抵達更重要——它決定了沿途每一個決策。", ja:"ある目標は、自分の生きているうちに達成できなくても、追求する価値がある。人類をマルチプラネタリー種にするには200年かかるかもしれない。だからといって、この目標が非現実的になるわけではない。到達よりも方向が重要だ——それが道中のあらゆる意思決定を決める。" },
  { id:"e5", channel:"Elon", tag:"產品設計", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"If a user needs a tutorial, you've already lost. The best interfaces are so obvious they feel inevitable — like the user designed them themselves. Complexity is always the designer's failure, never the user's problem.", zh:"如果使用者需要教學，你就已經輸了。最好的介面清楚到感覺理所當然——像是使用者自己設計的。複雜永遠是設計師的失敗，從來不是使用者的問題。", ja:"ユーザーにチュートリアルが必要な時点で、もう負けている。最高のインターフェースは、当たり前に感じるほど明快だ——まるでユーザー自身がデザインしたかのように。複雑さは常にデザイナーの失敗であり、決してユーザーの問題ではない。" },
  { id:"e6", channel:"Elon", tag:"人才", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"A single brilliant engineer is worth a hundred average ones — not because they work harder, but because they see problems differently and solutions more clearly. The most expensive thing in a company is not talent. It's the wrong talent in the wrong role.", zh:"一個真正出色的工程師抵得上一百個普通的——不是因為他們更努力，而是因為他們對問題的理解不同，對解法的看法更清晰。一家公司最昂貴的不是人才，而是放錯位置的人才。", ja:"本当に優れたエンジニア一人は、凡庸なエンジニア百人に匹敵する——より努力するからではなく、問題の理解が違い、解法の見え方がまるで違うからだ。企業にとって最もコストが高いのは人材ではない。配置を間違えた人材だ。" },
  { id:"e7", channel:"Elon", tag:"速度", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"Move at a pace that feels slightly irresponsible. If it feels safe, you're probably moving too slowly. The risks of going too fast are recoverable. The risk of moving too slowly — in a competitive world — often isn't.", zh:"以一種感覺稍微不負責任的速度前進。如果感覺安全，你可能移動得太慢了。走太快的風險通常可以挽回。在競爭激烈的世界裡，走太慢的風險往往不行。", ja:"少し無責任に感じるくらいのスピードで進め。安全だと感じるなら、おそらく遅すぎる。速すぎるリスクは大抵リカバリーできる。競争の激しい世界では、遅すぎるリスクはたいていリカバリーできない。" },
  { id:"e8", channel:"Elon", tag:"10倍思維", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"10% improvement gets you incremental progress. 10x improvement requires rethinking the entire approach from scratch. Most people never attempt 10x because they assume it requires 10x the resources. It doesn't. It requires 10x the thinking.", zh:"改善 10% 讓你漸進式進步。改善 10 倍要求你從頭重新思考整個方法。大多數人從未嘗試 10 倍，因為他們假設這需要 10 倍的資源。不需要。它需要的是 10 倍的思考。", ja:"10%の改善はインクリメンタルな進歩をもたらす。10倍の改善はアプローチ全体をゼロから考え直すことを要求する。ほとんどの人が10倍を試みないのは、10倍のリソースが必要だと思い込んでいるからだ。違う。必要なのは10倍の思考だ。" },
  { id:"e9", channel:"Elon", tag:"現場主義", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"The problem is always at the product. Not in the boardroom. Not in the spreadsheet. The people making decisions from a distance are always the last to understand what's actually wrong — and the last to fix it.", zh:"問題永遠在產品現場，不在董事會，不在試算表裡。從遠處做決策的人永遠是最後一個理解哪裡出了問題的——也永遠是最後一個修好它的。", ja:"問題は常に製品の現場にある。会議室にも、スプレッドシートの中にもない。遠くから意思決定する人間は、何が壊れているかを最後に理解し——そして最後に直す人間だ。" },
  { id:"e10", channel:"Elon", tag:"Plan B", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"Having a Plan B means you'll use it. The moment you allocate mental space to the exit, you've already started leaving. Commitment isn't stubbornness — it's the refusal to let doubt consume the energy that execution needs.", zh:"有 B 計劃意味著你會用到它。你一旦給退路留了心理空間，就已經開始離開了。承諾不是固執，而是拒絕讓懷疑消耗掉執行所需要的能量。", ja:"プランBがあるということは、それを使うということだ。退路に心理的スペースを与えた瞬間、すでに離れ始めている。コミットメントは頑固さではない——疑念に、実行に必要なエネルギーを食い潰させることを拒否することだ。" },
];

const YOUTUBE_CARDS = [
  { id:"yt1", channel:"Dan Koe", tag:"創意者協護", color:"#4A9E96", url:"https://www.notion.so/3438ba4c0633816ca8bfec4a33fedc9b", en:"Creativity is a state of consciousness, not a skill — and it can be cultivated or destroyed. Constant surface stimulation (notifications, short videos, email) consumes cognitive bandwidth and prevents deep thought. Real boredom is the birthplace of creativity: phone-free walks, stream-of-consciousness journaling, sitting with nothing. A meaningful project is the container that gives wandering thoughts a place to land. Dangerous creativity means expressing your genuine perspective — not safe, neutral takes.", zh:"創意不是技術，是一種意識狀態——可以被培養，也可以被摧毀。通知、短影音、隨時查郵件，這些消耗的不是時間，是深層思考的入口。真正的「無聊」才是創意的溫床：不帶手機散步、意識流手寫、什麼設備也不帶地坐著。有意義的專案是容器——漫遊的思維需要一個能降落的地方。危险的創意者不是「怪」，而是敢說真實的觀點，而不是永遠保持安全的中立。", ja:"創造力は技術ではなく意識の状態だ——育てることも壊すこともできる。通知・短い動画・絶え間ないメール確認が認知帯域を奪い深い思考への入り口を塞ぐ。本当の「退屈」こそが創造性の温床だ：スマホなしの散歩・意識の流れのままに書く・何の機器もなくただ座る。意味のあるプロジェクトが容器となりさまよう思考が着地できる場所を与える。危険なクリエイターとは安全で中立な意見に逃げず自分の本物の視点を表現できる人だ。" },
  { id:"yt2", channel:"Dan Koe", tag:"五維思考", color:"#4A9E96", url:"https://www.notion.so/33e8ba4c06338189a2bbfc99e3710771", en:"Genius thinking isn't high IQ — it's the ability to keep exploring where others stop. Most people think in one dimension: only from their own perspective, reducing everything to their familiar domain. Dan Koe's 5 dimensions: Breadth (depth across domains), Depth (cognitive sophistication per domain), Altitude (average level across all domains), 360° View (personal/collective × inner/outer), and Time (evolutionary patterns, not memorized events). The key upgrade: shift from 'I'm right, you're wrong' (Level 1-2) to 'my model is one of many valid models' (Level 3-4).", zh:"天才思考不是高IQ，而是「在別人停下來的地方繼續探索的能力」。多數人只有一維思考——只從自己的視角出發，把所有事情都歸結到熟悉的領域。Dan Koe的五維框架：廣度（跨領域的深度數量）、深度（每個領域的認知精密度）、海拔（所有領域的平均認知水平）、四象限（個人/集體 × 內在/外在）、時間（理解歷史演化模式）。核心升級：從「我對你錯」（第1-2層）升級到「我的模型是眾多有效模型之一」（第3-4層）。", ja:"天才的思考は高いIQではなく他者が止まるところで探求し続ける能力だ。ほとんどの人は一次元思考——自分の視点からしか見ず何でも自分の得意分野に還元する。ダン・コーの5次元：幅（領域横断の深み）・深さ（各領域の認知精緻度）・高度（全領域の平均水準）・四象限（個人/集合×内面/外面）・時間（進化パターンの理解）。核心アップグレード：「自分が正しく相手が間違い」（レベル1-2）から「自分のモデルは多くの有効なモデルの一つ」（レベル3-4）へ。" },
  { id:"yt3", channel:"Dan Koe", tag:"AI護城河", color:"#4A9E96", url:"https://www.notion.so/33e8ba4c0633813b88c0df556dfa8874", en:"The information product market has entered Stage 5 maturity — brand authenticity now matters more than content quality. Business model lifecycles are compressing: info products lasted 10-15 years; the next wave may last only 2-3. The future is 'learning experiences,' not static courses — you're selling a second version of your mind. AI makes specific knowledge more valuable, not less: it can generate generic content, but can't replicate 10 years of deep curiosity in a niche. Build an AI that embodies your unique perspective.", zh:"資訊產品市場已到第五階段——品牌真實性比內容品質更重要。商業模式生命週期在壓縮：資訊產品撐了10-15年，下一個浪潮可能只有2-3年。未來是「學習體驗」，不是靜態課程——你賣的不是資訊，是你心智的第二版本。AI讓特定知識更有價值，不是更沒有：它能生成通用內容，卻複製不了你在某個領域10年深耕的品味和判斷力。把你的獨特知識做成AI，才是護城河。", ja:"情報商品市場はステージ5の成熟期に入った——ブランドの真正性が今やコンテンツの質より重要だ。ビジネスモデルのライフサイクルは圧縮されている：情報商品は10〜15年保ったが次の波はたった2〜3年かもしれない。未来は「学習体験」であり静的コースではない——あなたが売るのは情報でなくあなたの精神の第二バージョンだ。AIは固有の知識をより価値あるものにする：汎用コンテンツを生成できても10年の深い好奇心から培われた審美眼は複製できない。あなた固有の知識をAIに宿らせることが本当の濠となる。" },
  { id:"yt4", channel:"Dan Koe", tag:"個人品牌策略", color:"#4A9E96", url:"https://www.notion.so/33e8ba4c063381c5b266d9777f9d6488", en:"80% of beginner content should start with pain points (Pain → Process → Insight). Most personal brand builders quit within 90 days — simply staying consistent for a year puts you ahead of 95% of competitors. A niche isn't a topic, it's a problem set: the clearer your problem-solution narrative, the faster you attract the right audience. Your content is a sales funnel disguised as education.", zh:"80%的初學者內容應該以痛點開頭（痛點→過程→洞察）。大多數個人品牌建立者在90天內就放棄——光是堅持一年就能超越95%的競爭對手。利基不是一個話題，是一套問題集：你的問題-解決方案敘事越清晰，吸引對的受眾就越快。你的內容是偽裝成教育的銷售漏斗。", ja:"初心者コンテンツの80%は痛点から始めるべきだ（痛点→プロセス→洞察）。ほとんどの個人ブランド構築者は90日以内に諦める——ただ1年間継続するだけで競合の95%を上回る。ニッチはトピックではなく問題セットだ：問題と解決策のナラティブが明確なほど適切なオーディエンスを素早く引き寄せる。あなたのコンテンツは教育に見せかけたセールスファネルだ。" },
  { id:"yt5", channel:"Dan Koe", tag:"帶問題學習", color:"#4A9E96", url:"https://www.notion.so/33e8ba4c063381dab812ed24df6a6246", en:"The antidote to a mediocre life is multi-dimensional strength. The most powerful learning insight: bring a burning question to every piece of content you consume. Information without context is weightless — when you have a real problem and search for the answer, knowledge has an anchor. Most people learn in reverse: passive consumption, hoping something sticks. Reverse the order: start with a goal, identify what's blocking you, then find the specific knowledge that removes the block.", zh:"平庸的解藥是多維度的強壯。最強大的學習洞察：帶著一個迫切的問題去接觸每一份內容。空著手去聽答案，知識是漂浮的；帶著問題去找答案，知識是有錨點的。大多數人倒著學：被動消費，希望有什麼東西能黏住。反過來：從目標開始，找出是什麼在阻擋你，然後找能移除那個障礙的具體知識。", ja:"凡庸な人生の解毒剤は多次元的な強さだ。最も強力な学習の洞察：コンテンツを消費するとき必ず切実な問いを持ち込む。問いなしに聞いた答えは宙に浮く——本物の問題を抱えて積極的に答えを探すとき知識には錨がある。ほとんどの人は逆順で学ぶ：受動的に消費し何かが引っかかることを期待する。順番を逆にしろ：目標から始め何が邪魔をしているか特定し、そのブロックを取り除く具体的な知識を見つける。" },
  { id:"yt6", channel:"Naval Pod", tag:"極簡設計哲學", color:"#9B7FD4", url:"https://www.notion.so/3468ba4c06338176be1dd6dc215eebed", en:"The Raptor engine's evolution reveals a design principle: iterate until you can't remove any more parts. Every complex system that works well started as something simple and iterated. Product design is fundamentally about iterating until you find the simplest workable solution — you add too much, then must strip back. Elon's method: question the requirement first, eliminate parts, then optimize. And study physics — it's the shortest path to becoming a polymath because it forces you to interact with reality without illusions.", zh:"SpaceX獵鷹引擎的迭代揭示了一個設計原則：不斷改進直到再也無法移除任何零件。自然界中運作良好的複雜系統，都是某個非常簡單的東西不斷迭代的結果。產品設計的本質：先質疑需求，再消除零件，再優化。Tesla電池纖維墊——測試後發現根本沒人需要它，直接取消。學物理是成為博學者的最短路徑，因為它讓你毫不妥協地面對現實。", ja:"Raptorエンジンの進化がデザイン原則を示す：これ以上部品を取り除けないところまで反復する。うまく機能する複雑なシステムは全て単純なものが反復した結果だ。製品設計の本質：まず要件に疑問を持ち部品を除去し最適化する。テスラのバッテリー繊維マット——誰も必要としていないことが判明し廃止された。物理を学ぶことがポリマスへの最短路——現実と妥協なく向き合うことを強制するから。" },
  { id:"yt7", channel:"Naval Pod", tag:"AI理解的本質", color:"#9B7FD4", url:"https://www.notion.so/3458ba4c0633814d9f5afa38c8134664", en:"Modern LLMs are Bayesian reasoning at scale — sophisticated pattern matching, not understanding. The test of real intelligence is 'why?': genuine explanation holds up under follow-up questions. AI can produce text that sounds like physics, but keep asking 'why?' and it collapses — because it has no model of physical reality. More compute is necessary but not sufficient. What's missing is a framework that connects visible phenomena to their invisible causes. That causal mechanism is what makes human science unique.", zh:"GPT這類大型語言模型的本質是大規模的貝葉斯推理——是精密的模式匹配，不是理解。真正智慧的測試是「為什麼？」：真正的解釋能撐得住追問。AI可以生成聽起來像物理學的文字，但持續追問「為什麼」就會崩潰——因為它對物理現實沒有任何模型。算力增加是必要條件，但不是充分條件。缺少的是能把可見現象與不可見成因連結起來的知識架構——那種因果機制，才是人類科學真正獨特的地方。", ja:"現代のLLMは大規模ベイズ推論——洗練されたパターンマッチングであり理解ではない。真の知性のテストは「なぜ？」だ：本物の説明は追及問いに耐える。AIは物理学のように聞こえるテキストを生成できるが「なぜ？」を追い続けると崩壊する——物理的現実のモデルを持っていないから。計算量の増加は必要条件だが十分条件ではない。欠けているのは可視現象と不可視の原因を結びつけるフレームワークだ。その因果メカニズムこそ人間の科学を真に独自にするものだ。" },
  { id:"yt8", channel:"Naval Pod", tag:"四種運氣", color:"#9B7FD4", url:"https://www.notion.so/3458ba4c063381c8bea5fe524b9dfd3a", en:"Wealth creation is a learnable skill, not luck management. Four types of luck: 1) Random luck — uncontrollable. 2) Luck from constant hustle — keep moving, create surface area for chance. 3) Luck from preparation — deep expertise lets you recognize opportunities others miss entirely. 4) Luck from unique character — your reputation, values, and skills become a magnet that attracts the right opportunities to you. The goal: in 1,000 parallel universes, be wealthy in 999 of them.", zh:"財富創造是可以學習的技能，不是運氣管理。四種運氣：1) 盲目運氣——無法控制。2) 勤勞換來的運氣——不斷行動，創造遇見機會的表面積。3) 準備換來的運氣——在某個領域積累了高度認知的人，遇到機會時能辨識並把握。4) 獨特性格吸引來的運氣——你的聲譽、價值觀、技能讓對的機會主動找上門。目標：在1000個平行宇宙裡，在999個裡都是富有的。", ja:"富の創造は習得可能なスキルであり運の管理ではない。4種類の運：1）盲目的な運——制御できない。2）絶え間ない努力による運——動き続け機会との接触面積を広げる。3）準備による運——特定分野で高い認知を積んだ人は他者が見逃す機会を認識し掴める。4）独自の性格が引き寄せる運——評判・価値観・スキルが適切な機会を磁石のように引き寄せる。目標：1000の並行宇宙のうち999で富を持つこと。" },
  { id:"yt9", channel:"Naval Pod", tag:"理性樂觀主義", color:"#9B7FD4", url:"https://www.notion.so/3458ba4c063381cb9635da30dde162a6", en:"Pessimism is intellectually lazy. David Deutsch's core insight: all problems are fundamentally caused by a lack of knowledge, therefore progress is inevitable as knowledge grows. Famine is insufficient agricultural knowledge. Disease is insufficient medical knowledge. Poverty is insufficient economic knowledge. Pessimists get attention by predicting doom, but optimists build the future. Rational optimism isn't naive — it's the empirically supported position that problems are solvable and humans are the universal problem-solvers.", zh:"悲觀主義看似有理，實際上是懶惰。David Deutsch的核心洞察：所有問題的根源都是知識不足，因此隨著知識增長，進步是必然的。飢荒是農業知識不足，疾病是醫學知識不足，貧窮是經濟知識不足。悲觀者靠預測災難獲得關注，樂觀者建造未來。理性樂觀主義不是天真——它是有實証支持的立場：問題是可解的，而人類是通用的問題解決者。", ja:"悲観主義は賢そうに見えるが実は怠惰だ。デイヴィッド・ドイッチュの核心的洞察：すべての問題は本質的に知識の不足によって引き起こされるため知識が成長するにつれ進歩は必然だ。飢饉は農業知識の不足、疾病は医学知識の不足、貧困は経済知識の不足だ。悲観論者は破滅を予測することで注目を集めるが楽観論者は未来を作る。合理的楽観主義は無邪気ではない——問題は解決可能であり人間は普遍的な問題解決者であるという実証的に支持された立場だ。" },
  { id:"yt10", channel:"Huberman", tag:"晨間韌性訓練", color:"#3B82B8", url:"https://www.notion.so/3458ba4c0633818ca059f3a0f196fdcf", en:"Resilience is physiological and trainable, not just a mindset. Morning cortisol is your body's natural energy spike — healthy and necessary. The protocol: bright light within 30-60 min of waking + morning exercise. This amplifies the cortisol awakening response, making it sharper and more concentrated. Payoff: your adrenal budget is 'spent' in the morning, so afternoon and evening stress triggers produce lower, shorter cortisol responses. You become physiologically calmer throughout the day — not by avoiding stress, but by spending cortisol at the right time.", zh:"韌性是生理性的，可以被訓練，不只是心態問題。晨間皮質醇是身體的天然能量脈衝——健康且必要。協護：清醒後30-60分鐘內接受明亮光照 + 晨間運動，放大皮質醇覺醒反應讓它更尖銳。回報：你的腎上腺儲量在早上「結算」，下午和夜間的壓力觸發就變得更低、更短。你全天生理上會更平靜——不是因為避開壓力，而是因為在正確的時間使用了皮質醇。", ja:"回復力は生理的なものであり訓練可能だ——心構えだけでなく。朝のコルチゾールは体の自然なエネルギースパイクで健康的かつ必要なものだ。プロトコル：起床後30〜60分以内の明るい光への暴露＋朝の運動でコルチゾール覚醒反応を増幅させよりシャープに。報酬：副腎の予算が朝に「精算」されるため午後・夜間のストレストリガーによるコルチゾール反応が低く短くなる。ストレスを避けるのでなく正しい時間にコルチゾールを使うことで生理的に一日中落ち着いていられる。" },
  { id:"yt11", channel:"Huberman", tag:"NSDR深度休復", color:"#3B82B8", url:"https://www.notion.so/3448ba4c0633818aba68de1e1b3de1b1", en:"NSDR (Non-Sleep Deep Rest) beats naps in three ways: no sleep inertia, no disruption to nighttime sleep, and it actively restores dopamine in specific brain regions — explaining the motivation and focus boost afterward. You stay conscious while the brain shifts from Beta to Theta waves. 10-30 minutes is enough. It outperforms 20+ minute naps for afternoon recovery. Google CEO Sundar Pichai practices it daily. Free, zero equipment, works anywhere.", zh:"NSDR（非睡眠深度休息）在三方面勝過小睡：沒有睡眠惰性、不影響夜眠、主動恢復特定腦區的多巴胺水平——解釋了為什麼NSDR後動力和專注力明顯回升。你保持清醒，大腦從Beta波滑向Theta波。10-30分鐘就夠。下午恢復效果優於20分鐘以上的小睡。Google CEO Sundar Pichai每天實踐。免費，零設備，任何地方都能用。", ja:"NSDR（非睡眠深度休息）は3つの点で昼寝を上回る：睡眠惰性なし・夜間睡眠を妨げない・特定の脳領域のドーパミンを積極的に回復させ動機と集中力を向上させる。意識を保ちながら脳がベータ波からシータ波にシフトする。10〜30分で十分。午後の回復では20分超の昼寝を上回る。GoogleのサンダーCEOが毎日実践。無料・道具不要・どこでも可能。" },
  { id:"yt12", channel:"Huberman", tag:"社交多巴胺", color:"#3B82B8", url:"https://www.notion.so/3458ba4c0633819581c7cca80d293ead", en:"Debunking the oxytocin myth: the real driver of social bonding is dopamine, not oxytocin. Oxytocin strengthens in-group connection but simultaneously amplifies distrust and hostility toward out-groups — it's tribal, not universally loving. Introvert vs. extrovert is a dopamine spectrum: extroverts get dopamine spikes from social interaction; introverts sustain dopamine better in solitude. Loneliness is a biological signal — like hunger or thirst — urging you to act. Quality of connection matters more than quantity.", zh:"推翻催產素神話：社交連結的真正驅力是多巴胺，不是催產素。催產素強化內團體連結的同時，也會強化對外團體的不信任和對立——它是部落性的，不是普遍的愛。內向vs外向是多巴胺的連續譜：外向者在社交中多巴胺急升；內向者在獨處時多巴胺更穩定。孤獨感是生物訊號——如同飢餓或口渴——是你的神經系統在催促你行動，不是性格缺陷。社交連結的質量比數量更重要。", ja:"オキシトシン神話を打破する：社会的絆の真の推進力はオキシトシンではなくドーパミンだ。オキシトシンは内集団の結びつきを強めると同時に外集団への不信感と敵意を増幅させる——部族的であり普遍的な愛ではない。内向性vs外向性はドーパミンのスペクトラム：外向的な人は社交でドーパミンが急上昇し内向的な人は孤独でより維持できる。孤独感は生物学的シグナル——空腹や渇きと同様——あなたの神経系が行動を促している。社交の質は量より重要だ。" },
  { id:"yt13", channel:"Huberman", tag:"神經可塑性超協議", color:"#3B82B8", url:"https://www.notion.so/3448ba4c063381b893b5f1251180eca3", en:"The Neuroplasticity Super Protocol is a 9-step framework for accelerated learning. Key principles: 1) Alert state first — 25-30 deep breaths to prime your nervous system. 2) Visual focus for 30-60s to spike acetylcholine. 3) Mass repetition with ~15% error rate for optimal challenge. 4) Random 10-second micro-rests every 2 minutes — the hippocampus replays learning 10× faster during these gaps. 5) Post-learning NSDR within 1 hour to consolidate. 6) Memory formation happens during sleep, not during learning itself. Skip steps 1, 2, or 9 at your peril.", zh:"神經可塑性超級方案是9步驟加速學習框架。核心原則：1) 先建立警覺狀態——25-30次深呼吸啟動神經系統。2) 視覺聚焦30-60秒釋放乙醯膽鹼。3) 大量重複，最佳錯誤率約15%。4) 每兩分鐘隨機10秒微休息——海馬迴在這些空白中以10倍速度重播學習內容。5) 學習後1小時內進行NSDR以鞏固。6) 真正的記憶形成發生在睡眠中，不是學習中。跳過第1、2或9步，後果自負。", ja:"神経可塑性スーパープロトコルは加速学習のための9ステップフレームワークだ。核心原則：1）まず覚醒状態を構築——25〜30回の深呼吸で神経系を起動。2）1点を30〜60秒見つめアセチルコリンを放出。3）約15%の最適エラー率で大量反復。4）2分ごとにランダムな10秒の微休息——海馬はこのギャップ中に10倍の速さで学習を再生。5）学習後1時間以内にNSDRで定着。6）実際の記憶形成は学習中ではなく睡眠中に起きる。ステップ1・2・9を飛ばすのは自己責任だ。" },
];

  { id:"news_0", channel:"世界新聞", tag:"美伊談判破裂", color:"#E05C5C", en:"Iran's Foreign Minister Abbas Araghchi departed Islamabad on April 27 after arriving for indirect negotiations. President Trump announced that his envoys Steve Witkoff and Jared Kushner will no longer travel to Pakistan for talks. The breakdown marks a significant setback for ongoing US-Iran diplomacy, as Trump had set a firm weekend deadline for a credible Iranian nuclear proposal.", zh:"伊朗外長阿拉格奇4月27日離開伊斯蘭馬巴德，此前他前往當地進行間接談判。川普宣布特使維特科夫與庫什納不再前往巴基斯坦，美伊外交出現重大挫折，川普此前為伊朗提出可信核方案設定了週末截止日期。", ja:"イランのアラグチ外相が4月27日に間接交渉のために訪れたイスラマバードを出発。トランプ大統領は特使ウィトコフとクシュナーがパキスタンへの渡航を中止すると発表した。核合意に向けたトランプの週末期限設定の中で米イラン外交にとって重大な後退となった。", url:"https://en.wikipedia.org/wiki/2026_Iran_war" },
  { id:"news_1", channel:"世界新聞", tag:"馬利巴馬科衝突", color:"#E05C5C", en:"Gunfire and explosions rocked Mali's capital Bamako and several other key cities on April 27 in one of the most coordinated attacks in years. Armed groups including jihadist insurgents and separatist rebels have exploited worsening insecurity across the Sahel region. The attacks threaten the fragile stability of Mali's military government, which has expelled French forces and aligned with Russian military advisors.", zh:"4月27日槍聲與爆炸震撼馬利首都巴馬科及多個主要城市，是近年來最具規模的協調攻擊之一。聖戰武裝與分裂主義武裝趁薩赫勒地區安全局勢惡化伺機而動，威脅著已驅逐法國駐軍、轉向俄羅斯軍事顧問的馬利軍政府脆弱穩定。", ja:"4月27日にマリの首都バマコおよび複数の主要都市で銃撃と爆発が相次ぎ近年最も組織的な攻撃の一つとなった。サヘル地域の悪化した治安を利用したジハード組織と分離主義武装勢力が関与。フランス軍を追放しロシアの軍事顧問と連携するマリの軍事政府の脆弱な安定を脅かしている。", url:"https://www.zerofox.com/intelligence/monthly-geopolitical-report-april-2026/" },
  { id:"news_2", channel:"世界新聞", tag:"法國維和士兵殉職", color:"#E05C5C", en:"French UNIFIL peacekeeper Corporal Anicet Girardin, 31, died in a Paris hospital on April 27, weeks after being wounded in South Lebanon on April 18. His death adds to international pressure on all sides to protect UN peacekeeping forces in Lebanon during the 2026 conflict. France has deployed approximately 700 peacekeepers to UNIFIL and has signaled it could review its participation if attacks on personnel continue.", zh:"法國聯合國駐黎巴嫩臨時部隊維和士兵阿尼塞·吉拉丹下士（31歲）4月27日在巴黎醫院殉職，此前他於4月18日在黎巴嫩南部受傷。此事件加劇了國際社會對保護2026年衝突期間在黎維和部隊的壓力，法國暗示若人員持續遭受攻擊，可能重新考慮其UNIFIL參與。", ja:"フランスのUNIFIL平和維持部隊のアニセ・ジラルダン伍長（31歳）が4月18日に南レバノンで負傷した後4月27日にパリの病院で死亡した。この死は2026年の紛争中にレバノンで活動するUN平和維持部隊を保護するよう各側に対する国際的な圧力を高めた。フランスは約700人の平和維持部隊をUNIFILに派遣しており人員への攻撃が続けば参加を見直す可能性を示唆している。", url:"https://news.un.org/en/audio/2026/04/1167369" },
  { id:"news_3", channel:"世界新聞", tag:"以伊飛彈持續互轟", color:"#E05C5C", en:"The 2026 Iran-Israel war continues into its second month, with over 400 ballistic missiles fired at Israel from Iran and Hezbollah since hostilities began on February 28. The US has ordered evacuation of non-essential personnel from Cyprus in anticipation of potential escalation. International mediation efforts are stalling as the ceasefire framework remains fragile and unratified by all parties.", zh:"2026年伊朗與以色列戰爭進入第二個月，自2月28日敵對行動開始以來，伊朗與真主黨已向以色列發射逾400枚彈道飛彈。美國已下令非必要人員撤出塞普勒斯，防範局勢升級。停火框架脆弱且未獲所有各方批准，國際調解努力持續陷入僵局。", ja:"2026年のイラン・イスラエル戦争が2か月目に入り2月28日の開戦以来イランとヒズボラからイスラエルへ400発以上の弾道ミサイルが発射された。米国はさらなる緊張激化を見越してキプロスから非必須要員の退避を命じた。停戦の枠組みは脆弱で全当事者による批准も得られておらず国際的な調停努力は停滞している。", url:"https://en.wikipedia.org/wiki/2026_Iran_war" },
  { id:"news_4", channel:"世界新聞", tag:"IMF全球陰影報告", color:"#E05C5C", en:"The IMF's April 2026 World Economic Outlook, subtitled 'Global Economy in the Shadow of War,' warns that geopolitical risk remains the dominant threat to global stability. Elevated energy prices, trade disruptions, and the Iran conflict's spillover effects are weighing on growth forecasts worldwide. The IMF cut global growth projections for 30 countries while revising up predictions for Taiwan, India, and selected Gulf states benefiting from energy revenues.", zh:"IMF《2026年4月世界經濟展望》副題為「戰爭陰影下的全球經濟」，警告地緣政治風險仍是全球穩定的主要威脅。高位能源價格、貿易中斷與伊朗衝突的溢出效應壓制全球各地增長預測，同時下調30個國家增長預期，並上調台灣、印度及若干受益於能源收入的海灣國家的預測。", ja:"IMFの2026年4月世界経済見通しは「戦争の影の下の世界経済」との副題で地政学的リスクが世界の安定への最大の脅威であり続けると警告。高騰するエネルギー価格・貿易混乱・イラン紛争の波及効果が世界各地の成長予測を押し下げ30か国の成長見通しを下方修正する一方でエネルギー収入の恩恵を受ける台湾・インド・特定の湾岸国の予測を引き上げた。", url:"https://www.imf.org/en/publications/weo/issues/2026/04/14/world-economic-outlook-april-2026" },

const SOCIAL_CARDS = [
  { id:"social_0", channel:"社交雷達", tag:"Euphoria劇迷創作潮", color:"#C97DD4", en:"Euphoria Season 3, which premiered April 12 on HBO, continues to dominate social media in its third week. TikTok is flooded with character-specific edits, outfit recreations, and quote-based audio trends. The season's premiere episode broke HBO streaming records, and creators are generating layered content analyzing character arcs, fashion choices, and soundtrack selections — expanding the show's cultural footprint far beyond its viewership.", zh:"4月12日HBO首播的《幸福感》第三季進入第三週，仍主導社交媒體。TikTok充斥著角色剪輯、服裝重現與台詞音頻趨勢。首播集打破HBO串流記錄，創作者不斷生成分析角色弧線、時尚選擇與原聲帶的分層內容，讓這部劇的文化足跡遠超其觀看人數。", ja:"4月12日にHBOで初放送されたユーフォリアシーズン3が3週目に入っても引き続きSNSを席巻。TikTokにはキャラクター別の編集・衣装再現・セリフベースの音声トレンドが溢れている。初話がHBOストリーミング記録を更新しクリエイターはキャラクターアーク・ファッション・サウンドトラックを分析した重層的なコンテンツを生成し続けドラマの文化的フットプリントを視聴者数を大きく超えて拡大している。", url:"https://www.epidemicsound.com/blog/latest-tiktok-trends/" },
  { id:"social_1", channel:"社交雷達", tag:"oh ok because挑戰", color:"#C97DD4", en:"The 'oh ok because' trend is dominating TikTok this week — creators pair Azealia Banks' 212 instrumental with a slow, confident box-step strut while layering on-screen text revealing something surprising or ironic about their life. The format rewards dry wit and subverted expectations. The trend's appeal is in its confidence — the walk implies you've accepted something, and the text is the punchline.", zh:"「oh ok because」趨勢本週主導TikTok——創作者搭配Azealia Banks的《212》器樂版，以緩慢自信的步伐配合盒步舞，並用螢幕文字披露個人生活中的意外或諷刺事實。此格式獎勵冷幽默與顛覆期待。其吸引力在於那份自信——走路動作暗示你已接受某事，文字則是笑點。", ja:"「oh ok because」トレンドが今週TikTokを席巻。Azealia Banksの「212」インストゥルメンタルに合わせてゆっくりと自信満々なボックスステップストラットを踏みながら人生の意外または皮肉な事実をテキストで重ねる。ドライなウィットと期待の裏切りが評価されるフォーマット。その魅力は自信——歩き方が何かを受け入れたことを示唆しテキストがオチとなる。", url:"https://newengen.com/insights/april-2026-tiktok-trends/" },
  { id:"social_2", channel:"社交雷達", tag:"Ella Langley音樂蔓延", color:"#C97DD4", en:"'Loving Life Again' by Ella Langley is crossing over from TikTok to Instagram Reels with real momentum this week. Creators sync the hook 'and just like that I'm back to loving life again' with on-screen text explaining a personal comeback, or pair it with b-roll of whatever peace looks like for them. The audio captures a mood of post-struggle gratitude that resonates broadly across platforms.", zh:"Ella Langley的《Loving Life Again》本週從TikTok蔓延至Instagram Reels，勢頭強勁。創作者在「就這樣我重新愛上生活了」這個hook上疊加說明個人逆境後重生的文字，或搭配代表他們平靜的B-roll——早晨例行、散步、新城市。這段音頻抓住了一種掙扎後感恩的情緒，引發廣泛共鳴。", ja:"Ella Langleyの「Loving Life Again」が今週TikTokからInstagram Reelsに本格的な勢いで波及。「and just like that I'm back to loving life again」というフックに個人的な復活を説明するテキストを重ねるか朝のルーティン・散歩・新しい街などのb-rollと組み合わせる。ある苦難の後の感謝の気分を掴んだこの音声が幅広い共感を呼んでいる。", url:"https://newengen.com/insights/instagram-trends/" },
  { id:"social_3", channel:"社交雷達", tag:"顏色獵奇挑戰", color:"#C97DD4", en:"The color hunting challenge is trending on TikTok — creators assign themselves a color at the start of the day and photograph or film everything they notice in that hue over 24 hours. The format is meditative and shareable, rewarding attentiveness over production skill. The videos create a quiet aesthetic contrast to high-energy viral trends and have grown organically through recommendation algorithms rather than sudden viral spikes.", zh:"顏色獵奇挑戰在TikTok走紅——創作者每天早上指定一個顏色，在24小時內拍攝所有注意到的同色事物。此格式帶有冥想感且極具分享性，獎勵觀察力而非製作技巧。影片與高能病毒趨勢形成寧靜美學對比，透過推薦演算法自然生長而非突然爆發。", ja:"カラーハンティングチャレンジがTikTokでトレンドに。クリエイターが朝に色を決め24時間でその色のものを写真・動画で記録する。このフォーマットは瞑想的で高シェア性があり製作スキルより観察力が評価される。高エネルギーのバイラルトレンドとの静かな美的対比を生み出し突発的スパイクではなくレコメンドアルゴリズムを通じた有機的な成長を遂げている。", url:"https://www.home.shooglebox.com/tiktok-trends-2026" },
  { id:"social_4", channel:"社交雷達", tag:"我替換AI趨勢", color:"#C97DD4", en:"The 'I'm replacing AI' trend is turning Instagram comment sections into interactive content — creators post videos or images and ask followers to leave comments that prove they're 'better than AI,' rewarding creative, human, and contextually sharp responses. The trend taps into growing fatigue with AI-generated content and positions authentic human voice as the ultimate differentiator in a saturated feed.", zh:"「我替換AI」趨勢正在把Instagram評論區轉化為互動內容——創作者發布影片或圖像，邀請粉絲留下「比AI更好」的留言，獎勵具創意、人性化且有語境感的回應。此趨勢利用了對AI生成內容日益增長的疲態，將真實人聲與幽默定位為飽和動態中的終極差異點。", ja:"「I'm replacing AI」トレンドがInstagramのコメント欄をインタラクティブなコンテンツに変えている。クリエイターが動画や画像を投稿しフォロワーに「AIより優れている」ことを証明するコメントを求め創造的・人間的・文脈的に鋭い回答を評価する。AIが生成したコンテンツへの倦怠感を巧みに利用し飽和したフィードにおける最終的な差別化要因として本物の人間らしさとユーモアを位置づけている。", url:"https://www.ramd.am/blog/trends-instagram" },

  { id:"finance_0", channel:"財經", tag:"台股市值逾4兆美元", color:"#D4A838", en:"Taiwan's stock market capitalization surpassed $4.14 trillion this month, overtaking the United Kingdom to become the world's seventh-largest equity market. The milestone reflects the extraordinary performance of TSMC and other AI supply-chain beneficiaries. AI-related semiconductor demand has transformed Taiwan's economic footprint at global scale in under two years, rewriting long-standing rankings among the world's largest equity markets.", zh:"台灣股市市值本月突破4.14兆美元，超越英國成為全球第七大股市。這一里程碑反映台積電及其他AI供應鏈受益者的非凡表現，AI相關半導體需求在不到兩年內重塑了台灣在全球的經濟規模，改寫全球最大股市長期以來的排名。", ja:"台湾の株式市場時価総額が今月4.14兆ドルを突破し英国を上回り世界第7位の株式市場となった。この節目はTSMCとその他のAIサプライチェーン恩恵企業の異例のパフォーマンスを反映している。AI関連半導体需要が2年足らずでグローバル規模での台湾の経済的存在感を変革し世界最大株式市場の長年にわたるランキングを塗り替えた。", url:"https://finance.yahoo.com/economy/articles/did-ai-turn-taiwan-4-125615328.html" },
  { id:"finance_1", channel:"財經", tag:"出口年增65.9%", color:"#D4A838", en:"Taiwan's March 2026 exports surged 65.9% year-on-year to a record $91.12 billion — the fastest growth pace in over 16 years. The extraordinary figure was almost entirely driven by AI-related semiconductor components destined for global hyperscalers, cloud providers, and AI hardware manufacturers. The data reinforces Taiwan's position as the world's most critical node in the AI infrastructure supply chain.", zh:"台灣2026年3月出口年增65.9%，達到創紀錄的911.2億美元，是16年多來最快的成長速度。這一非凡數字幾乎完全由流向全球超大規模資料中心、雲端供應商與AI硬體製造商的AI相關半導體元件所驅動，強化台灣作為AI基礎設施供應鏈全球最關鍵節點的地位。", ja:"台湾の2026年3月の輸出が前年比65.9%急増し記録的な911.2億ドルに達した。16年以上ぶりの最速成長ペース。この異例の数字はほぼ全てが世界のハイパースケーラー・クラウドプロバイダー・AIハードウェアメーカー向けのAI関連半導体部品に牽引されており台湾がAIインフラサプライチェーンで世界最重要ノードであることを裏付けた。", url:"https://topics.amcham.com.tw/2026/04/macroeconomic-brief-april-2026-2/" },
  { id:"finance_2", channel:"財經", tag:"外資單月淨流入創高", color:"#D4A838", en:"Foreign investors have purchased $8.9 billion worth of Taiwanese equities in April 2026 alone, putting the month on track for the single largest monthly foreign inflow on record. The reversal follows March's extraordinary $25.28 billion outflow — the largest single-month withdrawal in at least 18 years. Analysts attribute the rapid swing to restored confidence in Taiwan's AI-driven export fundamentals and falling geopolitical risk premiums.", zh:"外資4月份已淨買入台灣股票89億美元，創單月外資淨流入歷史新高。此逆轉緊接3月創紀錄的252.8億美元撤資——至少18年來最大單月流出。分析師將這一快速擺動歸因於市場對台灣AI驅動出口基本面信心的恢復與地緣政治風險溢價下降。", ja:"外国人投資家が2026年4月だけで台湾株式を89億ドル買い越し当月は過去最大の外国人月間流入に向かって進んでいる。この逆転は少なくとも18年ぶりの最大単月流出となる3月の252.8億ドルの流出に続くもの。台湾のAI駆動輸出のファンダメンタルズへの信頼回復と地政学的リスクプレミアムの低下が急速な転換の要因とアナリストは見ている。", url:"https://topics.amcham.com.tw/2026/04/macroeconomic-brief-april-2026-2/" },
  { id:"finance_3", channel:"財經", tag:"央行升通膨至1.8%", color:"#D4A838", en:"Taiwan's Central Bank has raised its 2026 inflation forecast to approximately 1.8% — up from its previous estimate of 1.63% — citing the potential impact of higher global energy prices driven by the Middle East conflict. Despite the upward revision, Taiwan's inflation remains well below the regional average, and the Central Bank has opted to maintain its benchmark rate rather than accelerate tightening.", zh:"台灣中央銀行將2026年通膨預測上調至約1.8%，高於此前1.63%的估計，理由是中東衝突驅動全球能源價格上漲的潛在影響。儘管上調，台灣通膨仍遠低於區域平均水準，中央銀行選擇維持基準利率，而非加速緊縮。", ja:"台湾中央銀行が中東紛争によって引き起こされた世界的なエネルギー価格上昇の潜在的影響を理由に2026年のインフレ予測を従来の1.63%から約1.8%に引き上げた。上方修正にもかかわらず台湾のインフレは地域平均を大きく下回っており中央銀行は引き締め加速より基準金利の維持を選択している。", url:"https://focustaiwan.tw/business/202603170007" },
  { id:"finance_4", channel:"財經", tag:"全年GDP預測7.71%", color:"#D4A838", en:"Taiwan's Directorate-General of Budget, Accounting and Statistics raised its 2026 full-year GDP growth forecast to 7.71%, following Q1's extraordinary 13.19% year-on-year expansion — the highest rate since 1987. The revision reflects extraordinary AI semiconductor demand, record export figures, and strong consumption data. Analysts caution that the Q1 figure represents a cyclical peak unlikely to persist through the full year.", zh:"台灣主計總處將2026年全年GDP增長預測上調至7.71%，此前Q1年增率達13.19%——1987年以來最高。修正反映了超強AI半導體需求、創紀錄出口數據與強勁消費數據，分析師提醒Q1數字代表不太可能持續全年的周期性高峰，但上行潛力依然強勁。", ja:"台湾の行政院主計総処が2026年の通年GDP成長率予測を7.71%に引き上げた。1987年以来最高となるQ1の前年比13.19%拡大を受けてのもの。修正は異例のAI半導体需要・記録的輸出・力強い消費データを反映している。アナリストはQ1の数字が通年で持続しにくいサイクルのピークを示すと警告しているが上昇余地は依然として強固だ。", url:"https://www.sinica.edu.tw/en/news_content/55/3423" },

  { id:"sports_0", channel:"運動", tag:"謝淑薇馬德里晉級", color:"#4A90D9", en:"Taiwan's veteran tennis doubles specialist Hsieh Su-wei and American partner Sofia Kenin advanced to the second round of the women's doubles at the Madrid Open on April 27, defeating Slovakia's Tereza Mihalikova and England's Olivia Nicholls 6-2, 6-3 in 73 minutes. At 38, Hsieh continues to perform at the elite level, representing Taiwan across Grand Slams and WTA Masters events.", zh:"台灣資深網球女雙名將謝淑薇與美國搭檔索菲亞·肯寧4月27日在馬德里公開賽女雙中，以6:2、6:3在73分鐘內擊敗斯洛伐克的米哈利科娃與英格蘭的尼科爾斯，晉級第二輪。38歲的謝淑薇仍在WTA巡迴賽保持頂尖水準，持續代表台灣在大滿貫與大師賽等國際賽事參賽。", ja:"台湾のベテランテニス女子ダブルスの謝淑薇とアメリカのパートナーのソフィア・ケニンが4月27日のマドリードオープン女子ダブルスでスロバキアのミハリコバとイングランドのニコルスを6-2、6-3の73分で下し第2ラウンドへ進出した。38歳の謝淑薇はWTAツアーのエリートレベルで活躍を続けグランドスラムやマスターズで台湾を代表し続けている。", url:"https://www.taipeitimes.com/News/sport/archives/2026/04/27/2003856305" },
  { id:"sports_1", channel:"運動", tag:"羽球改15分新制", color:"#4A90D9", en:"The Badminton World Federation voted on April 27 to adopt a new 3x15 scoring system, replacing the current 3x21 format starting January 2027. The change is designed to make matches faster, more broadcaster-friendly, and better suited to the attention patterns of younger audiences. The decision was approved at BWF's annual general meeting in Horsens, Denmark, with players expressing mixed reactions.", zh:"世界羽球聯合會4月27日在丹麥霍森斯年度大會投票通過，自2027年1月起採用新3×15分制取代現行3×21分制。此改變旨在讓比賽更快節奏、更符合轉播需求，並更貼合年輕觀眾的注意力模式，球員對此新格式反應不一。", ja:"世界バドミントン連盟（BWF）が4月27日にデンマーク・ホーセンスでの年次総会で2027年1月から現行の3×21ゲームに代えて新しい3×15得点制を採用することを投票で決定した。変更は試合を速く・放送に適したものにし若い視聴者の注意パターンに合わせることを目的としており選手の反応は賛否が分かれている。", url:"https://www.taipeitimes.com/News/sport/archives/2026/04/27/2003856305" },
  { id:"sports_2", channel:"運動", tag:"世界盃45天倒計時", color:"#4A90D9", en:"The 2026 FIFA World Cup kicks off in 45 days, with host cities across the United States, Canada, and Mexico finalizing preparations. All 48 national teams have confirmed their squads and are entering final preparation windows. The USA opener at MetLife Stadium in New Jersey is expected to draw over 70,000 fans and kick off what FIFA officials project will be the most-watched sporting event in human history.", zh:"2026年FIFA世界盃倒計時45天，美國、加拿大與墨西哥各主辦城市正在進行最終準備工作。48支國家隊均已確認陣容並進入最後備戰窗口。預計吸引逾70,000球迷的美國首場在新澤西MetLife球場舉行，FIFA官員預測這將是人類史上收視率最高的體育賽事。", ja:"2026 FIFAワールドカップまで45日。米国・カナダ・メキシコの開催都市が最終準備を進めている。48の全国代表チームが代表選手を確認し最終準備期間に入った。7万人超のファンが予想されるニュージャージー州メットライフスタジアムでの米国初戦はFIFA関係者が人類史上最も視聴される競技イベントになると予測する舞台を整える。", url:"https://www.foxsports.com/soccer/fifa-world-cup/news" },
  { id:"sports_3", channel:"運動", tag:"吳芳嫻馬德里首輪出局", color:"#4A90D9", en:"Taiwan's Wu Fang-hsien and Japanese partner Eri Hozumi were eliminated in the first round of the Madrid Open women's doubles on April 27, falling 6-2, 6-4 to the sixth-seeded pair of Spain's Cristina Bucsa and American Nicole Melichar-Martinez. Despite the quick exit, Wu remains one of Taiwan's most active international doubles specialists on the WTA circuit.", zh:"台灣的吳芳嫻與日本搭檔保純榮美4月27日在馬德里公開賽女雙首輪，以6:2、6:4不敵第六種子西班牙布克薩與美國梅利恰爾-馬丁內斯出局。儘管提前落幕，吳芳嫻仍是台灣在WTA巡迴賽最活躍的女雙選手之一。", ja:"台湾の吳芳嫻と日本のパートナー保純榮美が4月27日のマドリードオープン女子ダブルス1回戦でスペインのクリスティナ・ブクサとアメリカのニコル・メリチャー・マルティネスの第6シードペアに6-2、6-4で敗れ敗退した。早期退場となったが吳芳嫻はWTAツアーで台湾で最も活躍する国際ダブルス選手の一人だ。", url:"https://www.taipeitimes.com/News/sport/archives/2026/04/27/2003856305" },
  { id:"sports_4", channel:"運動", tag:"台灣拔河衛冕四連霸", color:"#4A90D9", en:"Taiwan's national Tug of War team is targeting a fourth consecutive world championship title at the 2026 World Indoor Tug of War Championships, which debuts in Taiwan — marking the first time the country has hosted this event. Three consecutive world titles have established Taiwan as the dominant force in competitive tug of war, and the home-court edition is generating strong national pride and ticket demand.", zh:"台灣拔河國家隊正衝刺2026年世界室內拔河錦標賽四連霸，這屆賽事首次在台灣舉行。台灣已連續三度稱霸世界，確立其競技拔河的主導地位，本屆主場賽事也激發了強烈的全民榮譽感與購票需求。", ja:"台湾代表拔河チームが初めて台湾で開催される2026年世界室内綱引き選手権で4連覇を目指している。3連続世界タイトルの驚くべき記録で競技綱引きにおける台湾の圧倒的な存在を確立しており初の主催となる今大会は強い国民的誇りとチケット需要を生み出している。", url:"https://www.sports.gov.tw/en/News_Content/2511/20673" },

  { id:"design_0", channel:"設計", tag:"蒙特婁設計週開幕", color:"#E8786A", en:"The inaugural Montreal Design Week opens tomorrow, April 28, coinciding with the 20th anniversary of Montreal's UNESCO City of Design designation. The 10-day program (April 28 to May 7) spans studio open houses, public installations, and design forums across the city. The inaugural edition is expected to attract over 50,000 visitors and establish Montreal as a permanent fixture on the global design calendar alongside Milan, London, and Tokyo.", zh:"首屆蒙特婁設計週明日4月28日開幕，恰逢蒙特婁獲UNESCO設計之都認定20週年。為期10天（4月28日至5月7日）的活動遍及全市各工作室、公共裝置與設計論壇，首屆預計吸引逾50,000名訪客，確立蒙特婁與米蘭、倫敦、東京並列的全球設計日曆固定席位。", ja:"初回のモントリオールデザインウィークが明日4月28日に開幕。モントリオールのユネスコデザイン都市指定20周年と重なる。10日間（4月28日〜5月7日）のプログラムは市内各地のスタジオオープンハウス・公共インスタレーション・デザインフォーラムにわたる。初回は5万人超の来場者を集めミラノ・ロンドン・東京と並ぶグローバルデザインカレンダーの定番イベントとしてモントリオールを確立することが期待されている。", url:"https://www.archdaily.com/1036637/the-architecture-agenda-inside-the-key-events-of-2026" },
  { id:"design_1", channel:"設計", tag:"iF設計獎柏林頒獎", color:"#E8786A", en:"The iF Design Award Night 2026 is taking place today in Berlin, followed tomorrow by the iF Design Trend Conference. With approximately 11,000 submissions from 70 countries, the iF Award is one of the world's most prestigious design competitions. This year's winning works signal a broader industry shift: sustainability metrics, AI-assisted fabrication, and radical accessibility have displaced purely aesthetic criteria as the dominant evaluation framework.", zh:"2026年iF設計獎頒獎典禮今日在柏林舉行，明日接續iF設計趨勢研討會。約11,000件來自70國的參賽作品，iF獎是全球最具聲望的設計競賽之一。今年獲獎作品標誌更廣泛的產業轉向：永續性指標、AI輔助製造與激進無障礙設計已取代純美學標準，成為主導評估框架。", ja:"iF DESIGN AWARD NIGHT 2026が本日ベルリンで開催され翌日にiFデザイントレンドカンファレンスが続く。70か国から約1万1000点の応募を集め世界で最も権威あるデザインコンペの一つ。今年の受賞作品はより広い産業の転換を示している——持続可能性指標・AI支援製造・根本的なアクセシビリティが主導的な評価基準として純粋に美的な基準に取って代わった。", url:"https://bustler.net/competitions/10153/if-design-award-2026" },
  { id:"design_2", channel:"設計", tag:"高點家居市場衝刺", color:"#E8786A", en:"High Point Market (April 25-29, North Carolina) enters its final two days on April 27, drawing the furniture and interior design industry's largest annual gathering. The 2026 edition has reinforced a major market shift: sustainable material sourcing and circular design have moved from marketing language to procurement mandates. Buyers are now contractually requiring environmental accountability from suppliers in ways that were optional just two years ago.", zh:"高點市場（4月25至29日，北卡羅萊納州）4月27日進入最後兩天，是家具與室內設計業界規模最大的年度聚會。2026年版確認了市場重大轉變：永續材料採購與循環設計已從行銷語言變為採購強制要求，買方現在以合約形式要求供應商的環境問責，而兩年前這還只是選項。", ja:"ハイポイントマーケット（4月25〜29日、ノースカロライナ州）が4月27日に最終2日間に入り家具とインテリアデザイン業界最大の年次集会を開催中。2026年版はメジャーな市場転換を裏付けた——持続可能な材料調達と循環デザインがマーケティング用語から調達上の義務へ移行している。バイヤーは2年前にはオプションだった環境的説明責任をサプライヤーに契約上要求するようになっている。", url:"https://www.dezeen.com/eventsguide/" },
  { id:"design_3", channel:"設計", tag:"AI共同設計成主流", color:"#E8786A", en:"Gensler's 2026 design trends report identifies AI as creative collaborator as the defining shift reshaping every design discipline this year. Unlike the early adoption phase of 2024-2025, AI is now embedded in standard design workflows — from generative massing studies in architecture to material simulation in product design. The shift raises new questions about authorship, originality, and the value of design expertise in an AI-assisted era.", zh:"根斯勒2026年設計趨勢報告指出，AI作為創意協作者是今年重塑每個設計領域的決定性轉變。與2024至2025年的早期採用階段不同，AI現已嵌入標準設計工作流程——從建築的生成式量體研究到產品設計中的材料模擬，並引發關於AI輔助時代下作者身份、原創性與設計專業價值的新問題。", ja:"Genslerの2026年デザイントレンドレポートがAIをクリエイティブコラボレーターとして定義することを今年すべてのデザイン分野を塗り替える決定的な転換として挙げた。2024〜2025年の早期採用段階と異なりAIは今や建築のジェネレーティブマッシングスタディから製品デザインのマテリアルシミュレーションまで標準的なデザインワークフローに組み込まれている。そのシフトはAI支援時代における著作権・独創性・デザイン専門性の価値について新たな問いを提起している。", url:"https://www.gensler.com/6-trends-shaping-design-in-2026" },
  { id:"design_4", channel:"設計", tag:"沙龍後材料倫理宣言", color:"#E8786A", en:"The closure of Salone del Mobile 2026 has crystallized the decade's central design imperative: materials are no longer neutral choices but ethical statements. This year's Salone exhibitors overwhelmingly featured recycled, bio-based, and traceable material systems — not as niche offerings but as the default. The 2026 edition's record attendance signals the industry has reached a tipping point where sustainability-in-materials has become the new baseline for global commercial design.", zh:"Salone del Mobile 2026的閉幕鞏固了這個十年的核心設計命題：材料不再是中性選擇，而是道德聲明。今年展商壓倒性地展示再生、生物基與可追溯材料系統——不作為小眾品項，而是作為預設選項。創紀錄的入場人次顯示業界已達到轉捩點，材料永續已成為全球商業設計的新基準線。", ja:"Salone del Mobile 2026の閉幕がこの十年の中心的なデザインの命令を明確にした——材料はもはや中立な選択ではなく倫理的声明だ。今年の展示者は再生・バイオベース・トレーサブルな素材システムをニッチなオファリングではなくデフォルトとして圧倒的に特集した。記録的な来場者数は業界が材料の持続可能性がグローバルな商業デザインの新たな基準線となる転換点に達したことを示している。", url:"https://parametric-architecture.com/architecture-and-design-events-2026/" },
];

const FOOD_CARDS = [
  { id:"food_0", channel:"餐飲", tag:"GLP-1藥物改變餐廳", color:"#6DB56D", en:"One in eight American adults is currently taking or has recently taken a GLP-1 weight-loss drug, and this demographic is now reshaping restaurant menus at scale. GLP-1 users tend to avoid alcohol, fried foods, and sugary drinks — and fill up faster. Restaurants from Smoothie King to fine-dining establishments are creating menu sections and portion formats targeting GLP-1 users, representing a fundamentally new category of dietary need.", zh:"八分之一美國成人正在服用或近期服用過GLP-1減重藥，這一族群正在大規模重塑餐廳菜單。GLP-1用戶傾向避免酒精、油炸食品與含糖飲料，且更快有飽腹感。從Smoothie King到精緻餐廳，正為GLP-1用戶創建明確的菜單分類與份量格式，代表一種全新的飲食需求類別。", ja:"米国成人の8人に1人がGLP-1減量薬を現在使用中または最近使用しており、この層が今や大規模にレストランメニューを塗り替えている。GLP-1ユーザーはアルコール・揚げ物・甘い飲み物を避ける傾向があり満腹感をより速く感じる。Smoothie Kingからファインダイニングまで、GLP-1ユーザーをターゲットにしたメニューセクションと分量フォーマットを作成しており全く新しいカテゴリーの食事ニーズを代表している。", url:"https://www.mckinsey.com/industries/retail/our-insights/what-us-consumers-want-from-restaurants-in-2026" },
  { id:"food_1", channel:"餐飲", tag:"菜單精簡化浪潮", color:"#6DB56D", en:"Menu simplification has emerged as the defining operational trend for restaurants in 2026. Operators are cutting menu items to a tight core of dishes done exceptionally well, with offerings changing frequently to reflect local sourcing and seasonal availability. The trend is driven by both consumer preference for quality over choice and operational necessity — smaller menus reduce waste, training time, and supply chain complexity in a year of elevated ingredient costs.", zh:"菜單精簡化已成為2026年餐廳業的決定性營運趨勢。餐廳業者將菜單削減至一套精選到位的核心菜式，並隨在地採購與季節供應頻繁更換。此趨勢同時受消費者傾向以質換量與營運需求的雙重驅動——在食材成本高位的一年，精簡菜單可減少浪費、培訓時間與供應鏈複雜性。", ja:"メニューのシンプル化が2026年のレストランの決定的な運営トレンドとして浮上した。事業者は特別にうまく行われる料理のタイトなコアにメニューを削減し地元調達と季節の可用性を反映して頻繁に変更している。このトレンドは品質を選択より優先する消費者の好みと運営上の必要性の両方に牽引されている——食材コストが高い年に小さなメニューは廃棄・研修時間・サプライチェーンの複雑さを削減できる。", url:"https://www.nrn.com/restaurant-insights/the-trends-shaping-restaurants-in-2026" },
  { id:"food_2", channel:"餐飲", tag:"蘑菇成為主角", color:"#6DB56D", en:"Mushrooms are having their biggest culinary moment in decades in 2026 — not as garnishes or supporting ingredients, but as the main character of dishes across cuisine types. Chefs are working with king oyster, lion's mane, maitake, and matsutake in ways previously reserved for premium proteins. The trend is driven by umami-forward flavor preferences, health awareness around adaptogens, and plant-forward menu innovation.", zh:"蘑菇在2026年迎來數十年來最大的烹飪時刻——不是作為裝飾或配角食材，而是跨越料理類型成為主角。主廚以過去留給頂級蛋白質的方式處理杏鮑菇、猴頭菇、舞茸與松茸。此趨勢由鮮味前衛的口味偏好、適應原健康意識，以及植物為主的菜單創新三重匯流所驅動。", ja:"キノコが2026年に数十年ぶりの最大の料理的瞬間を迎えている——つけ合わせや添え物としてではなく料理の種類を超えた主役として。シェフはエリンギ・ライオンズメーン・舞茸・松茸をかつてプレミアムタンパク質のために予約されていた方法で料理している。このトレンドはうまみを前面に出した風味の好み・アダプトゲンをめぐる健康意識・植物主体のメニュー革新の収斂によって引き起こされている。", url:"https://katiecouric.com/lifestyle/2026-food-trends/" },
  { id:"food_3", channel:"餐飲", tag:"餐廳氛圍轉向舒適", color:"#6DB56D", en:"The dominant restaurant aesthetic in 2026 has shifted decisively away from minimalist-industrial to warm, lived-in, and intimate. Operators are introducing cozy seating arrangements, softer lighting, vintage-influenced decor, and curated acoustic environments with jazz and ambient music. The trend positions the restaurant as a refuge rather than a showpiece in a cultural counter-reaction to the maximally-optimized built environment.", zh:"2026年主流餐廳美學已決定性地從極簡工業風轉向溫暖、有居住感與親密的風格。業者引入舒適座位安排、柔和燈光、復古風格裝飾，以及融合爵士與環境音樂的精心音效環境。此趨勢將餐廳定位為避風港而非展示空間，反映對過度優化建築環境的文化反彈。", ja:"2026年の支配的なレストランの美学がミニマリスト工業系から温かく生活感があり親密なスタイルへと決定的に転換した。事業者は居心地よいシーティングアレンジメント・柔らかい照明・ヴィンテージ風インテリア・ジャズとアンビエント音楽を取り入れた精選された音響環境を導入している。このトレンドは最大限最適化された建築環境に対する文化的反発の中でレストランをショーピースではなく避難所として位置づけている。", url:"https://www.restaurantdive.com/news/restaurant-trends-outlook-2026/810787/" },
  { id:"food_4", channel:"餐飲", tag:"餐飲業年銷售1.55兆", color:"#6DB56D", en:"The US restaurant industry is projecting total sales of $1.55 trillion for 2026 — a record figure — with real gains of approximately 1.3% after accounting for inflation. Growth is uneven: fast-casual and value-positioned concepts are outperforming fine-dining, while delivery and off-premise dining continue to expand their share. Labor costs remain the industry's primary margin pressure entering the second half of 2026.", zh:"美國餐飲業預計2026年銷售額達1.55兆美元的歷史新高，扣除通膨後實際成長約1.3%。成長不均：快速休閒與價值定位品牌勝過精緻餐飲，外賣與場外用餐持續擴大份額。勞動成本仍是業界進入2026下半年的主要利潤壓力。", ja:"米国のレストラン産業が2026年に記録的な1.55兆ドルの総売上を見込んでいる。インフレ調整後の実質成長は約1.3%。成長は不均一——ファストカジュアルとバリューポジションのコンセプトがファインダイニングを上回りデリバリーとオフプレミスダイニングはシェアを拡大し続けている。労働コストが2026年後半に入る業界の主要な利益率圧力として残っている。", url:"https://restaurant.org/research-and-media/research/research-reports/state-of-the-industry/" },
];

const TECH_CARDS = [
  { id:"tech_0", channel:"科技", tag:"GPT-5.4百萬上下文", color:"#5B8ED6", en:"OpenAI unveiled GPT-5.4 in late April 2026, featuring a 1-million-token context window and the ability to autonomously execute multi-step workflows across software environments. The model can coordinate file systems, browsers, APIs, and code execution simultaneously — representing the clearest commercial implementation of agentic AI to date. GPT-5.4 is OpenAI's direct response to the growing enterprise adoption of autonomous AI agents.", zh:"OpenAI於2026年4月下旬發布GPT-5.4，具備100萬token上下文視窗，可自主跨軟體環境執行多步驟工作流程。模型能同時協調文件系統、瀏覽器、API與程式碼執行，是迄今最清晰的商業化AI Agent實作，OpenAI將其定位為應對企業自主AI代理快速採用的直接回應。", ja:"OpenAIが2026年4月下旬にGPT-5.4を公開。100万トークンのコンテキストウィンドウを備え複数ソフトウェア環境にまたがる多段階ワークフローを自律的に実行できる。モデルはファイルシステム・ブラウザ・API・コード実行を同時に調整でき、これまでで最も明確なAIエージェントの商業実装を示している。GPT-5.4はOpenAIが自律AIエージェントの企業採用拡大への直接的な回答として位置づけている。", url:"https://kersai.com/ai-breakthroughs-april-2026-models-funding-shifts/" },
  { id:"tech_1", channel:"科技", tag:"Gemini 3.1超長上下文", color:"#5B8ED6", en:"Google launched Gemini 3.1 Ultra with a 2-million-token context window — the largest natively multimodal context of any commercial model — processing text, images, audio, and video in a single unified pass. The model is being deployed through Google Cloud for enterprise clients in healthcare, legal, and financial services. Analysts describe Gemini 3.1 Ultra as the most significant demonstration of multimodal AI capability in a production system to date.", zh:"谷歌發布Gemini 3.1 Ultra，具備200萬token上下文視窗——任何商業模型中最大的原生多模態上下文——在單一統一路徑中處理文字、圖像、音頻與影片。模型正通過Google Cloud為醫療、法律與金融服務企業客戶部署，分析師稱其為迄今生產系統中多模態AI能力最重要的演示。", ja:"Googleが200万トークンのコンテキストウィンドウを持つGemini 3.1 Ultraを公開。商業モデル中最大のネイティブマルチモーダルコンテキストを誇りテキスト・画像・音声・動画を単一の統合パスで処理する。医療・法務・金融サービスの企業クライアント向けにGoogle Cloud経由でデプロイされている。アナリストはこれを本番システムにおけるマルチモーダルAI能力の最も重要なデモンストレーションと評している。", url:"https://www.devflokers.com/blog/ai-news-last-24-hours-april-2026-model-releases-breakthroughs" },
  { id:"tech_2", channel:"科技", tag:"Claude Mythos 5問世", color:"#5B8ED6", en:"Anthropic released Claude Mythos 5 — described as the first widely recognized ten-trillion-parameter model — in April 2026, positioning it as a system-level AI designed for extended autonomous operation rather than single-turn assistance. Claude Mythos 5 is Anthropic's most direct statement of its constitutional AI approach at frontier scale, with built-in safety and alignment evaluations running continuously during operation.", zh:"Anthropic於2026年4月發布Claude Mythos 5——被描述為首個廣受認可的10兆參數模型——定位為設計用於長時間自主運行而非單輪協助的系統級AI。Claude Mythos 5是Anthropic在前沿規模上最直接的憲法AI方法聲明，在運行期間持續內建安全性與對齊評估。", ja:"Anthropicが2026年4月にClaude Mythos 5を公開。最初に広く認識された10兆パラメータモデルとして単一ターンの支援ではなく拡張された自律動作のために設計されたシステムレベルのAIとして位置づけられている。Claude Mythos 5はAnthropicの憲法的AIアプローチをフロンティアスケールで最も明確に表明するもので動作中に安全性と整合性の評価が継続的に実行される。", url:"https://blog.mean.ceo/new-ai-model-releases-news-april-2026/" },
  { id:"tech_3", channel:"科技", tag:"Cursor 3代理編程", color:"#5B8ED6", en:"Cursor released Cursor 3, an agentic coding interface designed to compete with Anthropic's Claude Code and OpenAI's Codex. Cursor 3 introduces persistent project memory, multi-file orchestration, and automated test-write-run cycles — enabling software engineers to delegate entire feature implementations rather than individual code completions. The release represents the leading edge of the shift from AI coding assistant to AI software engineer.", zh:"Cursor發布Cursor 3，一款設計用於與Anthropic Claude Code和OpenAI Codex競爭的代理編程界面。Cursor 3引入持久項目記憶、多文件編排與自動化測試-撰寫-執行循環，讓軟體工程師可以委派整個功能實作而非個別程式碼補全。此版本代表從AI程式碼輔助工具到AI軟體工程師這一轉變的領先前沿。", ja:"CursorがCursor 3を公開。AnthropicのClaude CodeとOpenAIのCodexと競合するように設計されたエージェント型コーディングインタフェース。Cursor 3は永続的なプロジェクトメモリ・マルチファイルオーケストレーション・自動テスト・書き込み・実行サイクルを導入しソフトウェアエンジニアが個々のコード補完ではなく機能実装全体を委任できるようにした。このリリースはAIコーディングアシスタントからAIソフトウェアエンジニアへの転換の最先端を示している。", url:"https://blog.mean.ceo/ai-product-launches-news-april-2026/" },
  { id:"tech_4", channel:"科技", tag:"MS代理治理工具包", color:"#5B8ED6", en:"Microsoft shipped its Agent Governance Toolkit — a seven-package open-source system for governing autonomous AI agents in enterprise environments. The toolkit addresses compliance, auditability, permission scoping, and human-in-the-loop oversight requirements for deployed AI agents. As over 40% of Fortune 500 companies now run at least one production AI agent, governance infrastructure has become the most urgent missing layer in enterprise AI deployments.", zh:"微軟推出代理治理工具包（Agent Governance Toolkit）——一套七個模組的開源系統，用於管理企業環境中的自主AI代理。工具包解決部署AI代理的合規性、可審計性、權限範圍與人工監督要求。隨著逾40%的財富500強企業已運行至少一個生產型AI代理，治理基礎設施已成為企業AI部署中最緊迫的缺失層。", url:"https://news.microsoft.com/source/features/ai/whats-next-in-ai-7-trends-to-watch-in-2026/" },
];
