<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111;
    --bg-elevated: #161616;
    --text: #ccc;
    --text-secondary: #555;
    --divider: #222;
    --accent: #888;
  }
  [data-theme="light"] {
    --bg: #f0ede7;
    --bg-elevated: #e8e4dd;
    --text: #2a2725;
    --text-secondary: #918e89;
    --divider: #d5d1ca;
    --accent: #777;
  }
  body {
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    font-family: Georgia, 'Times New Roman', serif;
    transition: background 0.3s ease, color 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes imgFade {
    from { opacity: 0; }
    to   { opacity: 1; }

  ::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 4px; }

    padding: 0 24px;

  .tab-nav button {
    background: none; border: none; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
    font-family: Georgia, serif;
    transition: all 0.3s ease;
    padding: 0;

  .refresh-btn {
    display: block; margin: 0 auto 40px; padding: 8px 20px;
    background: none; border: 1px solid var(--divider);
    color: var(--text-secondary); font-family: monospace;
    font-size: 11px; letter-spacing: 0.1em; cursor: pointer;
    transition: all 0.2s ease;
  }
  .refresh-btn:hover { border-color: var(--text-secondary); color: var(--text); }

  .feed-img {
    width: 100%; height: 180px; object-fit: cover;
    border-radius: 2px; margin-bottom: 12px;
    animation: imgFade 0.4s ease both;

</style>

const TABS = ["全部", "書櫃", "今日"];

// Unsplash keyword mapping for tags
const TAG_KEYWORDS = {
  "財富": "wealth,money", "槓桿": "technology,code", "獨特知識": "learning,books",
  "幸福": "happiness,sunset", "長期賽局": "chess,strategy", "清晰思考": "clarity,zen",
  "第一原理": "physics,science", "The Algorithm": "algorithm,engineering",
  "失敗哲學": "rocket,launch", "使命": "mission,mountain", "產品設計": "design,minimal",
  "人才策略": "team,people", "創造力": "creativity,art", "一人公司": "entrepreneur,laptop",
  "多元興趣": "curiosity,explore", "AI 時代": "artificial-intelligence,robot",
  "意義": "philosophy,meaning", "財經": "stock-market,finance", "地緣政治": "globe,politics",
  "AI": "artificial-intelligence,technology", "科技": "technology,innovation",
  "體育": "sports,stadium", "Wellness": "wellness,yoga", "設計": "interior-design,architecture",
  "餐飲": "restaurant,food",
};

function getUnsplashUrl(tag, id) {
  const kw = TAG_KEYWORDS[tag] || "abstract,minimal";
  // Use card id as a stable seed so same card always gets same image
  return `https://source.unsplash.com/600x300/?${kw}&sig=${id}`;
}

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── Components ──────────────────────────────────────────
function TabNav({ active, onChange }) {
  return (
    <div className="tab-nav">
      {TABS.map(tab => {
        const isActive = active === tab;
        return (
          <button
            key={tab}
            onClick={() => onChange(tab)}
            style={{
              fontSize: isActive ? "28px" : "16px",
              fontWeight: isActive ? 600 : 400,
              color: "var(--text)",
              opacity: isActive ? 1 : 0.3,
              lineHeight: 1.2,
            }}
          >
            {tab}
          </button>
        );
      })}
    </div>
  );
}

function FeedItem({ card, index }) {
  const [expanded, setExpanded] = useState(false);
  const imgUrl = getUnsplashUrl(card.tag, card.id);
  return (
    <div
      onClick={() => setExpanded(!expanded)}
      style={{
        padding: "0 0 28px 0",
        marginBottom: "28px",
        borderBottom: "1px solid var(--divider)",
        cursor: "pointer",
        animation: "fadeUp 0.35s ease both",
        animationDelay: `${Math.min(index * 0.04, 0.5)}s`,
      }}
    >
      {/* TAG */}
      <span style={{
        fontFamily: "monospace",
        fontSize: "10px",
        textTransform: "uppercase",
        letterSpacing: "0.15em",
        color: "var(--text-secondary)",
        display: "block",
        marginBottom: "10px",
      }}>
        {card.channel} / {card.tag}
      </span>

      {/* English main text */}
      <p style={{
        fontFamily: "Georgia, 'Times New Roman', serif",
        fontSize: "17px",
        lineHeight: 1.75,
        color: "var(--text)",
        margin: 0,
        maxWidth: "56ch",
      }}>
        {card.en}
      </p>

      {/* Expandable: image + Chinese */}
      <div style={{
        overflow: "hidden",
        maxHeight: expanded ? "500px" : "0px",
        transition: "max-height 0.4s ease",
      }}>
        <div style={{
          borderTop: "1px solid var(--divider)",
          marginTop: "14px",
          paddingTop: "14px",
        }}>
          {/* Unsplash image */}
          <img
            src={expanded ? imgUrl : ""}
            alt=""
            className="feed-img"
            loading="lazy"
            style={{ display: expanded ? "block" : "none" }}
          />
          <p style={{
            fontFamily: "system-ui, -apple-system, sans-serif",
            fontSize: "14px",
            lineHeight: 1.8,
            color: "var(--text-secondary)",
            margin: 0,
            maxWidth: "56ch",
          }}>
            {card.zh}
          </p>
        </div>
      </div>

      {/* Bottom row */}
      <div style={{ display: "flex", alignItems: "center", gap: "16px", marginTop: "10px" }}>
        <span style={{
          fontFamily: "monospace",
          fontSize: "10px",
          color: "var(--text-secondary)",
        }}>
          {expanded ? "收起 \u2191" : "中文 \u2193"}
        </span>
        {card.url && (
          <a
            href={card.url}
            target="_blank"
            rel="noopener noreferrer"
            onClick={e => e.stopPropagation()}
            style={{
              fontFamily: "monospace",
              fontSize: "10px",
              color: "var(--text-secondary)",
              textDecoration: "none",
              borderBottom: "1px solid var(--divider)",
              paddingBottom: "1px",
              transition: "color 0.2s",
            }}
            onMouseEnter={e => e.currentTarget.style.color = "var(--text)"}
            onMouseLeave={e => e.currentTarget.style.color = "var(--text-secondary)"}
          >
            source \u2197
          </a>
        )}
      </div>
    </div>
  );
}

// ─── Theme Toggle ────────────────────────────────────────
function ThemeToggle() {
  const [dark, setDark] = useState(true);
  const toggle = () => {
    const next = !dark;
    setDark(next);
    document.body.setAttribute("data-theme", next ? "dark" : "light");
  };
  return (
    <button onClick={toggle} style={{
      position: "fixed",
      top: "20px",
      right: "20px",
      zIndex: 100,
      background: "none",
      border: "none",
      cursor: "pointer",
      fontSize: "18px",
      color: "var(--text-secondary)",
      padding: "4px",
      lineHeight: 1,
      transition: "color 0.3s ease",
    }}>
      {dark ? "\u263D" : "\u2600\uFE0E"}
    </button>
  );
}

// ─── Main App ─────────────────────────────────────────────
function App() {
  const [activeTab, setActiveTab] = useState("全部");
  const [bookSeed, setBookSeed] = useState(0);

  // For 書櫃: randomly pick 6 cards, re-shuffle on Refresh
  const shuffledBooks = React.useMemo(() => shuffle(BOOK_CARDS).slice(0, 6), [bookSeed]);

  const getCards = () => {
    if (activeTab === "書櫃") return shuffledBooks;
    if (activeTab === "今日") return TODAY_CARDS;
    return ALL_CARDS;
  };

  const cards = getCards();

  return (
    <div style={{ maxWidth: "640px", margin: "0 auto", minHeight: "100vh", background: "var(--bg)" }}>
      <ThemeToggle />

      {/* Header */}
      <div style={{
        position: "sticky", top: 0, zIndex: 10,
        background: "var(--bg)",
        paddingTop: "24px", paddingBottom: "20px",
      }}>
        <div style={{ padding: "0 24px", marginBottom: "20px", display: "flex", alignItems: "baseline", gap: "12px" }}>
          <h1 style={{
            fontFamily: "Georgia, serif",
            fontSize: "14px",
            fontWeight: 400,
            color: "var(--text-secondary)",
            letterSpacing: "0.12em",
            textTransform: "uppercase",
          }}>
            Mo's Feed
          </h1>
          <span style={{
            fontFamily: "monospace",
            fontSize: "10px",
            color: "var(--text-secondary)",
            opacity: 0.5,
            letterSpacing: "0.08em",
          }}>
            {cards.length} entries
          </span>
        </div>
        <TabNav active={activeTab} onChange={setActiveTab} />
        <div style={{ height: "1px", background: "var(--divider)", margin: "20px 24px 0" }} />
      </div>

      {/* Content */}
      <div style={{ padding: "28px 24px 80px" }}>
        {cards.length === 0 && (
          <p style={{ fontFamily: "monospace", fontSize: "12px", color: "var(--text-secondary)" }}>
            No entries yet.
          </p>
        )}
        {cards.map((card, i) => <FeedItem key={card.id + "-" + bookSeed} card={card} index={i} />)}

        {/* Refresh button for 書櫃 */}
        {activeTab === "書櫃" && (
          <button className="refresh-btn" onClick={() => setBookSeed(s => s + 1)}>
            \u21BB REFRESH
          </button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
