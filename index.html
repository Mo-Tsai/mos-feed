<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f1ea; --bg-elevated: #ede9e1;
    --text: #1c1a17; --text-secondary: #5e5b56;
    --text-tertiary: #8a8680; --divider: #ddd9d1;
    --noise-opacity: 0.035;
  }
  [data-theme="dark"] {
    --bg: #0f0e0c; --bg-elevated: #161410;
    --text: #e8e4dc; --text-secondary: #9a9691;
    --text-tertiary: #6a6663; --divider: #2e2a24;
    --noise-opacity: 0.06;
  }
  body {
    background: var(--bg); -webkit-font-smoothing: antialiased;
    font-family: Georgia, 'Times New Roman', serif;
    transition: background 0.4s ease, color 0.4s ease; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    opacity: var(--noise-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 180px 180px;
  }
  #root { position: relative; z-index: 1; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInOut {
    0% { opacity: 0; }
    15% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 4px; }
  .masthead-title { font-family: Georgia, serif; font-weight: 400; font-style: italic; letter-spacing: -0.02em; color: var(--text); line-height: 1; }
  .tab-nav { display: flex; align-items: baseline; gap: 28px; padding: 0 32px; }
  .tab-nav button { background: none; border: none; cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: Georgia, serif; transition: all 0.3s ease; padding: 0; line-height: 1.2; }
  .sub-pill { background: none; border: none; cursor: pointer; font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 0; transition: all 0.2s ease; border-bottom: 1px solid transparent; }
  .swipe-area { position: relative; overflow-y: auto; overflow-x: hidden; touch-action: pan-y; -webkit-overflow-scrolling: touch; }
  .card-slide { position: absolute; inset: 0; padding: 16px 32px 80px; display: flex; flex-direction: column; justify-content: flex-start; transition: transform 0.3s ease, opacity 0.3s ease; will-change: transform, opacity; overflow-y: auto; }
  .expand-row { display: flex; align-items: center; gap: 20px; margin-top: 18px; }
  .source-link { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.1em; text-decoration: none; border-bottom: 1px solid var(--divider); padding-bottom: 1px; transition: all 0.2s ease; color: var(--text-tertiary); }
  .source-link:hover { color: var(--text-secondary); border-color: var(--text-secondary); }
  .end-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; height: 100%; }
  .end-btn { padding: 12px 28px; background: none; border: 1px solid var(--divider); color: var(--text-tertiary); font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.25s ease; }
  .end-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
  .progress-bar { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.14em; color: var(--text-tertiary); text-transform: uppercase; }
  .theme-toggle { position: fixed; top: 28px; right: 12px; z-index: 100; background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text-tertiary); padding: 4px; line-height: 1; transition: color 0.3s ease; font-family: 'Courier New', monospace; }
  .theme-toggle:hover { color: var(--text-secondary); }
  .rule { height: 1px; background: var(--divider); }
  .running-header { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); }
  .word-popup { position: fixed; z-index: 200; background: var(--bg-elevated); border: 1px solid var(--divider); border-radius: 8px; padding: 12px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); min-width: 120px; max-width: 260px; }
  .word-popup-word { font-family: Georgia, serif; font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .word-popup-trans { font-family: system-ui, -apple-system, 'PingFang TC', sans-serif; font-size: 14px; color: var(--text-secondary); line-height: 1.6; font-weight: 300; }
  .speak-btn { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text-tertiary); padding: 2px; transition: color 0.2s; line-height: 1; }
  .speak-btn:hover { color: var(--text-secondary); }
  .speak-btn.active { color: var(--text); }
  .clickable-word { cursor: pointer; border-radius: 2px; transition: background 0.15s; }
  .clickable-word:hover { background: var(--bg-elevated); }
  [data-theme="dark"] .word-popup { box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .az-input { width:100%; background:var(--bg); border:1px solid var(--divider); color:var(--text); padding:7px 10px; font-family:'Courier New',monospace; font-size:11px; outline:none; -webkit-appearance:none; appearance:none; border-radius:0; }
  .az-input:focus { border-color:var(--text-secondary); }
  .nav-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:680px; display:flex; justify-content:space-between; align-items:center; padding:10px 24px 14px; background:var(--bg); border-top:1px solid var(--divider); z-index:50; }
  .nav-btn { background:none; border:1px solid var(--divider); color:var(--text-secondary); font-family:'Courier New',monospace; font-size:16px; cursor:pointer; padding:10px 22px; transition:all 0.2s ease; -webkit-tap-highlight-color:transparent; line-height:1; }
  .nav-btn:hover { border-color:var(--text-secondary); color:var(--text); }
  .nav-btn:active { background:var(--bg-elevated); }
  .nav-btn:disabled { opacity:0.25; cursor:default; border-color:var(--divider); color:var(--text-tertiary); }
  .nav-count { font-family:'Courier New',monospace; font-size:10px; letter-spacing:0.14em; color:var(--text-tertiary); text-transform:uppercase; }
</style>

const { useState, useMemo } = React;

// ===== AZURE TTS =====
let _azToken = null, _azTokenExp = 0, _azAbort = null;
function _xmlEsc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
async function _getAzToken(key, region, signal) {
  const now = Date.now();
  if (_azToken && now < _azTokenExp) return _azToken;
  const res = await fetch(`https://${region}.api.cognitive.microsoft.com/sts/v1.0/issueToken`, { method:'POST', headers:{'Ocp-Apim-Subscription-Key':key}, signal });
  if (!res.ok) throw new Error('Token ' + res.status);
  _azToken = await res.text();
  _azTokenExp = now + 9*60*1000;
  return _azToken;
}
function azureStop() { if (_azAbort) { _azAbort.abort(); _azAbort = null; } }
async function azureSpeak(text, { rate='0%', onStart, onEnd, onError }={}) {
  const key = localStorage.getItem('mf_azureKey') || '';
  const region = localStorage.getItem('mf_azureRegion') || 'eastus';
  const voice = localStorage.getItem('mf_azureVoice') || 'en-US-AriaNeural';
  if (!key) return false;
  azureStop();
  const ctrl = new AbortController(); _azAbort = ctrl;
  try {
    const token = await _getAzToken(key, region, ctrl.signal);
    const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='en-US'><voice name='${voice}'><prosody rate='${rate}'>${_xmlEsc(text)}</prosody></voice></speak>`;
    const res = await fetch(`https://${region}.tts.speech.microsoft.com/cognitiveservices/v1`, {
      method:'POST', signal:ctrl.signal,
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/ssml+xml','X-Microsoft-OutputFormat':'audio-16khz-128kbitrate-mono-mp3'},
      body:ssml
    });
    if (!res.ok) throw new Error('TTS ' + res.status);
    const blob = await res.blob();
    if (ctrl.signal.aborted) return true;
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    if (onStart) onStart(audio);
    audio.onended = () => { URL.revokeObjectURL(url); if (onEnd) onEnd(); };
    audio.onerror = () => { URL.revokeObjectURL(url); if (onError) onError(); };
    await audio.play();
    return true;
  } catch(e) {
    if (e.name === 'AbortError') return true;
    _azToken = null;
    if (onError) onError(e);
    return false;
  }
}

const NAVAL_CARDS = [
  { id:"n1", channel:"Naval", tag:"財富", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Every hour you sell, you lose twice. Once for the hour itself — and once for the leverage that hour could have built. Renting time is not income. It's a slow exit.", zh:"你每賣出一個小時，就輸了兩次：一次是那個小時本身，一次是那個小時原本能建立的槓桿。用時間換錢不叫收入，叫做慢慢離場。", ja:"一時間を売るたびに、二度負ける——その一時間そのものと、その一時間が本来生み出せたレバレッジだ。時間をお金に換えることは収入ではない。ゆっくりと退場しているだけだ。" },
  { id:"n2", channel:"Naval", tag:"槓桿", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Code and media don't sleep. They don't ask for raises. They don't need to be convinced. Build something once — and let it work while you're not watching. This is the only leverage that requires no permission.", zh:"程式碼和媒體不需要睡覺，不會要求加薪，不需要被說服。做一次，然後讓它在你不看的時候繼續運轉。這是唯一不需要任何人許可的槓桿。", ja:"コードとメディアは眠らない。昇給を求めない。説得する必要もない。一度つくれば、あとは見ていなくても回り続ける。これが誰の許可も要らない唯一のレバレッジだ。" },
  { id:"n3", channel:"Naval", tag:"獨特知識", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"If your job can be described in a training manual, you can be replaced by someone cheaper — or eventually, by software. Specific knowledge isn't a skill you learn. It's something you discover by following what genuinely fascinates you, even when it makes no obvious financial sense.", zh:"如果你的工作可以被寫進教學手冊，你就可以被更便宜的人取代——或遲早被軟體取代。獨特知識不是你學來的技能，而是你在跟隨真正讓你著迷的事物時，自然發現的東西。", ja:"もし君の仕事がマニュアルに書けるなら、もっと安い人間に——やがてはソフトウェアに置き換えられる。独自の知識とは学んだスキルではない。本当に心を奪われるものを追いかける中で、自然と見つかるものだ。" },
  { id:"n4", channel:"Naval", tag:"幸福", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Desire is borrowed unhappiness. Each one is a quiet announcement that you're not enough right now. The mind that is always reaching for the next thing never actually arrives anywhere. Happiness isn't achieved — it's what's left when you stop manufacturing reasons to be miserable.", zh:"欲望是預支的痛苦。每一個欲望都在悄悄宣告：你現在還不夠好。一個永遠在伸手抓下一件事的心，其實從未真正抵達任何地方。幸福不是追求來的——而是當你停止製造痛苦理由之後，剩下的東西。", ja:"欲望とは痛みの前借りだ。すべての欲望がひそかにこう宣言している——今の自分ではまだ足りない、と。次の何かに手を伸ばし続ける心は、実はどこにもたどり着いていない。幸福は追い求めるものではない——苦しみの理由をつくるのをやめたとき、そこに残るものだ。" },
  { id:"n5", channel:"Naval", tag:"長期賽局", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Short-term thinkers optimize for the deal. Long-term thinkers optimize for the relationship. The compounding that matters most isn't financial — it's the trust built over years with people who are also playing for keeps.", zh:"短期思維的人為這筆交易而優化，長期思維的人為這段關係而優化。最重要的複利不是財務上的——而是多年來與同樣在認真玩長期遊戲的人，一點一點累積起來的信任。", ja:"短期思考の人はその取引を最適化し、長期思考の人はその関係を最適化する。最も重要な複利は財務的なものではない——長期のゲームを本気でプレイしている人たちと、何年もかけて少しずつ積み上げてきた信頼だ。" },
  { id:"n6", channel:"Naval", tag:"清晰思考", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Your identity is the cage you can't see. Every strong opinion about who you are makes it harder to see who you could become. The clearest thinkers hold their self-concept loosely — willing to be wrong about themselves.", zh:"你的身份認同是你看不見的牢籠。每一個關於「我是這種人」的強烈想法，都讓你更難看清你可以成為什麼。想得最清楚的人，對自我概念的抓握都很輕——他們願意對自己也犯錯。", ja:"アイデンティティは目に見えない檻だ。「自分はこういう人間だ」という強い思い込みの一つひとつが、自分が何になれるかを見えなくしている。最も明晰に考える人たちは、自己概念を軽く握っている——自分についても間違えることを許せる人たちだ。" },
  { id:"n7", channel:"Naval", tag:"責任感", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Put your name on your work. If you won't sign it, you probably shouldn't be doing it. The people who build real reputation take public accountability for outcomes — not just credit when things go well, but ownership when they don't.", zh:"把你的名字放在你的作品上。如果你不敢簽名，你可能就不該做這件事。真正建立名聲的人，對結果承擔公開責任——不只是在事情順利時領功，而是在事情不順時認下來。", ja:"自分の名前を作品に刻め。署名する勇気がないなら、それはやるべきことではないのかもしれない。本当に信用を築く人間は、結果に対して公に責任を負う——うまくいったときだけ手柄を取るのではなく、うまくいかなかったときにも引き受ける。" },
  { id:"n8", channel:"Naval", tag:"閱讀", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Read to understand principles, not to collect facts. Physics, mathematics, philosophy, economics — these are the operating systems of the world. Everything else is just an app running on top of them.", zh:"閱讀是為了理解原則，不是為了收集事實。物理、數學、哲學、經濟學——這些是世界的作業系統，其他所有東西不過是跑在上面的應用程式。", ja:"読書は原理を理解するためにある。事実を集めるためではない。物理学、数学、哲学、経済学——これらは世界のOSだ。他のすべては、その上で動くアプリケーションに過ぎない。" },
  { id:"n9", channel:"Naval", tag:"退休", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Retirement isn't an age or an account balance. It's the moment when what you do and what you love to do are the same thing. Most people never get there because they never stopped to ask what they actually want.", zh:"退休不是一個年紀或一個帳戶數字。退休是你做的事和你想做的事變成同一件事的那一刻。大多數人永遠到不了那裡，因為他們從未停下來問自己真正想要什麼。", ja:"引退とは年齢でも口座の数字でもない。やっていることと、やりたいことが同じになった瞬間——それが引退だ。ほとんどの人がそこにたどり着けないのは、自分が本当に何を望んでいるか、立ち止まって問うことがないからだ。" },
  { id:"n10", channel:"Naval", tag:"決策", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Most decisions are reversible. Treat them like experiments, not commitments. The few that aren't reversible — choose slowly, choose carefully. The asymmetry between these two types is where most people get it wrong.", zh:"大多數決定都是可逆的，把它們當成實驗而不是承諾。少數真正不可逆的決定——慢慢選，仔細選。這兩種決定之間的不對稱性，正是大多數人搞錯的地方。", ja:"ほとんどの決断はやり直せる。コミットメントではなく実験として扱え。本当にやり直せない少数の決断は——ゆっくり選べ、慎重に選べ。この二つの非対称性こそ、大半の人が見誤っているところだ。" },
];

const ELON_CARDS = [
  { id:"e1", channel:"Elon", tag:"第一原理", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"Analogy is how you copy. First principles is how you invent. When everyone else in the rocket industry was buying components, Musk asked: what is a rocket actually made of? Steel, fuel, electronics. He bought the raw materials and built it himself for 2% of the market price.", zh:"類比是你複製的方式，第一原理是你發明的方式。當火箭產業所有人都在買零件時，Musk 問的是：火箭究竟是由什麼組成的？鋼、燃料、電子元件。他直接買原料自己組裝，成本是市價的 2%。", ja:"アナロジーはコピーの方法、第一原理は発明の方法だ。ロケット業界の全員が部品を買っていた時、Muskが問うたのは「ロケットは結局何でできているのか？」——鉄鋼、燃料、電子部品。彼は原材料を直接買い付け、自分で組み立てた。コストは市場価格の2%。" },
  { id:"e2", channel:"Elon", tag:"The Algorithm", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"Step one: question every requirement. Most requirements are wrong — especially ones handed down without explanation. Step two: delete. The best part is the part you don't have to build. Step three: only then simplify. Automating a broken process makes it fail faster.", zh:"第一步：質疑每一個需求，大多數需求都是錯的——尤其是那些沒有解釋就傳下來的。第二步：刪除。最好的部分是你根本不需要做的部分。第三步：才開始簡化。把一個壞掉的流程自動化，只會讓它壞得更快。", ja:"第一ステップ：すべての要件を疑え。大半の要件は間違っている——特に説明なしに降りてきたものは。第二ステップ：削除しろ。最高のパーツは、そもそもやらなくていいパーツだ。第三ステップ：そこからやっと簡素化に入れ。壊れたプロセスを自動化しても、壊れるスピードが上がるだけだ。" },
  { id:"e3", channel:"Elon", tag:"失敗", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"SpaceX's first three rockets exploded. After the third failure, they had enough money for exactly one more attempt. That fourth launch succeeded. If Musk had treated failure as a verdict rather than data, the company would have died with the third rocket.", zh:"SpaceX 前三枚火箭全部爆炸。第三次失敗後，他們剩下的錢只夠再試一次。第四次成功了。如果 Musk 把失敗當成判決而不是數據，這家公司就會跟著第三枚火箭一起消失。", ja:"SpaceXの最初の3機のロケットはすべて爆発した。3回目の失敗後、残された資金はあと1回分だけ。4回目で成功した。もしMuskが失敗を「判決」ではなく「データ」として扱わなかったら、この会社は3機目のロケットと一緒に消えていた。" },
  { id:"e4", channel:"Elon", tag:"使命", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"The goal doesn't have to be achievable to be worth pursuing. The goal of becoming a multi-planetary species might take 200 years. That doesn't make it less real. Direction matters more than arrival — it determines every decision made along the way.", zh:"一個目標不需要在你有生之年達成，才值得追求。讓人類成為多星球物種可能需要 200 年。這不讓這個目標變得不真實。方向比抵達更重要——它決定了沿途每一個決策。", ja:"ある目標は、自分の生きているうちに達成できなくても、追求する価値がある。人類をマルチプラネタリー種にするには200年かかるかもしれない。だからといって、この目標が非現実的になるわけではない。到達よりも方向が重要だ——それが道中のあらゆる意思決定を決める。" },
  { id:"e5", channel:"Elon", tag:"產品設計", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"If a user needs a tutorial, you've already lost. The best interfaces are so obvious they feel inevitable — like the user designed them themselves. Complexity is always the designer's failure, never the user's problem.", zh:"如果使用者需要教學，你就已經輸了。最好的介面清楚到感覺理所當然——像是使用者自己設計的。複雜永遠是設計師的失敗，從來不是使用者的問題。", ja:"ユーザーにチュートリアルが必要な時点で、もう負けている。最高のインターフェースは、当たり前に感じるほど明快だ——まるでユーザー自身がデザインしたかのように。複雑さは常にデザイナーの失敗であり、決してユーザーの問題ではない。" },
  { id:"e6", channel:"Elon", tag:"人才", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"A single brilliant engineer is worth a hundred average ones — not because they work harder, but because they see problems differently and solutions more clearly. The most expensive thing in a company is not talent. It's the wrong talent in the wrong role.", zh:"一個真正出色的工程師抵得上一百個普通的——不是因為他們更努力，而是因為他們對問題的理解不同，對解法的看法更清晰。一家公司最昂貴的不是人才，而是放錯位置的人才。", ja:"本当に優れたエンジニア一人は、凡庸なエンジニア百人に匹敵する——より努力するからではなく、問題の理解が違い、解法の見え方がまるで違うからだ。企業にとって最もコストが高いのは人材ではない。配置を間違えた人材だ。" },
  { id:"e7", channel:"Elon", tag:"速度", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"Move at a pace that feels slightly irresponsible. If it feels safe, you're probably moving too slowly. The risks of going too fast are recoverable. The risk of moving too slowly — in a competitive world — often isn't.", zh:"以一種感覺稍微不負責任的速度前進。如果感覺安全，你可能移動得太慢了。走太快的風險通常可以挽回。在競爭激烈的世界裡，走太慢的風險往往不行。", ja:"少し無責任に感じるくらいのスピードで進め。安全だと感じるなら、おそらく遅すぎる。速すぎるリスクは大抵リカバリーできる。競争の激しい世界では、遅すぎるリスクはたいていリカバリーできない。" },
  { id:"e8", channel:"Elon", tag:"10倍思維", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"10% improvement gets you incremental progress. 10x improvement requires rethinking the entire approach from scratch. Most people never attempt 10x because they assume it requires 10x the resources. It doesn't. It requires 10x the thinking.", zh:"改善 10% 讓你漸進式進步。改善 10 倍要求你從頭重新思考整個方法。大多數人從未嘗試 10 倍，因為他們假設這需要 10 倍的資源。不需要。它需要的是 10 倍的思考。", ja:"10%の改善はインクリメンタルな進歩をもたらす。10倍の改善はアプローチ全体をゼロから考え直すことを要求する。ほとんどの人が10倍を試みないのは、10倍のリソースが必要だと思い込んでいるからだ。違う。必要なのは10倍の思考だ。" },
  { id:"e9", channel:"Elon", tag:"現場主義", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"The problem is always at the product. Not in the boardroom. Not in the spreadsheet. The people making decisions from a distance are always the last to understand what's actually wrong — and the last to fix it.", zh:"問題永遠在產品現場，不在董事會，不在試算表裡。從遠處做決策的人永遠是最後一個理解哪裡出了問題的——也永遠是最後一個修好它的。", ja:"問題は常に製品の現場にある。会議室にも、スプレッドシートの中にもない。遠くから意思決定する人間は、何が壊れているかを最後に理解し——そして最後に直す人間だ。" },
  { id:"e10", channel:"Elon", tag:"Plan B", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"Having a Plan B means you'll use it. The moment you allocate mental space to the exit, you've already started leaving. Commitment isn't stubbornness — it's the refusal to let doubt consume the energy that execution needs.", zh:"有 B 計劃意味著你會用到它。你一旦給退路留了心理空間，就已經開始離開了。承諾不是固執，而是拒絕讓懷疑消耗掉執行所需要的能量。", ja:"プランBがあるということは、それを使うということだ。退路に心理的スペースを与えた瞬間、すでに離れ始めている。コミットメントは頑固さではない——疑念に、実行に必要なエネルギーを食い潰させることを拒否することだ。" },
];

const YOUTUBE_CARDS = [
  { id:"yt1", channel:"Dan Koe", tag:"一人企業重啟", color:"#4A9E96", url:"https://www.notion.so/3448ba4c06338109a457ecf440ce3fd6", en:"Be your own first client — solve your own problems, then sell the solution. Your content is your resume; document from day one, not after you succeed. Go services first to validate your method, then systematize into digital products. AI is your leverage multiplier: let it handle operations while you provide taste and direction. Your advantage isn't doing what AI can't — it's doing what only you would think to do with AI.", zh:"從零開始的第一步不是「找市場」，是成為自己的客戶——先真正解決自己的問題，再把解法賣給有一樣問題的人。你的內容就是你的履歷：從第一天就公開記錄，不是「等成功了再分享」。先做服務驗證方法，再系統化成產品。你的優勢不是做AI做不到的事，而是做「只有你會想到用AI來做」的事。", ja:"ゼロから始めるなら、まず自分自身のクライアントになれ——自分の問題を解決し、その解決策を売る。コンテンツがあなたの履歴書だ。成功してから発信するのではなく、初日から公開記録する。サービスで方法を検証し、デジタル製品に体系化する。AIを使ってあなたにしか思いつかないことをするのが本当の優位性だ。" },
  { id:"yt2", channel:"Dan Koe", tag:"主體性", color:"#4A9E96", url:"https://www.notion.so/3448ba4c0633818baaedfc3fb4044b16", en:"Agency isn't just acting without permission — it's the ability to iterate without permission. High-agency people treat life as an experiment: set goals, form hypotheses, test, fail, adjust. Creators are not content creators — they're context creators. AI can generate content, but cannot replicate your unique life context. Generalists win in the AI age because AI needs a vision and direction, not just execution.", zh:"主體性不只是「不需要許可就行動」，而是「不需要許可就迭代」。高主體性的人把人生當作實驗：設假說、測試、失敗、修正——失敗是實驗的一部分，不是結論。創作者不是「內容創造者」，是「脈絡創造者」。AI可以生成內容，但複製不了你獨特的人生脈絡。通才在AI時代勝出，因為AI需要的是方向和品味，不只是執行。", ja:"主体性とは「許可なく行動する」だけでなく「許可なく反復する」能力だ。主体性の高い人は人生を実験として扱う：仮説を立て、テストし、失敗し、修正する。クリエイターは「コンテンツ」でなく「コンテクスト」の創造者だ。AIはコンテンツを生成できるが、あなた固有の人生の文脈は複製できない。ジェネラリストはAI時代に勝つ——AIには方向性とセンスが必要だからだ。" },
  { id:"yt3", channel:"Dan Koe", tag:"品味即智慧", color:"#4A9E96", url:"https://www.notion.so/33e8ba4c06338164abe8d645bde57115", en:"You have about 36 months before AI redefines what success means. Machines handle speed, repetition, necessity. Humans handle story, novelty, myth, meaning. Taste is the new intelligence — as AI floods the world with content, the scarce skill is judgment about what's worth making. If you can't create art with AI, you were never an artist; you were just good at using a tool that can now be replaced.", zh:"你有大約36個月，在AI把「成功」的定義徹底改變之前做好準備。機器負責速度、重複和必要；人類負責故事、新穎、神話和意義。品味是新的智慧——AI讓創作門檻接近零，反而讓「判斷什麼值得被製作」變成最稀缺的能力。如果你沒辦法用AI創作，你從一開始就不是創作者，你只是擅長使用工具。", ja:"AIが「成功」の定義を変える前に準備する約36ヶ月がある。機械は速度・反復・必然性のため、人間は物語・新奇性・神話・意味のためにある。品味（センス）は新しい知性——AIがコンテンツを溢れさせるほど、何を作る価値があるかの判断力が希少になる。AIで創作できないなら、あなたは最初からアーティストではなく、ツールの使い方が上手かっただけだ。" },
  { id:"yt4", channel:"Naval Pod", tag:"財富定義", color:"#9B7FD4", url:"https://www.notion.so/3448ba4c0633813daa71d5d73ef9c4a5", en:"Wealth is assets that earn while you sleep. Money is social credit. Status is zero-sum — someone must fall for another to rise. Wealth creation is uniquely positive-sum: everyone can prosper simultaneously. Those who attack wealth creators are usually playing the status game — using moral virtue signaling to advance their own position in the hierarchy. Seek wealth, not money or status.", zh:"財富是「睡覺時也在為你工作的資產」。金錢是社會信用。地位是零和遊戲——有人升就有人降。財富創造是正和遊戲，所有人可以同時繁榮。那些攻擊財富創造者的人，通常是在玩地位遊戲——用道德語言來提升自己在階層中的位置。追求財富，不是金錢或地位。", ja:"財富とは「眠っている間も稼いでくれる資産」。お金は社会的信用で、地位はゼロサムゲーム（誰かが上がれば誰かが下がる）。財富の創造だけは正和ゲーム——全員が同時に繁栄できる。財富創造者を攻撃する人は大抵、道徳的言語で自分の階層を上げる地位ゲームをしている。お金や地位ではなく、富を求めよ。" },
  { id:"yt5", channel:"Naval Pod", tag:"場中學習", color:"#9B7FD4", url:"https://www.notion.so/3468ba4c06338106aeb2ffe41eea03c2", en:"All true learning happens in the arena, not the library. Knowledge without context is too abstract — principles only land when you encounter the situation they apply to. The best things in life require indirect pursuit: chase wealth directly and you'll miss it; build genuine value and wealth appears as a byproduct. A taste of freedom makes you unemployable. Once you've truly worked for yourself, you can't go back.", zh:"所有真正的學習都發生在「場」中，不是圖書館裡。沒有情境的知識永遠太抽象——原則只有在你親身遭遇對應情境的那一刻才真正懂。最好的東西都需要間接追求：直接追錢會錯過它，建立真正的價值，財富是副產品。自由的滋味嘗過一次，就再也被雇用不了了。一旦真正為自己工作過，回不去的。", ja:"真の学習はすべてアリーナで起きる——図書館ではない。文脈のない知識は抽象的すぎて使えない。原則は対応する状況に直面したときに初めて理解できる。最良のものはすべて間接的に追う必要がある：富を直接追えば逃げる、価値を創ると富は副産物として現れる。自由の味を一度知ると、もう雇われることはできなくなる。" },
  { id:"yt6", channel:"Naval Pod", tag:"Vibe Coding時代", color:"#9B7FD4", url:"https://www.notion.so/3468ba4c0633815baf74cdc8e5ab10fc", en:"Vibe coding is the new product management. Training models is the new programming. English is the hottest programming language. AI adapts to you faster than you adapt to it — stop learning AI tricks; just talk to it naturally. The timeless principle still holds: become the best in the world at what you do. Keep redefining what you do until this is true. AI makes the scope smaller, not the principle obsolete.", zh:"Vibe coding是新的產品管理，訓練模型是新的程式設計，英文是最熱門的程式語言。AI適應你的速度遠比你適應它的快——停止學AI技巧，直接用自然語言跟它說話。永恆的原則仍然成立：成為你所做之事在世界上最頂尖的人，不斷重新定義你的工作直到這一點成真。AI時代只是讓定義的範圍更小、更精準。", ja:"Vibe codingは新しいプロダクト管理、モデルの訓練は新しいプログラミング、英語が最もホットなプログラミング言語だ。AIはあなたより速く適応する——AIテクニックを学ぶより自然言語で話しかけよ。普遍の原則は変わらない：自分のやることで世界最高になれ、そうなるまで定義を変え続けろ。AIはその範囲を小さくしただけで原則を廃止しない。" },
  { id:"yt7", channel:"Huberman", tag:"週訓架構", color:"#3B82B8", url:"https://www.notion.so/3448ba4c063381b5a87fe174d0e209bd", en:"Huberman runs 3x/week: 60-90 min Zone 2 slow run, 30 min Zone 3/4 tempo, one HIIT. Resistance: legs, shoulders/back/neck, and arms across the week. Heat and cold therapy go on rest days — deliberately separated from training to avoid blunting muscle adaptation signals. No workout needs to be long except the long run. Small, consistent sessions compound into elite fitness.", zh:"Huberman每週跑三次：60-90分Zone 2長跑、30分Zone 3/4配速、一次HIIT。肌力訓練分腿、肩背頸、手臂三天。熱療冷療安排在空日——特意和阻力訓練分開，避免冷療抑制肌肉生長的發炎反應。除長跑外，沒有任何一場訓練需要很長。短而一致的累積，勝過偶爾的超長訓練。", ja:"ハーバーマンは週3回走る：60〜90分ゾーン2長距離・30分ゾーン3/4・HIIT各1回。筋力トレーニングは脚・肩背頸・腕を週に分散。冷熱療法は休息日に配置——筋肥大に必要な炎症反応を阻害しないよう抵抗トレとは意図的に分離する。長距離走以外は長くある必要はない。短く一貫したセッションの積み重ねがエリートフィットネスを作る。" },
  { id:"yt8", channel:"Huberman", tag:"NSDR", color:"#3B82B8", url:"https://www.notion.so/3448ba4c0633818aba68de1e1b3de1b1", en:"NSDR (Non-Sleep Deep Rest) provides the same deep recovery as a nap — without sleep inertia. You stay conscious while the brain shifts from Beta to Theta waves. Unlike naps over 20 minutes, NSDR actually improves nighttime sleep quality. Key mechanism: it restores dopamine in specific brain regions, explaining the post-NSDR boost in motivation and focus. 10-30 minutes, free, no equipment. Google CEO Sundar Pichai practices it daily.", zh:"NSDR（非睡眠深度休息）提供和小睡一樣的深層恢復，但沒有睡眠惰性——你保持清醒，大腦從Beta波滑向Theta波。超過20分鐘的小睡往往讓你昏沉，還影響夜眠；NSDR不會，甚至能改善夜眠品質。關鍵機制是恢復特定腦區的多巴胺水平，解釋了為什麼NSDR後動力和專注力明顯回升。10-30分鐘，免費，無需設備。Google CEO Sundar Pichai每天都在練。", ja:"NSDR（非睡眠深度休息）は昼寝と同等の深い回復を睡眠惰性なしで提供する。意識を保ちながら脳がベータ波からシータ波にシフトする。20分超の昼寝と違い、NSDRは夜間睡眠の質を改善する。主なメカニズム：特定の脳領域のドーパミンを回復させ動機・集中力を向上させる。10〜30分、無料、道具不要。GoogleのサンダーCEOも毎日実践中。" },
  { id:"yt9", channel:"Huberman", tag:"即時降壓", color:"#3B82B8", url:"https://www.notion.so/3458ba4c063381969214d09b28599b66", en:"The goal isn't to avoid stress — it's to de-stress faster each time. The physiological sigh: double nasal inhale (fill lungs completely) followed by a long mouth exhale. Stanford's 2023 clinical trial found 5 minutes of cyclic sighing outperforms meditation, box breathing, and mindfulness for reducing anxiety — and effects last 24 hours. A single sigh lowers heart rate immediately. Free, zero equipment, works anywhere.", zh:"目標不是不緊張，而是每次降壓都比上一次快。生理性嘆息：用鼻子連吸兩口氣讓肺部完全充滿，再完整呼出。Stanford 2023臨床試驗：5分鐘循環嘆息降低焦慮的效果優於冥想和盒式呼吸，而且效果持續24小時。單次嘆息就能在幾秒內降低心率，適合任何緊急場合前使用。不花一毛錢，零設備，任何地方都能用。", ja:"目標はストレスを感じないことではなく、毎回速く回復することだ。生理的なため息：鼻から二重吸気（肺を完全に満たす）→口から長い呼気。スタンフォード2023年臨床試験：5分間の循環ため息は瞑想・ボックス呼吸より不安軽減に優れ、効果は24時間持続する。単発のため息でも即座に心拍数を下げられる。無料、道具不要、どこでも可能。" },
  { id:"yt10", channel:"Huberman", tag:"意志力", color:"#3B82B8", url:"https://www.notion.so/3458ba4c063381978f32ef0990df634f", en:"The anterior mid-cingulate cortex (aMCC) is the physical seat of willpower in the brain — it grows when you do things you don't want to do, and shrinks with avoidance. Research on superagers (100+ year-olds with intact cognition) shows their shared trait is a highly developed aMCC. Small, daily acts of doing what you don't want builds cognitive resilience that compounds for decades. Consistency over intensity.", zh:"前扣帶皮質（aMCC）是大腦中意志力的物理所在地——做你不想做但有益的事時它會增大，持續迴避時它會縮小。100歲以上認知清晰的超齡者，共同特徵是aMCC特別發達——不是天賦，是一生累積的自律。每天一件不想做的小事，比偶爾一次的極限挑戰對aMCC的長期影響更大。一致性勝過強度。", ja:"前帯状皮質（aMCC）は脳の中で意志力の物理的な座だ——やりたくないことをするときに成長し、回避すると縮小する。認知機能が明確な100歳超のスーパーエイジャーの共通点はaMCCが発達していること——才能ではなく生涯の積み重ねだ。毎日の小さな不快の一貫した積み重ねが稀な極限挑戦より長期的影響が大きい。一貫性が強度を上回る。" },
];

  { id:"social_2", channel:"社交雷達", tag:"顏色狩獵", color:"#C97DD4", en:"The color hunting trend is sweeping TikTok — creators assign themselves a color, then spend the day photographing everything they spot in that hue: flowers, storefronts, food, strangers' outfits, and street signs. The format works because it transforms mundane city walks into meditative, low-stakes creative missions that are satisfying to watch.", zh:"「顏色狩獵」趨勢席捲TikTok——創作者指定一個顏色，整天拍攝所有相符事物：花朵、店面、食物、路人穿搭與路牌。這個格式將普通的城市散步轉化為冥想式低壓力創意任務，讓人百看不厭。", ja:"カラーハンティングトレンドがTikTokを席巻。クリエイターが1色を決め花・店先・食べ物・見知らぬ人の服・道路標識など同じ色のものを一日中撮影する。日常の街歩きを瞑想的で低負荷の創作ミッションに変えるフォーマットが観ていて心地よい。", url:"https://newengen.com/insights/april-2026-tiktok-trends/" },
  { id:"social_3", channel:"社交雷達", tag:"Euphoria S3", color:"#C97DD4", en:"Euphoria Season 3 continues dominating TikTok and Instagram two weeks after its April 12 premiere on HBO. The five-year time-jump into adulthood sparked a wave of glow-up comparison videos, iconic dialogue audio edits, and character costume recreations. Viewership is breaking HBO streaming records across North America and Europe.", zh:"《Euphoria》第三季自4月12日在HBO首播兩週後，仍持續統治TikTok與Instagram。劇中設定五年時間跳躍引爆成長對比影片、台詞音訊剪輯與角色服裝複製浪潮，北美與歐洲的HBO串流收視破紀錄。", ja:"Euphoria シーズン3が4月12日のHBO初放送から2週間後もTikTok・Instagramを支配し続ける。5年間のタイムジャンプがグロウアップ比較動画・名台詞音源・コスチューム模倣の波を起こし北米・欧州でHBOストリーミング記録を更新中だ。", url:"https://napoleoncat.com/blog/tiktok-trends/" },
  { id:"social_4", channel:"社交雷達", tag:"每日循環", color:"#C97DD4", en:"The Looping Daily Routines format is gaining traction on TikTok — creators walk or spin in circles while text overlays list the same 3-4 things they repeat every single day. The humor resonates precisely because of how painfully accurate the loop feels, especially among remote workers and freelancers who joke that every day is identical.", zh:"「每日循環」格式在TikTok快速走紅——創作者一邊繞圈或原地旋轉，一邊用文字列出每天重複的3到4件事，精準到令人心痛，尤其戳中每天如出一轍的遠端工作者和自由工作者。", ja:"ループデイリールーティンフォーマットがTikTokで人気。クリエイターが円形に歩きながら毎日繰り返す3〜4つの行動をテキストで列挙するスタイルがリモートワーカーやフリーランサーの「毎日が同じ」という感覚に刺さる。", url:"https://newengen.com/insights/april-2026-tiktok-trends/" },

  { id:"sports_2", channel:"運動", tag:"世界盃倒數", color:"#4A90D9", en:"With under two months until the 2026 FIFA World Cup kicks off in the United States, Canada, and Mexico, all 48 qualified national teams are finalizing squads and playing their last preparatory matches. Global ticket demand has hit record highs for this historic 48-team edition — the largest World Cup ever staged. Host city stadiums are completing final logistics ahead of the June opening.", zh:"距2026年FIFA世界盃在美國、加拿大與墨西哥開幕不足兩個月，48支參賽隊正敲定最終名單並進行最後熱身賽。史上最大規模的48隊賽制創下全球票務需求歷史新高，各主辦城市體育場正完成開幕前最後後勤準備。", ja:"2026 FIFAワールドカップの米国・カナダ・メキシコ開幕まで2か月を切り48の参加国が最終選考と最後の親善試合に臨む。史上最大規模の48チーム大会へのチケット需要が過去最高を更新。開催都市のスタジアムは6月開幕に向けた最終準備を完了しつつある。", url:"https://www.foxsports.com/soccer/fifa-world-cup/news" },
  { id:"sports_3", channel:"運動", tag:"台灣最速男", color:"#4A90D9", en:"Taiwan's fastest sprinter has officially qualified for the 2026 Asian Games with a personal best time that clears the qualifying standard set by the Olympic Council of Asia. This marks a significant milestone for Taiwan's track and field program, which has invested heavily in sprint development over the past four years.", zh:"台灣最速短跑選手以破個人紀錄的成績通過亞洲奧林匹克理事會資格標準，正式取得2026年亞運參賽資格，為台灣田徑計畫四年重點衝刺發展以來的重要里程碑。", ja:"台湾最速のスプリンターがアジアオリンピック評議会の資格標準を突破する自己ベストで2026年アジア大会への出場権を正式に獲得。過去4年間のスプリント強化に集中投資してきた台湾陸上プログラムの重要なマイルストーンとなった。", url:"https://www.taiwanplus.com/news/taiwan-news/sports/260419007/taiwans-fastest-man-qualifies-for-2026-asian-games" },
  { id:"sports_4", channel:"運動", tag:"新北田徑升格", color:"#4A90D9", en:"Taiwan's premier athletics meet has been officially renamed the New Taipei City Athletics Open 2026 and upgraded to World Athletics Continental Tour Silver status. Scheduled for June 6-7 at Banqiao Stadium, the upgrade makes Taiwan one of only a handful of Asian nations to host a meet at this international classification level.", zh:"台灣頂級田徑賽事正式更名為「2026新北市田徑公開賽」，升格為世界田聯洲際巡迴賽銀標，定於6月6至7日在板橋田徑場舉行，使台灣成為少數主辦此等級國際分類賽事的亞洲國家之一。", ja:"台湾最高峰の陸上大会が新北市田径公開賽2026に改名し世界陸連大陸ツアー銀ランクへ格上げされた。6月6〜7日に板橋競技場で開催予定で台湾はこの国際分類水準の大会を主催するアジアの数少ない国の一つとなる。", url:"https://focustaiwan.tw/sports/202604130021" },

  { id:"design_0", channel:"設計", tag:"米蘭設計週", color:"#E8786A", en:"Milan Design Week 2026 continues through April 26 under the overarching theme Be the Project. The concept repositions designers not as makers of finished objects but as active participants shaped by intuition, responsibility, and transformation. The Fuorisalone citywide program spans hundreds of venues across Milan, turning the entire city into a living design conversation.", zh:"2026年米蘭設計週以「Be the Project」為主軸持續至4月26日，將設計師重新定位為由直覺、責任與變革形塑的積極參與者，而非完成品的製造者。Fuorisalone遍佈米蘭數百處場地的展程，使整座城市成為一場流動的設計對話。", ja:"ミラノデザインウィーク2026がBe the Projectを主テーマに4月26日まで続く。デザイナーを完成品の製造者でなく直感・責任・変革に形作られる能動的参加者として再定義する。フオーリサローネはミラノ全域数百会場に広がり都市全体を生きた設計の対話の場にする。", url:"https://parametric-architecture.com/architecture-and-design-events-2026/" },
  { id:"design_1", channel:"設計", tag:"Salone Raritas", color:"#E8786A", en:"The debut Salone Raritas section at this year's Salone del Mobile.Milano is curated by Annalisa Rosso and staged by Formafantasma. The section spotlights limited-production and outsider design objects positioned at the intersection of art, craft, and industrial experimentation — signaling a growing cultural appetite for collectible design as an investment category.", zh:"今年Salone del Mobile.Milano首次登場的「Salone Raritas」單元，由Annalisa Rosso策展、Formafantasma執行，展示介於藝術、工藝與工業實驗之間的限量及獨立設計品，反映收藏設計作為投資類別的文化需求持續升溫。", ja:"今年のSalone del Mobile.MilanoにデビューしたSalone RaritasセクションはAnnalisa Rosso監修・Formafantasma制作で限定生産品とアウトサイダーデザインを特集する。芸術・工芸・工業実験の交差点に位置する作品群がコレクタブルデザインを投資カテゴリーとして定着させつつある文化的需要を示している。", url:"https://www.dezeen.com/eventsguide/" },
  { id:"design_2", channel:"設計", tag:"仿生廚房", color:"#E8786A", en:"EuroCucina 2026, held alongside Salone del Mobile, reveals biophilic kitchen environments as the dominant design narrative this cycle. Advanced technology is being softened by living materials, tactile finishes, and spatial warmth — plants integrated into cabinetry, fermentation stations built into countertops, and lighting systems that mimic circadian rhythms.", zh:"與Salone del Mobile同期舉辦的EuroCucina 2026，將仿生廚房環境定為本屆主導設計敘事：尖端科技被自然材料、觸感飾面與空間溫度所柔化——植物整合進廚櫃、發酵站內嵌入料理台面、照明系統模仿晝夜節律。", ja:"Salone del Mobileと同時開催のEuroCucina 2026が今サイクルの支配的デザイン論としてバイオフィリックなキッチン環境を提示。先進技術が生きた素材・触覚的仕上げ・空間的温もりで和らげられ植物が収納に統合され発酵ステーションがカウンターに組み込まれ照明が概日リズムを模倣する。", url:"https://www.wallpaper.com/design-interiors/design-exhibitions-2026" },
  { id:"design_3", channel:"設計", tag:"高點市場", color:"#E8786A", en:"High Point Market, the world's largest home furnishings trade show, runs April 25-29 in North Carolina. The 2026 edition signals a maturation phase of sustainable design: environmental responsibility is no longer a marketing claim but is now embedded in procurement strategy, supply chain design, and material sourcing. Brands that cannot demonstrate verifiable sustainability credentials are increasingly being shut out.", zh:"全球最大家居貿易展高點市場4月25至29日在北卡羅萊納州舉行。2026年展會標誌著永續設計成熟階段：環境責任不再只是行銷說辭，已深植於採購策略、供應鏈設計與原料來源。無法提供可驗證永續資歷的品牌正逐漸遭拒於門外。", ja:"世界最大のホームファーニッシングトレードショーであるハイポイントマーケットが4月25〜29日に北カロライナ州で開催される。2026年版は持続可能なデザインの成熟段階を示す。環境への責任はもはやマーケティング訴求でなく調達戦略・サプライチェーン設計・材料調達に組み込まれており検証可能なサステナビリティ実績を示せないブランドは締め出されつつある。", url:"https://www.dezeen.com/eventsguide/" },
  { id:"design_4", channel:"設計", tag:"蒙特婁設計週", color:"#E8786A", en:"The inaugural Montreal Design Week begins April 28, timed to coincide with the city's 20th anniversary as a UNESCO Creative City of Design. Running through May 7, the program spans exhibitions and installations across heritage buildings and public spaces, aiming to position Montreal's design community on the global stage alongside Milan, Helsinki, and Seoul.", zh:"首屆蒙特婁設計週4月28日揭幕，正值該市獲認定為UNESCO創意設計城市20週年。活動延伸至5月7日，橫跨歷史建築與公共空間的展覽與裝置，目標是將蒙特婁設計社群推向與米蘭、赫爾辛基、首爾齊名的全球舞台。", ja:"初回モントリオールデザインウィークが4月28日に開幕しUNESCOクリエイティブ・デザイン都市認定20周年と重なる。5月7日まで続くプログラムが歴史建築と公共空間に展覧会とインスタレーションを広げミラン・ヘルシンキ・ソウルと並ぶグローバルな舞台にモントリオールのデザインコミュニティを押し出す。", url:"https://parametric-architecture.com/architecture-and-design-events-2026/" },

  { id:"food_0", channel:"餐飲", tag:"FABI大獎", color:"#6DB56D", en:"The 2026 FABI Award winners from the National Restaurant Association Show reflect this year's dominant food trends: high-protein formats, bold global flavors, and textural complexity have replaced the plant-based alternatives that dominated previous years. While plant-based products are still represented, they no longer command the same industry excitement as gut-health, fermentation, and globally inspired condiments.", zh:"2026年全國餐廳協會展FABI大獎得主反映今年主流食品趨勢：高蛋白格式、大膽全球風味與複雜質感取代過去數年主導地位的植物替代品。植物性產品雖仍在場，但已無法像腸道健康、發酵與全球風味調味料那樣引發業界興奮。", ja:"全米レストラン協会ショーの2026 FABIアワード受賞者が今年の主要食品トレンドを反映。高タンパクフォーマット・大胆なグローバルフレーバー・テクスチャーの複雑さが過去数年を席巻した植物性代替品に取って代わった。植物性製品はまだ存在するがガット・ヘルスや発酵やグローバルソースほどの業界興奮を集められていない。", url:"https://www.restaurantbusinessonline.com/food/national-restaurant-association-shows-2026-fabi-award-winners-reflect-top-trends" },
  { id:"food_1", channel:"餐飲", tag:"發酵前沿", color:"#6DB56D", en:"Fermented and intentionally preserved flavors are the defining culinary movement of 2026 according to the James Beard Foundation. From lacto-fermented hot sauces and cured proteins to aged vinegars and preserved citrus, chefs are using fermentation not just for depth of flavor but as a storytelling tool connecting menus to place, season, and cultural heritage.", zh:"詹姆斯比爾德基金會指出，發酵與刻意醃漬風味是2026年決定性的烹飪運動。從乳酸發酵辣醬、醃製蛋白質到熟成醋與醃漬柑橘，主廚把發酵用作風味之外的敘事工具，連結菜單與在地、季節與文化遺產。", ja:"ジェームズ・ビアード財団によると発酵と意図的な保存風味が2026年を定義する料理の動きだ。乳酸発酵ホットソース・塩漬けタンパク・熟成酢・保存柑橘まで シェフは発酵を風味の深みだけでなくメニューを場所・季節・文化遺産と結ぶ物語装置として使っている。", url:"https://www.jamesbeard.org/stories/top-restaurant-food-trends-2026" },
  { id:"food_2", channel:"餐飲", tag:"休士頓美食", color:"#6DB56D", en:"The 2026 CultureMap Houston Tastemaker Awards drew over 1,000 guests to Silver Street Studios on April 16, celebrating the city's defining dining talent across categories from Best New Restaurant to Best Chef. The event, now in its 12th year, has become the city's marquee food event where A-list culinary names meet passionate dining fans.", zh:"2026年CultureMap休士頓美食品鑑獎4月16日在Silver Street Studios吸引逾1,000名賓客，表彰從最佳新餐廳到最佳主廚等類別的城市頂尖餐飲人才。這個進入第12年的年度盛事已成為頂尖廚界人士與熱情美食粉絲相聚的城市旗艦食事。", ja:"2026 CultureMapヒューストン・テイストメーカーアワードが4月16日にシルバー・ストリート・スタジオに1000人超のゲストを集め最優秀新レストランから最優秀シェフまでの各部門で街を代表する飲食人材を称えた。12年目を迎えるこのイベントはA級シェフ名と情熱的な食通が交わる市内最高峰の食イベントとなっている。", url:"https://houston.culturemap.com/news/restaurants-bars/tastemaker-awards-recap-sponsors/" },
  { id:"food_3", channel:"餐飲", tag:"RAMMYS決賽", color:"#6DB56D", en:"The Restaurant Association of Metropolitan Washington unveiled the finalists for the 44th Annual RAMMYS Awards on April 6, 2026. Winners will be announced at a gala ceremony on June 29. The RAMMYS are considered the highest honor in Washington D.C.'s restaurant industry, covering categories from Outstanding Pastry Chef to Restaurant of the Year.", zh:"大華盛頓地區餐廳協會4月6日公布第44屆RAMMYS年度餐廳大獎決賽名單，得獎者將於6月29日頒獎晚宴揭曉。RAMMYS被認為是華盛頓特區餐飲業最高榮譽，涵蓋最傑出糕點主廚至年度餐廳等類別。", ja:"大ワシントン地区レストラン協会が4月6日に第44回RAMMYS年次アワードのファイナリストを発表。受賞者は6月29日のガラ式典で発表される。RAMMYSはワシントンD.C.のレストラン業界最高の栄誉とされ最優秀ペストリーシェフからレストラン・オブ・ザ・イヤーまでを網羅する。", url:"https://www.therammys.org/2026-finalists" },
  { id:"food_4", channel:"餐飲", tag:"美食趨勢", color:"#6DB56D", en:"The James Beard Foundation's 2026 restaurant trend report highlights three dominant forces reshaping dining this year: savory cocktails blurring the bar-kitchen boundary, intensely fermented or preserved ingredients driving bold menus, and affordable luxury tasting menus that deliver fine dining at accessible price points.", zh:"詹姆斯比爾德基金會2026年餐廳趨勢報告指出三股主導力量重塑今年餐飲：模糊酒吧與廚房界線的鹹味調酒、驅動大膽菜單的高強度發酵或醃漬食材，以及在可及價格提供精緻饗宴的平價奢華品嚐菜單。", ja:"ジェームズ・ビアード財団の2026年レストラントレンドレポートが今年の飲食を再形成する3つの支配的な力を強調。バーとキッチンの境界を曖昧にするセイボリーカクテル・大胆なメニューを牽引する強烈な発酵・保存食材・リーズナブルな価格でファインダイニングを届けるアフォーダブル・ラグジュアリーテイスティングメニューだ。", url:"https://www.jamesbeard.org/stories/top-restaurant-food-trends-2026" },

const TECH_CARDS = [
  { id:"tech_0", channel:"科技", tag:"新AI模型競賽", color:"#5B8ED6", en:"April 2026 is seeing a wave of new AI model launches: Anthropic released Claude Mythos 5 with 10 trillion parameters optimized for cybersecurity and coding, Google DeepMind's Gemini 3.1 adds real-time voice and image analysis, and Huawei unveiled its 950PR chip as a direct rival to Nvidia's best. The multi-front AI model race is accelerating faster than most analysts predicted six months ago.", zh:"2026年4月迎來AI模型發布浪潮：Anthropic發布100兆參數的Claude Mythos 5，專為資安與程式設計優化；Google DeepMind的Gemini 3.1新增即時語音與圖像分析；華為發布950PR晶片直接對標Nvidia最強產品。多線AI模型競賽的加速程度超過大多數分析師半年前的預測。", ja:"2026年4月にAIモデル発表ラッシュ。Anthropicがサイバーセキュリティとコーディングに最適化した100兆パラメータのClaude Mythos 5を発表し、Google DeepMindのGemini 3.1がリアルタイム音声・画像分析を追加、HuaweiがNvidiaのベスト製品に真っ向勝負する950PRチップを公開。多面的なAIモデル競争は半年前の大多数のアナリスト予測を超えるペースで加速している。", url:"https://blog.mean.ceo/new-ai-model-releases-news-april-2026/" },
  { id:"tech_1", channel:"科技", tag:"AI代理時代", color:"#5B8ED6", en:"The defining tech trend of spring 2026 is the shift from AI that answers to AI that acts. Agentic AI systems — capable of holding long context, forming multi-step plans, using tools, verifying results, and completing entire tasks autonomously — have moved from research demos to enterprise production across healthcare, legal, finance, and software development.", zh:"2026年春天最具決定性的科技趨勢，是從「回答問題的AI」轉向「執行任務的AI」。能夠保持長上下文、制定多步驟計畫、使用工具、驗證結果並自主完成整個任務的AI Agent系統，已從研究展示移入醫療、法律、金融與軟體開發的企業生產環境。", ja:"2026年春の決定的なテクノロジートレンドは質問に答えるAIから実行するAIへのシフトだ。長いコンテキストを保持し多段階プランを立てツールを使い結果を検証してタスク全体を自律的に完成させるAIエージェントシステムが研究デモから医療・法律・金融・ソフトウェア開発の企業本番環境に移行した。", url:"https://news.microsoft.com/source/features/ai/whats-next-in-ai-7-trends-to-watch-in-2026/" },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getTodaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed >>> 0;
  const rand = () => {
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    return (s >>> 0) / 4294967296;
  };
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDateString() {
  return new Date().toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" }).toUpperCase();
}

  return ReactDOM.createPortal(
    <div className="word-popup" style={{ left: popupX + "px", top: popupY + "px" }} onClick={e => e.stopPropagation()}>
      <div className="word-popup-word">

function CardView({ card, idx, total }) {
  const [lang, setLang] = useState(null);
  const [popup, setPopup] = useState(null);
  const [speaking, setSpeaking] = useState(false);
  const abortRef = React.useRef(null);
  const audioRef = React.useRef(null);
  const toggle = (target) => setLang(lang === target ? null : target);
  const isOpen = lang !== null;
  const text = lang === "ja" ? (card.ja || card.zh) : card.zh;

  const speakWord = React.useCallback(async (word) => {
    const ok = await azureSpeak(word, { rate:'-15%' });
    if (!ok) {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word);
      u.lang = "en-US"; u.rate = 0.82;
      const voices = speechSynthesis.getVoices();
      const picked = ["Google US English","Microsoft Aria Online (Natural) - English (United States)","Samantha","Alex"].map(n => voices.find(v => v.name === n)).find(Boolean);
      if (picked) u.voice = picked;
      speechSynthesis.speak(u);
    }
  }, []);

  const speakAll = React.useCallback(async (e) => {
    e.stopPropagation();
    if (speaking) {
      azureStop();
      if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
      speechSynthesis.cancel();
      setSpeaking(false);
      return;
    }
    setSpeaking(true);
    const ok = await azureSpeak(card.en, {
      rate: '-5%',
      onStart: (audio) => { audioRef.current = audio; },
      onEnd: () => { audioRef.current = null; setSpeaking(false); },
      onError: () => { audioRef.current = null; setSpeaking(false); }
    });
    if (!ok) {
      const u = new SpeechSynthesisUtterance(card.en);
      u.lang = "en-US"; u.rate = 0.88; u.pitch = 1.0; u.volume = 1.0;
      const tryVoices = () => {
        const voices = speechSynthesis.getVoices();
        const picked = ["Google US English","Microsoft Aria Online (Natural) - English (United States)","Microsoft Guy Online (Natural) - English (United States)","Samantha","Alex"].map(n => voices.find(v => v.name === n)).find(Boolean);
        if (picked) u.voice = picked;
      };
      if (speechSynthesis.getVoices().length > 0) tryVoices();
      else { speechSynthesis.onvoiceschanged = () => { tryVoices(); speechSynthesis.onvoiceschanged = null; }; }
      u.onend = () => setSpeaking(false);
      u.onerror = () => setSpeaking(false);
      speechSynthesis.speak(u);
    }
  }, [card.en, speaking]);

  // Stop speaking & close popup when card changes
  React.useEffect(() => {
    return () => {
      azureStop();
      if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
      speechSynthesis.cancel();
      setSpeaking(false);
      setPopup(null);
      if (abortRef.current) abortRef.current.abort();
    };
  }, [card.id]);

  const handleWordClick = React.useCallback(async (e, rawWord) => {
    e.stopPropagation();
    const clean = rawWord.replace(/[^a-zA-Z'-]/g, "");
    if (!clean || clean.length < 2) return;
    // Abort previous in-flight request
    if (abortRef.current) abortRef.current.abort();
    const ctrl = new AbortController();
    abortRef.current = ctrl;
    const rect = e.target.getBoundingClientRect();
    setPopup({ word: clean, x: rect.left, y: rect.bottom + 6, translation: null, loading: true });
    try {
      const res = await fetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(clean) + "&langpair=en|zh-TW", { signal: ctrl.signal });
      const data = await res.json();
      setPopup(p => p && p.word === clean ? { ...p, translation: data.responseData.translatedText, loading: false } : p);
    } catch (err) {
      if (err.name !== "AbortError") {
        setPopup(p => p && p.word === clean ? { ...p, translation: "(翻譯失敗)", loading: false } : p);
      }
    }
  }, []);

  // Close popup on outside click
  React.useEffect(() => {
    if (!popup) return;
    const close = () => setPopup(null);
    const timer = setTimeout(() => window.addEventListener("click", close), 10);
    return () => { clearTimeout(timer); window.removeEventListener("click", close); };
  }, [popup]);

  const words = useMemo(() => card.en.split(/(\s+)/).map((chunk, i) => {
    if (/^\s+$/.test(chunk)) return chunk;
    return <span key={i} className="clickable-word" onPointerDown={e => e.stopPropagation()} onClick={(e) => handleWordClick(e, chunk)}>{chunk}</span>;
  }), [card.en, handleWordClick]);

  return (
    <div style={{ padding:"10px 32px 32px" }}>
      <div style={{ height:"2px", background:card.color, opacity:0.6, margin:"-10px -32px 14px", width:"calc(100% + 64px)" }} />
      <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"14px" }}>
        <span style={{ display:"inline-block", width:"18px", height:"1px", background:card.color, flexShrink:0 }} />
        <span style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.18em", textTransform:"uppercase", color:card.color, opacity:0.9 }}>{card.channel}</span>
        <span style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.18em", textTransform:"uppercase", color:"var(--text-tertiary)" }}>{card.tag}</span>
        <button className={"speak-btn" + (speaking ? " active" : "")} onPointerDown={e => e.stopPropagation()} onClick={speakAll} title={speaking ? "停止朗讀" : "朗讀全文"} style={{ marginLeft:"auto" }}>{speaking ? "■" : "🔊"}</button>
      </div>
      <p style={{ fontFamily:"Georgia,'Times New Roman',serif", fontSize:"20px", lineHeight:1.75, color:"var(--text)", margin:0, maxWidth:"52ch", letterSpacing:"-0.01em" }}>{words}</p>
      <WordPopup popup={popup} onSpeak={speakWord} />
      <div style={{ overflow:"hidden", maxHeight:isOpen?"500px":"0px", transition:"max-height 0.45s cubic-bezier(0.4,0,0.2,1)" }}>
        <div style={{ marginTop:"16px", paddingTop:"14px", borderTop:"1px solid var(--divider)" }}>
          <p style={{ fontFamily:"system-ui,-apple-system,'PingFang TC','Hiragino Sans',sans-serif", fontSize:"15px", lineHeight:1.9, color:"var(--text-secondary)", margin:0, maxWidth:"46ch", fontWeight:300 }}>{text}</p>
        </div>
      </div>
      <div className="expand-row" style={{ marginTop:"14px" }}>
        <span onPointerDown={e => e.stopPropagation()} onClick={e => { e.stopPropagation(); toggle("zh"); }} style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.14em", textTransform:"uppercase", color: lang==="zh" ? "var(--text-secondary)" : "var(--text-tertiary)", cursor:"pointer" }}>{lang==="zh" ? "close ↑" : "中文 ↓"}</span>
        <span onPointerDown={e => e.stopPropagation()} onClick={e => { e.stopPropagation(); toggle("ja"); }} style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.14em", textTransform:"uppercase", color: lang==="ja" ? "var(--text-secondary)" : "var(--text-tertiary)", cursor:"pointer" }}>{lang==="ja" ? "close ↑" : "日本語 ↓"}</span>
        {card.url && (<a href={card.url} target="_blank" rel="noopener noreferrer" onPointerDown={e => e.stopPropagation()} onClick={e => e.stopPropagation()} className="source-link">source ↗</a>)}
      </div>
      <div style={{ position:"relative", marginTop:"16px" }}>
        <div style={{ height:"1px", background:"var(--divider)" }} />
        <div style={{ position:"absolute", top:0, left:0, height:"1px", background:"var(--text-tertiary)", width:((idx+1)/total*100)+"%", transition:"width 0.3s" }} />
      </div>
    </div>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState("Today");
  const [todaySub, setTodaySub] = useState("全部");
  const [bookSub, setBookSub] = useState("Dan Koe");
  const [bookSeed, setBookSeed] = useState(() => getTodaySeed());
  const [idx, setIdx] = useState(0);
  const [dir, setDir] = useState(0); // -1=left, 1=right, 0=none
  const touchRef = React.useRef(null);

  const cards = useMemo(() => {
    if (activeTab === "Bookshelf") {
      const channelCards = BOOK_CARDS.filter(c => c.channel === bookSub);
      const channelHash = bookSub.split('').reduce((a, c) => (a * 31 + c.charCodeAt(0)) | 0, 0);
      return seededShuffle(channelCards, (bookSeed ^ channelHash) >>> 0).slice(0, 2);
    }
    if (todaySub === "世界新聞") return NEWS_CARDS;
    if (todaySub === "社交雷達") return SOCIAL_CARDS;
    if (todaySub === "財經") return FINANCE_CARDS;
    if (todaySub === "運動") return SPORTS_CARDS;
    if (todaySub === "設計") return DESIGN_CARDS;
    if (todaySub === "餐飲") return FOOD_CARDS;
    if (todaySub === "科技") return TECH_CARDS;
    return TODAY_CARDS;
  }, [activeTab, todaySub, bookSub, bookSeed]);

  const total = cards.length;
  const atEnd = idx >= total;

  const [resumeMsg, setResumeMsg] = useState(null);
  const lsKey = activeTab === "Bookshelf"
    ? "mosfeed_Bookshelf_" + bookSub
    : "mosfeed_" + activeTab + "_" + todaySub;

  // Read localStorage on tab/sub change
  React.useEffect(() => {
    const key = activeTab === "Bookshelf"
      ? "mosfeed_Bookshelf_" + bookSub
      : "mosfeed_" + activeTab + "_" + todaySub;
    try {
      const saved = parseInt(localStorage.getItem(key), 10);
      if (saved > 0 && saved < cards.length) {
        setIdx(saved); setDir(0);
        setResumeMsg({ idx: saved, total: cards.length });
        setTimeout(() => setResumeMsg(null), 1500);
        return;
      }
    } catch(e) {}
    setIdx(0); setDir(0);
  }, [activeTab, todaySub, bookSub]);

  // Reset on shuffle
  React.useEffect(() => {
    if (bookSeed !== getTodaySeed()) { setIdx(0); setDir(0); try { localStorage.removeItem("mosfeed_Bookshelf_" + bookSub); } catch(e) {} }
  }, [bookSeed]);

  const go = (newIdx) => {
    if (newIdx < 0) return;
    if (newIdx > total) return;
    setDir(newIdx > idx ? 1 : -1);
    setIdx(newIdx);
    try { localStorage.setItem(lsKey, String(newIdx)); } catch(e) {}
  };

  // Keyboard
  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === "ArrowRight" || e.key === "ArrowDown") go(idx + 1);
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") go(idx - 1);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [idx, total]);

  // Touch
  const onTouchStart = (e) => { touchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
  const onTouchEnd = (e) => {
    if (!touchRef.current) return;
    const dx = e.changedTouches[0].clientX - touchRef.current.x;
    const dy = e.changedTouches[0].clientY - touchRef.current.y;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx < 0) go(idx + 1);
      else go(idx - 1);
    }
    touchRef.current = null;
  };

  const headerHeight = "200px";

  return (
    <div style={{ maxWidth:"680px", margin:"0 auto", height:"100vh", overflow:"hidden", display:"flex", flexDirection:"column" }}>
      <ThemeToggle />
      {/* Header */}
      <div style={{ flexShrink:0, background:"var(--bg)", paddingTop:"20px", zIndex:10 }}>
        <div style={{ padding:"0 32px", marginBottom:"16px" }}>
          <div style={{ marginBottom:"4px" }}>
            <h1 className="masthead-title" style={{ fontSize:"32px" }}>Mo's Feed</h1>
            <span className="running-header" style={{ display:"block", marginTop:"4px" }}><span style={{ opacity:0.85 }}>updated 04/24/2026</span><span style={{ opacity:0.75, marginLeft:"10px" }}>v2.23</span></span>
          </div>
          <div className="rule" />
        </div>
        <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", padding:"0 32px" }}>
          <div className="tab-nav" style={{ padding:0 }}>
            {TABS.map(tab => {
              const isActive = activeTab === tab;
              return (
                <button key={tab} onClick={() => { setActiveTab(tab); setTodaySub("全部"); setBookSub("Dan Koe"); }}
                  style={{ fontSize:isActive?"26px":"15px", fontWeight:isActive?600:400, fontStyle:isActive?"normal":"italic", color:isActive?"var(--text)":"var(--text-tertiary)", letterSpacing:isActive?"-0.01em":"0" }}>
                  {tab}
                </button>
              );
            })}
          </div>
        </div>
        {activeTab === "Today" && (
          <div style={{ display:"flex", gap:"20px", padding:"14px 32px 0", overflowX:"auto" }}>
            {TODAY_SUBS.map(sub => (
              <button key={sub} className="sub-pill" onClick={() => setTodaySub(sub)}
                style={{ color:todaySub===sub?"var(--text-secondary)":"var(--text-tertiary)", borderBottomColor:todaySub===sub?"var(--text-secondary)":"transparent", opacity:todaySub===sub?1:0.6 }}>
                {sub}
              </button>
            ))}
          </div>
        )}
        {activeTab === "Bookshelf" && (
          <div style={{ display:"flex", gap:"20px", padding:"14px 32px 0", overflowX:"auto" }}>
            {BOOK_SUBS.map(sub => (
              <button key={sub} className="sub-pill" onClick={() => { setBookSub(sub); setIdx(0); }}
                style={{ color:bookSub===sub?"var(--text-secondary)":"var(--text-tertiary)", borderBottomColor:bookSub===sub?"var(--text-secondary)":"transparent", opacity:bookSub===sub?1:0.6 }}>
                {sub}
              </button>
            ))}
          </div>
        )}
        <div style={{ padding:"0 32px", marginTop:"10px" }}><div className="rule" /></div>
        {resumeMsg && (
          <div className="running-header" style={{ padding:"6px 32px", animation:"fadeInOut 1.5s ease forwards" }}>
            繼續閱讀 {resumeMsg.idx + 1}/{resumeMsg.total}
          </div>
        )}
      </div>

      {/* Swipe area */}
      <div className="swipe-area" style={{ flex:1 }}
        onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
      >
        {atEnd ? (
          <div className="card-slide" style={{ position:"relative", transform:"none" }}>
            <EndScreen
              onPrev={() => go(total - 1)}
              onShuffle={() => setBookSeed(Date.now())}
              isBookshelf={activeTab === "Bookshelf"}
            />
          </div>
        ) : (
          <div className="card-slide" key={cards[idx].id + "-" + bookSeed} style={{ position:"relative", transform:"none" }}>
            <CardView card={cards[idx]} idx={idx} total={total} />
          </div>
        )}
      </div>

      {/* Nav bar */}
      <div className="nav-bar">
        <button className="nav-btn" onClick={() => go(idx - 1)} disabled={idx === 0}>←</button>
        <span className="nav-count">{atEnd ? `${total}/${total}` : `${idx + 1} / ${total}`}</span>
        <button className="nav-btn" onClick={() => go(idx + 1)} disabled={atEnd}>→</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
