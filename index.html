<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mo's Feed</title>
<link rel="icon" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f1ea; --bg-elevated: #ede9e1;
    --text: #1c1a17; --text-secondary: #8a8680;
    --text-tertiary: #b8b4ae; --divider: #ddd9d1;
    --noise-opacity: 0.035;
  }
  [data-theme="dark"] {
    --bg: #0f0e0c; --bg-elevated: #161410;
    --text: #e8e4dc; --text-secondary: #5a5650;
    --text-tertiary: #383430; --divider: #242018;
    --noise-opacity: 0.06;
  }
  body {
    background: var(--bg); -webkit-font-smoothing: antialiased;
    font-family: Georgia, 'Times New Roman', serif;
    transition: background 0.4s ease, color 0.4s ease; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    opacity: var(--noise-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 180px 180px;
  }
  #root { position: relative; z-index: 1; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 4px; }
  .masthead-title { font-family: Georgia, serif; font-weight: 400; font-style: italic; letter-spacing: -0.02em; color: var(--text); line-height: 1; }
  .tab-nav { display: flex; align-items: baseline; gap: 28px; padding: 0 32px; }
  .tab-nav button { background: none; border: none; cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: Georgia, serif; transition: all 0.3s ease; padding: 0; line-height: 1.2; }
  .sub-pill { background: none; border: none; cursor: pointer; font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 0; transition: all 0.2s ease; border-bottom: 1px solid transparent; }
  .swipe-area { position: relative; overflow: hidden; touch-action: pan-y; }
  .card-slide { position: absolute; inset: 0; padding: 40px 32px 80px; display: flex; flex-direction: column; justify-content: flex-start; transition: transform 0.3s ease, opacity 0.3s ease; will-change: transform, opacity; overflow-y: auto; }
  .expand-row { display: flex; align-items: center; gap: 20px; margin-top: 18px; }
  .source-link { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.1em; text-decoration: none; border-bottom: 1px solid var(--divider); padding-bottom: 1px; transition: all 0.2s ease; color: var(--text-tertiary); }
  .source-link:hover { color: var(--text-secondary); border-color: var(--text-secondary); }
  .end-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; height: 100%; }
  .end-btn { padding: 12px 28px; background: none; border: 1px solid var(--divider); color: var(--text-tertiary); font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.25s ease; }
  .end-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
  .progress-bar { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.14em; color: var(--text-tertiary); text-transform: uppercase; }
  .theme-toggle { position: fixed; top: 28px; right: 28px; z-index: 100; background: none; border: none; cursor: pointer; font-size: 15px; color: var(--text-tertiary); padding: 4px; line-height: 1; transition: color 0.3s ease; font-family: 'Courier New', monospace; }
  .theme-toggle:hover { color: var(--text-secondary); }
  .rule { height: 1px; background: var(--divider); }
  .running-header { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); }
</style>
</head>
<body data-theme="light">
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const NAVAL_CARDS = [
  { id:"n1", channel:"Naval", tag:"財富", color:"#7C6AF7", en:"Every hour you sell, you lose twice. Once for the hour itself — and once for the leverage that hour could have built. Renting time is not income. It's a slow exit.", zh:"你每賣出一個小時，就輸了兩次：一次是那個小時本身，一次是那個小時原本能建立的槓桿。用時間換錢不叫收入，叫做慢慢離場。", ja:"一時間を売るたびに、二度負ける——その一時間そのものと、その一時間が本来生み出せたレバレッジだ。時間をお金に換えることは収入ではない。ゆっくりと退場しているだけだ。" },
  { id:"n2", channel:"Naval", tag:"槓桿", color:"#7C6AF7", en:"Code and media don't sleep. They don't ask for raises. They don't need to be convinced. Build something once — and let it work while you're not watching. This is the only leverage that requires no permission.", zh:"程式碼和媒體不需要睡覺，不會要求加薪，不需要被說服。做一次，然後讓它在你不看的時候繼續運轉。這是唯一不需要任何人許可的槓桿。", ja:"コードとメディアは眠らない。昇給を求めない。説得する必要もない。一度つくれば、あとは見ていなくても回り続ける。これが誰の許可も要らない唯一のレバレッジだ。" },
  { id:"n3", channel:"Naval", tag:"獨特知識", color:"#7C6AF7", en:"If your job can be described in a training manual, you can be replaced by someone cheaper — or eventually, by software. Specific knowledge isn't a skill you learn. It's something you discover by following what genuinely fascinates you, even when it makes no obvious financial sense.", zh:"如果你的工作可以被寫進教學手冊，你就可以被更便宜的人取代——或遲早被軟體取代。獨特知識不是你學來的技能，而是你在跟隨真正讓你著迷的事物時，自然發現的東西。", ja:"もし君の仕事がマニュアルに書けるなら、もっと安い人間に——やがてはソフトウェアに置き換えられる。独自の知識とは学んだスキルではない。本当に心を奪われるものを追いかける中で、自然と見つかるものだ。" },
  { id:"n4", channel:"Naval", tag:"幸福", color:"#7C6AF7", en:"Desire is borrowed unhappiness. Each one is a quiet announcement that you're not enough right now. The mind that is always reaching for the next thing never actually arrives anywhere. Happiness isn't achieved — it's what's left when you stop manufacturing reasons to be miserable.", zh:"欲望是預支的痛苦。每一個欲望都在悄悄宣告：你現在還不夠好。一個永遠在伸手抓下一件事的心，其實從未真正抵達任何地方。幸福不是追求來的——而是當你停止製造痛苦理由之後，剩下的東西。", ja:"欲望とは痛みの前借りだ。すべての欲望がひそかにこう宣言している——今の自分ではまだ足りない、と。次の何かに手を伸ばし続ける心は、実はどこにもたどり着いていない。幸福は追い求めるものではない——苦しみの理由をつくるのをやめたとき、そこに残るものだ。" },
  { id:"n5", channel:"Naval", tag:"長期賽局", color:"#7C6AF7", en:"Short-term thinkers optimize for the deal. Long-term thinkers optimize for the relationship. The compounding that matters most isn't financial — it's the trust built over years with people who are also playing for keeps.", zh:"短期思維的人為這筆交易而優化，長期思維的人為這段關係而優化。最重要的複利不是財務上的——而是多年來與同樣在認真玩長期遊戲的人，一點一點累積起來的信任。", ja:"短期思考の人はその取引を最適化し、長期思考の人はその関係を最適化する。最も重要な複利は財務的なものではない——長期のゲームを本気でプレイしている人たちと、何年もかけて少しずつ積み上げてきた信頼だ。" },
  { id:"n6", channel:"Naval", tag:"清晰思考", color:"#7C6AF7", en:"Your identity is the cage you can't see. Every strong opinion about who you are makes it harder to see who you could become. The clearest thinkers hold their self-concept loosely — willing to be wrong about themselves.", zh:"你的身份認同是你看不見的牢籠。每一個關於「我是這種人」的強烈想法，都讓你更難看清你可以成為什麼。想得最清楚的人，對自我概念的抓握都很輕——他們願意對自己也犯錯。", ja:"アイデンティティは目に見えない檻だ。「自分はこういう人間だ」という強い思い込みの一つひとつが、自分が何になれるかを見えなくしている。最も明晰に考える人たちは、自己概念を軽く握っている——自分についても間違えることを許せる人たちだ。" },
  { id:"n7", channel:"Naval", tag:"責任感", color:"#7C6AF7", en:"Put your name on your work. If you won't sign it, you probably shouldn't be doing it. The people who build real reputation take public accountability for outcomes — not just credit when things go well, but ownership when they don't.", zh:"把你的名字放在你的作品上。如果你不敢簽名，你可能就不該做這件事。真正建立名聲的人，對結果承擔公開責任——不只是在事情順利時領功，而是在事情不順時認下來。", ja:"自分の名前を作品に刻め。署名する勇気がないなら、それはやるべきことではないのかもしれない。本当に信用を築く人間は、結果に対して公に責任を負う——うまくいったときだけ手柄を取るのではなく、うまくいかなかったときにも引き受ける。" },
  { id:"n8", channel:"Naval", tag:"閱讀", color:"#7C6AF7", en:"Read to understand principles, not to collect facts. Physics, mathematics, philosophy, economics — these are the operating systems of the world. Everything else is just an app running on top of them.", zh:"閱讀是為了理解原則，不是為了收集事實。物理、數學、哲學、經濟學——這些是世界的作業系統，其他所有東西不過是跑在上面的應用程式。", ja:"読書は原理を理解するためにある。事実を集めるためではない。物理学、数学、哲学、経済学——これらは世界のOSだ。他のすべては、その上で動くアプリケーションに過ぎない。" },
  { id:"n9", channel:"Naval", tag:"退休", color:"#7C6AF7", en:"Retirement isn't an age or an account balance. It's the moment when what you do and what you love to do are the same thing. Most people never get there because they never stopped to ask what they actually want.", zh:"退休不是一個年紀或一個帳戶數字。退休是你做的事和你想做的事變成同一件事的那一刻。大多數人永遠到不了那裡，因為他們從未停下來問自己真正想要什麼。", ja:"引退とは年齢でも口座の数字でもない。やっていることと、やりたいことが同じになった瞬間——それが引退だ。ほとんどの人がそこにたどり着けないのは、自分が本当に何を望んでいるか、立ち止まって問うことがないからだ。" },
  { id:"n10", channel:"Naval", tag:"決策", color:"#7C6AF7", en:"Most decisions are reversible. Treat them like experiments, not commitments. The few that aren't reversible — choose slowly, choose carefully. The asymmetry between these two types is where most people get it wrong.", zh:"大多數決定都是可逆的，把它們當成實驗而不是承諾。少數真正不可逆的決定——慢慢選，仔細選。這兩種決定之間的不對稱性，正是大多數人搞錯的地方。", ja:"ほとんどの決断はやり直せる。コミットメントではなく実験として扱え。本当にやり直せない少数の決断は——ゆっくり選べ、慎重に選べ。この二つの非対称性こそ、大半の人が見誤っているところだ。" },
];

const ELON_CARDS = [
  { id:"e1", channel:"Elon", tag:"第一原理", color:"#C8903A", en:"Analogy is how you copy. First principles is how you invent. When everyone else in the rocket industry was buying components, Musk asked: what is a rocket actually made of? Steel, fuel, electronics. He bought the raw materials and built it himself for 2% of the market price.", zh:"類比是你複製的方式，第一原理是你發明的方式。當火箭產業所有人都在買零件時，Musk 問的是：火箭究竟是由什麼組成的？鋼、燃料、電子元件。他直接買原料自己組裝，成本是市價的 2%。", ja:"アナロジーはコピーの方法、第一原理は発明の方法だ。ロケット業界の全員が部品を買っていた時、Muskが問うたのは「ロケットは結局何でできているのか？」——鉄鋼、燃料、電子部品。彼は原材料を直接買い付け、自分で組み立てた。コストは市場価格の2%。" },
  { id:"e2", channel:"Elon", tag:"The Algorithm", color:"#C8903A", en:"Step one: question every requirement. Most requirements are wrong — especially ones handed down without explanation. Step two: delete. The best part is the part you don't have to build. Step three: only then simplify. Automating a broken process makes it fail faster.", zh:"第一步：質疑每一個需求，大多數需求都是錯的——尤其是那些沒有解釋就傳下來的。第二步：刪除。最好的部分是你根本不需要做的部分。第三步：才開始簡化。把一個壞掉的流程自動化，只會讓它壞得更快。", ja:"第一ステップ：すべての要件を疑え。大半の要件は間違っている——特に説明なしに降りてきたものは。第二ステップ：削除しろ。最高のパーツは、そもそもやらなくていいパーツだ。第三ステップ：そこからやっと簡素化に入れ。壊れたプロセスを自動化しても、壊れるスピードが上がるだけだ。" },
  { id:"e3", channel:"Elon", tag:"失敗", color:"#C8903A", en:"SpaceX's first three rockets exploded. After the third failure, they had enough money for exactly one more attempt. That fourth launch succeeded. If Musk had treated failure as a verdict rather than data, the company would have died with the third rocket.", zh:"SpaceX 前三枚火箭全部爆炸。第三次失敗後，他們剩下的錢只夠再試一次。第四次成功了。如果 Musk 把失敗當成判決而不是數據，這家公司就會跟著第三枚火箭一起消失。", ja:"SpaceXの最初の3機のロケットはすべて爆発した。3回目の失敗後、残された資金はあと1回分だけ。4回目で成功した。もしMuskが失敗を「判決」ではなく「データ」として扱わなかったら、この会社は3機目のロケットと一緒に消えていた。" },
  { id:"e4", channel:"Elon", tag:"使命", color:"#C8903A", en:"The goal doesn't have to be achievable to be worth pursuing. The goal of becoming a multi-planetary species might take 200 years. That doesn't make it less real. Direction matters more than arrival — it determines every decision made along the way.", zh:"一個目標不需要在你有生之年達成，才值得追求。讓人類成為多星球物種可能需要 200 年。這不讓這個目標變得不真實。方向比抵達更重要——它決定了沿途每一個決策。", ja:"ある目標は、自分の生きているうちに達成できなくても、追求する価値がある。人類をマルチプラネタリー種にするには200年かかるかもしれない。だからといって、この目標が非現実的になるわけではない。到達よりも方向が重要だ——それが道中のあらゆる意思決定を決める。" },
  { id:"e5", channel:"Elon", tag:"產品設計", color:"#C8903A", en:"If a user needs a tutorial, you've already lost. The best interfaces are so obvious they feel inevitable — like the user designed them themselves. Complexity is always the designer's failure, never the user's problem.", zh:"如果使用者需要教學，你就已經輸了。最好的介面清楚到感覺理所當然——像是使用者自己設計的。複雜永遠是設計師的失敗，從來不是使用者的問題。", ja:"ユーザーにチュートリアルが必要な時点で、もう負けている。最高のインターフェースは、当たり前に感じるほど明快だ——まるでユーザー自身がデザインしたかのように。複雑さは常にデザイナーの失敗であり、決してユーザーの問題ではない。" },
  { id:"e6", channel:"Elon", tag:"人才", color:"#C8903A", en:"A single brilliant engineer is worth a hundred average ones — not because they work harder, but because they see problems differently and solutions more clearly. The most expensive thing in a company is not talent. It's the wrong talent in the wrong role.", zh:"一個真正出色的工程師抵得上一百個普通的——不是因為他們更努力，而是因為他們對問題的理解不同，對解法的看法更清晰。一家公司最昂貴的不是人才，而是放錯位置的人才。", ja:"本当に優れたエンジニア一人は、凡庸なエンジニア百人に匹敵する——より努力するからではなく、問題の理解が違い、解法の見え方がまるで違うからだ。企業にとって最もコストが高いのは人材ではない。配置を間違えた人材だ。" },
  { id:"e7", channel:"Elon", tag:"速度", color:"#C8903A", en:"Move at a pace that feels slightly irresponsible. If it feels safe, you're probably moving too slowly. The risks of going too fast are recoverable. The risk of moving too slowly — in a competitive world — often isn't.", zh:"以一種感覺稍微不負責任的速度前進。如果感覺安全，你可能移動得太慢了。走太快的風險通常可以挽回。在競爭激烈的世界裡，走太慢的風險往往不行。", ja:"少し無責任に感じるくらいのスピードで進め。安全だと感じるなら、おそらく遅すぎる。速すぎるリスクは大抵リカバリーできる。競争の激しい世界では、遅すぎるリスクはたいていリカバリーできない。" },
  { id:"e8", channel:"Elon", tag:"10倍思維", color:"#C8903A", en:"10% improvement gets you incremental progress. 10x improvement requires rethinking the entire approach from scratch. Most people never attempt 10x because they assume it requires 10x the resources. It doesn't. It requires 10x the thinking.", zh:"改善 10% 讓你漸進式進步。改善 10 倍要求你從頭重新思考整個方法。大多數人從未嘗試 10 倍，因為他們假設這需要 10 倍的資源。不需要。它需要的是 10 倍的思考。", ja:"10%の改善はインクリメンタルな進歩をもたらす。10倍の改善はアプローチ全体をゼロから考え直すことを要求する。ほとんどの人が10倍を試みないのは、10倍のリソースが必要だと思い込んでいるからだ。違う。必要なのは10倍の思考だ。" },
  { id:"e9", channel:"Elon", tag:"現場主義", color:"#C8903A", en:"The problem is always at the product. Not in the boardroom. Not in the spreadsheet. The people making decisions from a distance are always the last to understand what's actually wrong — and the last to fix it.", zh:"問題永遠在產品現場，不在董事會，不在試算表裡。從遠處做決策的人永遠是最後一個理解哪裡出了問題的——也永遠是最後一個修好它的。", ja:"問題は常に製品の現場にある。会議室にも、スプレッドシートの中にもない。遠くから意思決定する人間は、何が壊れているかを最後に理解し——そして最後に直す人間だ。" },
  { id:"e10", channel:"Elon", tag:"Plan B", color:"#C8903A", en:"Having a Plan B means you'll use it. The moment you allocate mental space to the exit, you've already started leaving. Commitment isn't stubbornness — it's the refusal to let doubt consume the energy that execution needs.", zh:"有 B 計劃意味著你會用到它。你一旦給退路留了心理空間，就已經開始離開了。承諾不是固執，而是拒絕讓懷疑消耗掉執行所需要的能量。", ja:"プランBがあるということは、それを使うということだ。退路に心理的スペースを与えた瞬間、すでに離れ始めている。コミットメントは頑固さではない——疑念に、実行に必要なエネルギーを食い潰させることを拒否することだ。" },
];

const DAN_CARDS = [
  { id:"d1", channel:"Dan Koe", tag:"創造力", color:"#4A9E96", en:"Cognitive burnout doesn't feel like exhaustion. It feels like thinking hard while producing nothing. The cure isn't rest — it's removing what's narrowing your mind: the obligation to be productive, the habit of multitasking, the reflex to reach for your phone every 90 seconds.", zh:"認知疲勞的感覺不像筋疲力竭，它感覺像是在拼命思考卻什麼都生不出來。解藥不是休息，而是移除正在收窄你思維的東西：必須有生產力的義務、多工的習慣、每 90 秒就伸手拿手機的反射動作。", ja:"認知疲労は、燃え尽きた感覚とは違う。必死に考えているのに何も生まれてこない感覚だ。処方箋は休むことではなく、思考を狭めているものを取り除くこと——生産的でなければという義務感、マルチタスクの習慣、90秒ごとにスマホに手を伸ばす反射。" },
  { id:"d2", channel:"Dan Koe", tag:"一人公司", color:"#4A9E96", en:"AI raised the floor — now anyone can produce. It also raised the ceiling — now the gap between average and excellent is wider than ever. The market isn't more crowded. It's more separated. The question is which side of that gap you're building toward.", zh:"AI 拉高了地板——現在所有人都能生產內容。它同時也拉高了天花板——現在平均與卓越之間的差距比以往任何時候都更大。市場不是變得更擁擠，而是變得更分裂。問題是你在往哪一側建造。", ja:"AIは底辺を引き上げた——今や誰もがコンテンツを作れる。同時に天井も引き上げた——平凡と卓越の差はかつてないほど広がっている。市場は混み合っているのではなく、分断されている。問題は、あなたがどちら側に築いているかだ。" },
  { id:"d3", channel:"Dan Koe", tag:"多元興趣", color:"#4A9E96", en:"Specialization made sense when the world moved slowly. Now the most valuable people are the ones who can connect ideas across domains — who can make a room full of specialists see something they missed. Your scattered interests aren't a liability. They're the view from somewhere no one else is standing.", zh:"在世界移動緩慢的時代，專精是有道理的。現在最有價值的人是能夠跨領域連結想法的人——能讓一屋子的專家看見他們錯過的東西。你分散的興趣不是負擔，而是你站在一個沒有其他人站過的地方才有的視角。", ja:"世界がゆっくり動いていた時代には、専門特化に意味があった。今、最も価値のある人間は、領域を横断してアイデアをつなげられる人——専門家たちが見落としていたものを見せられる人だ。あなたの散らばった興味は重荷ではない。誰も立ったことのない場所に立っているからこそ得られる視座だ。" },
  { id:"d4", channel:"Dan Koe", tag:"AI 時代", color:"#4A9E96", en:"Three types of people in the AI era. The resisters, who build their identity around the old way. The watchers, who believe the trend will pass. The curious, who experiment without knowing where it leads. History has always rewarded the third group — not because they were smarter, but because they were willing to be temporarily lost.", zh:"AI 時代有三種人：抗拒者，把身份認同建立在舊方式上；觀望者，相信趨勢會過去；好奇者，在不知道終點的情況下持續實驗。歷史永遠獎勵第三種人——不是因為他們更聰明，而是因為他們願意暫時迷路。", ja:"AI時代には三種類の人間がいる。古いやり方にアイデンティティを置く抵抗者。トレンドは過ぎ去ると信じる傍観者。そして、終着点が見えないまま実験を続ける好奇心の人。歴史が報いるのは常に三番目だ——彼らが賢いからではなく、一時的に迷子になることを厭わないからだ。" },
  { id:"d5", channel:"Dan Koe", tag:"意義", color:"#4A9E96", en:"When machines can generate anything, the question becomes: who decides what's worth generating? Taste, curiosity, and the willingness to struggle toward something uncertain — these are now the scarcest inputs in the economy. And they can't be automated.", zh:"當機器可以生成任何東西，問題就變成：誰來決定什麼值得被生成？品味、好奇心，以及願意朝著不確定的事物掙扎前進——這些現在是經濟中最稀缺的投入，而且無法被自動化。", ja:"機械があらゆるものを生成できるようになったとき、問いはこうなる——何が生成に値するかを誰が決めるのか？センス、好奇心、そして不確かなものに向かってもがき続ける意志。これらが今、経済において最も希少なインプットであり、自動化することはできない。" },
  { id:"d6", channel:"Dan Koe", tag:"寫作", color:"#4A9E96", en:"Writing isn't content production. It's thinking made visible. The discipline of finishing a sentence forces you to commit to an idea — to discover whether you actually believe it or just assumed you did. Most people avoid writing because they're afraid of what they'll find.", zh:"寫作不是內容生產，而是把思考變得可見。完成一個句子的紀律迫使你對一個想法表態——讓你發現你究竟真的相信它，還是只是以為自己相信。大多數人逃避寫作，是因為害怕自己會發現什麼。", ja:"書くことはコンテンツ制作ではない。思考を目に見える形にすることだ。一つの文を完成させる規律が、あるアイデアに対して態度を明らかにすることを迫る——本当にそれを信じているのか、それとも信じていると思い込んでいただけなのかを突きつける。多くの人が書くことから逃げるのは、自分が何を発見してしまうかを恐れているからだ。" },
  { id:"d7", channel:"Dan Koe", tag:"注意力", color:"#4A9E96", en:"Attention is the one resource you can't earn back. You can make more money. You can't make more time. And even within the time you have, most of it is spent in a state that produces nothing worth keeping. Guard your focus the way you'd guard your last hour.", zh:"注意力是唯一無法賺回來的資源。你可以賺更多錢，但無法製造更多時間。而且即使在你擁有的時間裡，大多數時候你都處於一種什麼值錢的東西都生產不出來的狀態。保護你的專注力，就像保護你最後一個小時一樣。", ja:"注意力は、取り戻すことのできない唯一の資源だ。お金はもっと稼げる。でも時間はもっと作れない。しかも、持っている時間の中でさえ、ほとんどの瞬間は価値あるものを何も生み出せない状態にある。集中力を守れ。最後の一時間を守るように。" },
  { id:"d8", channel:"Dan Koe", tag:"生產力", color:"#4A9E96", en:"The productivity trap is real. You optimize your system. You color-code your calendar. You measure your output. And somewhere in all of that, you lose track of what the output was supposed to be for. Efficiency in service of the wrong goal is just a faster way to arrive at the wrong place.", zh:"生產力陷阱是真實存在的。你優化系統，用顏色區分行事曆，測量產出。在這一切之中，你不知不覺忘了這些產出究竟是為了什麼。在錯誤目標上的效率，只是更快抵達錯誤地方的方式。", ja:"生産性の罠は実在する。システムを最適化し、カレンダーを色分けし、アウトプットを計測する。そのすべての中で、いつの間にかそのアウトプットが何のためだったかを忘れてしまう。間違った目標に対する効率は、間違った場所により速く到着する方法にすぎない。" },
  { id:"d9", channel:"Dan Koe", tag:"身份", color:"#4A9E96", en:"You don't have a brand problem. You have an identity problem. The people who build audiences aren't performing — they're clarifying. They've done the uncomfortable work of deciding who they actually are, and then said it out loud, repeatedly, until the right people heard.", zh:"你沒有品牌問題，你有身份問題。那些能吸引受眾的人不是在表演——他們是在釐清自己。他們做了不舒服的功課，決定自己究竟是誰，然後大聲說出來，反覆說，直到對的人聽見。", ja:"あなたが抱えているのはブランドの問題ではない。アイデンティティの問題だ。人を惹きつけられる人たちは演じているのではない——自分自身を明確にしている。居心地の悪い内省をやり、自分が何者かを決め、それを声に出して、繰り返し言い続ける。正しい人が聞き取るまで。" },
  { id:"d10", channel:"Dan Koe", tag:"槓桿", color:"#4A9E96", en:"The difference between a freelancer and a business owner is leverage. The freelancer gets paid for hours. The business owner builds systems that pay without the hours. The gap between these two is not talent — it's the willingness to stop trading time and start building assets.", zh:"自由工作者和企業主之間的差距是槓桿。自由工作者用小時換錢，企業主建立的系統在沒有小時投入的情況下繼續付錢。這兩者之間的差距不是才能，而是停止用時間換錢、開始建立資產的意願。", ja:"フリーランスと事業主の差はレバレッジだ。フリーランスは時間をお金に換える。事業主は、時間を投入しなくても収益を生み続ける仕組みを築く。この二つの差は才能ではない。時間の切り売りをやめて資産を築く覚悟があるかどうかだ。" },

  { id:"social_7", channel:"社交雷達", tag:"設計餐飲", color:"#8B6BAE", en:"Nashville will host the 2026 Michelin Guide American South ceremony on October 21, cementing Music City's rising culinary profile after Bastion, The Catbird Seat, and Locust earned Nashville its first-ever Michelin stars.", zh:"米其林指南宣布2026年「美國南方」頒獎典禮將移師Nashville，10月21日舉行。Nashville去年有Bastion、The Catbird Seat和Locust三家餐廳首度摘星，南方美食版圖正在被改寫。", ja:"ミシュランガイドが2026年「アメリカ南部」の授賞式をナッシュビルで10月21日に開催すると発表。ナッシュビルでは昨年、Bastion、The Catbird Seat、Locustの3店が初の星を獲得しており、南部の美食地図が塗り替えられつつある。", url:"https://guide.michelin.com/us/en/event/the-michelin-guide-heads-to-nashville-for-2026-american-south" },
  { id:"social_8", channel:"社交雷達", tag:"設計餐飲", color:"#8B6BAE", en:"A striking new restaurant called Mariela is opening this April in Chicago's Loop, designed by Matthew Hunnel of Audacity with earthy tones and bold patterned interiors. Design is as intentional as the menu.", zh:"芝加哥Loop區新餐廳Mariela預計本月開幕，由主廚Rishi Kumar與Zubair Mohajir主理，融合東南亞、美洲與歐洲風味。室內設計由Audacity的Matthew Hunnel操刀，以柔和大地色調搭配大膽圖騰。", ja:"シカゴ・ループ地区の新レストラン「Mariela」が今月オープン予定。シェフのリシ・クマールとズバイル・モハジルが手がけ、東南亞、アメリカ大陸、ヨーロッパの味を融合。インテリアデザインはAudacityのマシュー・ハネルが担当し、柔らかなアースカラーに大胆なパターンを組み合わせている。", url:"https://www.modernluxury.com/most-anticipated-chicago-restaurant-openings/" },
];

// ─── 書摘（靜態，不動）
const BOOK_CARDS = [...NAVAL_CARDS, ...ELON_CARDS, ...DAN_CARDS];
const TODAY_CARDS = [...NEWS_CARDS, ...SOCIAL_CARDS];
const TABS = ["Today", "Bookshelf"];
const TODAY_SUBS = ["全部", "世界新聞", "社交雷達"];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDateString() {
  return new Date().toLocaleDateString("en-US", { month:"long", day:"numeric", year:"numeric" }).toUpperCase();
}

function CardView({ card }) {
  const [lang, setLang] = useState(null);
  const toggle = (target) => setLang(lang === target ? null : target);
  const isOpen = lang !== null;
  const text = lang === "ja" ? (card.ja || card.zh) : card.zh;
  return (
    <div style={{ padding:"40px 32px 80px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"24px" }}>
        <span style={{ display:"inline-block", width:"18px", height:"1px", background:card.color, flexShrink:0 }} />
        <span style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.18em", textTransform:"uppercase", color:card.color, opacity:0.9 }}>{card.channel}</span>
        <span style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.18em", textTransform:"uppercase", color:"var(--text-tertiary)" }}>{card.tag}</span>
      </div>
      <p style={{ fontFamily:"Georgia,'Times New Roman',serif", fontSize:"20px", lineHeight:1.8, color:"var(--text)", margin:0, maxWidth:"54ch", letterSpacing:"-0.01em" }}>{card.en}</p>
      <div style={{ overflow:"hidden", maxHeight:isOpen?"500px":"0px", transition:"max-height 0.45s cubic-bezier(0.4,0,0.2,1)" }}>
        <div style={{ marginTop:"28px", paddingTop:"24px", borderTop:"1px solid var(--divider)" }}>
          <p style={{ fontFamily:"system-ui,-apple-system,'PingFang TC','Hiragino Sans',sans-serif", fontSize:"15px", lineHeight:2, color:"var(--text-secondary)", margin:0, maxWidth:"48ch", fontWeight:300 }}>{text}</p>
        </div>
      </div>
      <div className="expand-row" style={{ marginTop:"24px" }}>
        <span onClick={e => { e.stopPropagation(); toggle("zh"); }} style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.14em", textTransform:"uppercase", color: lang==="zh" ? "var(--text-secondary)" : "var(--text-tertiary)", cursor:"pointer" }}>{lang==="zh" ? "close ↑" : "中文 ↓"}</span>
        <span onClick={e => { e.stopPropagation(); toggle("ja"); }} style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.14em", textTransform:"uppercase", color: lang==="ja" ? "var(--text-secondary)" : "var(--text-tertiary)", cursor:"pointer" }}>{lang==="ja" ? "close ↑" : "日本語 ↓"}</span>
        {card.url && (<a href={card.url} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} className="source-link">source ↗</a>)}
      </div>
    </div>
  );
}

function EndScreen({ onBack, onShuffle, isBookshelf }) {
  return (
    <div className="end-screen">
      <p style={{ fontFamily:"'Courier New',monospace", fontSize:"11px", letterSpacing:"0.14em", color:"var(--text-tertiary)", textTransform:"uppercase" }}>end of feed</p>
      <div style={{ display:"flex", gap:"12px" }}>
        <button className="end-btn" onClick={onBack}>← Turn Back</button>
        {isBookshelf && <button className="end-btn" onClick={onShuffle}>↻ Shuffle</button>}
      </div>
    </div>
  );
}

function ThemeToggle() {
  const [dark, setDark] = useState(false);
  const toggle = () => { const next = !dark; setDark(next); document.body.setAttribute("data-theme", next ? "dark" : "light"); };
  return <button className="theme-toggle" onClick={toggle}>{dark ? "○" : "●"}</button>;
}

function App() {
  const [activeTab, setActiveTab] = useState("Today");
  const [todaySub, setTodaySub] = useState("全部");
  const [bookSeed, setBookSeed] = useState(0);
  const [idx, setIdx] = useState(0);
  const [dir, setDir] = useState(0); // -1=left, 1=right, 0=none
  const touchRef = React.useRef(null);

  const shuffledBooks = useMemo(() => shuffle(BOOK_CARDS).slice(0, 8), [bookSeed]);
  const cards = useMemo(() => {
    if (activeTab === "Bookshelf") return shuffledBooks;
    if (todaySub === "世界新聞") return NEWS_CARDS;
    if (todaySub === "社交雷達") return SOCIAL_CARDS;
    return TODAY_CARDS;
  }, [activeTab, todaySub, shuffledBooks]);

  const total = cards.length;
  const atEnd = idx >= total;

  // Reset index when cards change
  React.useEffect(() => { setIdx(0); setDir(0); }, [activeTab, todaySub, bookSeed]);

  const go = (newIdx) => {
    if (newIdx < 0) return;
    if (newIdx > total) return;
    setDir(newIdx > idx ? 1 : -1);
    setIdx(newIdx);
  };

  // Keyboard
  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === "ArrowRight" || e.key === "ArrowDown") go(idx + 1);
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") go(idx - 1);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [idx, total]);

  // Touch
  const onTouchStart = (e) => { touchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
  const onTouchEnd = (e) => {
    if (!touchRef.current) return;
    const dx = e.changedTouches[0].clientX - touchRef.current.x;
    const dy = e.changedTouches[0].clientY - touchRef.current.y;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx < 0) go(idx + 1);
      else go(idx - 1);
    }
    touchRef.current = null;
  };

  const headerHeight = activeTab === "Today" ? "200px" : "170px";

  return (
    <div style={{ maxWidth:"680px", margin:"0 auto", height:"100vh", overflow:"hidden", display:"flex", flexDirection:"column" }}>
      <ThemeToggle />
      {/* Header */}
      <div style={{ flexShrink:0, background:"var(--bg)", paddingTop:"36px", zIndex:10 }}>
        <div style={{ padding:"0 32px", marginBottom:"28px" }}>
          <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", marginBottom:"6px" }}>
            <h1 className="masthead-title" style={{ fontSize:"42px" }}>Mo's Feed</h1>
            <span className="running-header" style={{ paddingBottom:"8px" }}>{getDateString()}</span>
          </div>
          <div className="rule" />
        </div>
        <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", padding:"0 32px" }}>
          <div className="tab-nav" style={{ padding:0 }}>
            {TABS.map(tab => {
              const isActive = activeTab === tab;
              return (
                <button key={tab} onClick={() => { setActiveTab(tab); if (tab !== "Today") setTodaySub("全部"); }}
                  style={{ fontSize:isActive?"26px":"15px", fontWeight:isActive?600:400, fontStyle:isActive?"normal":"italic", color:isActive?"var(--text)":"var(--text-tertiary)", letterSpacing:isActive?"-0.01em":"0" }}>
                  {tab}
                </button>
              );
            })}
          </div>
          {!atEnd && <span className="progress-bar">{idx + 1} / {total}</span>}
        </div>
        {activeTab === "Today" && (
          <div style={{ display:"flex", gap:"20px", padding:"14px 32px 0" }}>
            {TODAY_SUBS.map(sub => (
              <button key={sub} className="sub-pill" onClick={() => setTodaySub(sub)}
                style={{ color:todaySub===sub?"var(--text-secondary)":"var(--text-tertiary)", borderBottomColor:todaySub===sub?"var(--text-secondary)":"transparent", opacity:todaySub===sub?1:0.6 }}>
                {sub}
              </button>
            ))}
          </div>
        )}
        <div style={{ padding:"0 32px", marginTop:"16px" }}><div className="rule" /></div>
      </div>

      {/* Swipe area */}
      <div className="swipe-area" style={{ flex:1 }}
        onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
        onClick={(e) => {
          const rect = e.currentTarget.getBoundingClientRect();
          const x = e.clientX - rect.left;
          if (x < rect.width * 0.25) go(idx - 1);
          else if (x > rect.width * 0.75) go(idx + 1);
        }}
      >
        {atEnd ? (
          <div className="card-slide" style={{ position:"relative", transform:"none" }}>
            <EndScreen
              onBack={() => go(0)}
              onShuffle={() => setBookSeed(s => s + 1)}
              isBookshelf={activeTab === "Bookshelf"}
            />
          </div>
        ) : (
          <div className="card-slide" key={cards[idx].id + "-" + bookSeed} style={{ position:"relative", transform:"none" }}>
            <CardView card={cards[idx]} />
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
