<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f1ea; --bg-elevated: #ede9e1;
    --text: #1c1a17; --text-secondary: #8a8680;
    --text-tertiary: #b8b4ae; --divider: #ddd9d1;

  [data-theme="dark"] {
    --bg: #0f0e0c; --bg-elevated: #161410;
    --text: #e8e4dc; --text-secondary: #5a5650;
    --text-tertiary: #383430; --divider: #242018;
    --noise-opacity: 0.06;
  }
  body {
    background: var(--bg); -webkit-font-smoothing: antialiased;
    font-family: Georgia, 'Times New Roman', serif;

    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 180px 180px;
  }
  #root { position: relative; z-index: 1; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInOut {
    0% { opacity: 0; }
    15% { opacity: 1; }
    70% { opacity: 1; }

  .masthead-title { font-family: Georgia, serif; font-weight: 400; font-style: italic; letter-spacing: -0.02em; color: var(--text); line-height: 1; }

  .sub-pill { background: none; border: none; cursor: pointer; font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 0; transition: all 0.2s ease; border-bottom: 1px solid transparent; }
  .swipe-area { position: relative; overflow-y: auto; overflow-x: hidden; touch-action: pan-y; -webkit-overflow-scrolling: touch; }
  .card-slide { position: absolute; inset: 0; padding: 16px 32px 80px; display: flex; flex-direction: column; justify-content: flex-start; transition: transform 0.3s ease, opacity 0.3s ease; will-change: transform, opacity; overflow-y: auto; }
  .expand-row { display: flex; align-items: center; gap: 20px; margin-top: 18px; }
  .source-link { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.1em; text-decoration: none; border-bottom: 1px solid var(--divider); padding-bottom: 1px; transition: all 0.2s ease; color: var(--text-tertiary); }
  .source-link:hover { color: var(--text-secondary); border-color: var(--text-secondary); }
  .end-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; height: 100%; }
  .end-btn { padding: 12px 28px; background: none; border: 1px solid var(--divider); color: var(--text-tertiary); font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.25s ease; }
  .end-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
  .progress-bar { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.14em; color: var(--text-tertiary); text-transform: uppercase; }
  .theme-toggle { position: fixed; top: 28px; right: 12px; z-index: 100; background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text-tertiary); padding: 4px; line-height: 1; transition: color 0.3s ease; font-family: 'Courier New', monospace; }
  .theme-toggle:hover { color: var(--text-secondary); }
  .rule { height: 1px; background: var(--divider); }
  .running-header { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); }
  .word-popup { position: fixed; z-index: 200; background: var(--bg-elevated); border: 1px solid var(--divider); border-radius: 8px; padding: 12px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); min-width: 120px; max-width: 260px; }
  .word-popup-word { font-family: Georgia, serif; font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .word-popup-trans { font-family: system-ui, -apple-system, 'PingFang TC', sans-serif; font-size: 14px; color: var(--text-secondary); line-height: 1.6; font-weight: 300; }
  .speak-btn { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text-tertiary); padding: 2px; transition: color 0.2s; line-height: 1; }
  .speak-btn:hover { color: var(--text-secondary); }
  .speak-btn.active { color: var(--text); }
  .clickable-word { cursor: pointer; border-radius: 2px; transition: background 0.15s; }
  .clickable-word:hover { background: var(--bg-elevated); }
  [data-theme="dark"] .word-popup { box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .az-input { width:100%; background:var(--bg); border:1px solid var(--divider); color:var(--text); padding:7px 10px; font-family:'Courier New',monospace; font-size:11px; outline:none; -webkit-appearance:none; appearance:none; border-radius:0; }
  .az-input:focus { border-color:var(--text-secondary); }
</style>

<script type="text/babel">
const { useState, useMemo } = React;

// ===== AZURE TTS =====
let _azToken = null, _azTokenExp = 0, _azAbort = null;
function _xmlEsc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
async function _getAzToken(key, region, signal) {
  const now = Date.now();
  if (_azToken && now < _azTokenExp) return _azToken;
  const res = await fetch(`https://${region}.api.cognitive.microsoft.com/sts/v1.0/issueToken`, { method:'POST', headers:{'Ocp-Apim-Subscription-Key':key}, signal });
  if (!res.ok) throw new Error('Token ' + res.status);
  _azToken = await res.text();
  _azTokenExp = now + 9*60*1000;
  return _azToken;
}
function azureStop() { if (_azAbort) { _azAbort.abort(); _azAbort = null; } }
async function azureSpeak(text, { rate='0%', onStart, onEnd, onError }={}) {
  const key = localStorage.getItem('mf_azureKey') || '';
  const region = localStorage.getItem('mf_azureRegion') || 'eastus';
  const voice = localStorage.getItem('mf_azureVoice') || 'en-US-AriaNeural';
  if (!key) return false;
  azureStop();
  const ctrl = new AbortController(); _azAbort = ctrl;
  try {
    const token = await _getAzToken(key, region, ctrl.signal);
    const ssml = `<speak version='1.0' xmlns='http://www.w3.org/2001/10/synthesis' xml:lang='en-US'><voice name='${voice}'><prosody rate='${rate}'>${_xmlEsc(text)}</prosody></voice></speak>`;
    const res = await fetch(`https://${region}.tts.speech.microsoft.com/cognitiveservices/v1`, {
      method:'POST', signal:ctrl.signal,
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/ssml+xml','X-Microsoft-OutputFormat':'audio-16khz-128kbitrate-mono-mp3'},
      body:ssml
    });
    if (!res.ok) throw new Error('TTS ' + res.status);
    const blob = await res.blob();
    if (ctrl.signal.aborted) return true;
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    if (onStart) onStart(audio);
    audio.onended = () => { URL.revokeObjectURL(url); if (onEnd) onEnd(); };
    audio.onerror = () => { URL.revokeObjectURL(url); if (onError) onError(); };
    await audio.play();
    return true;
  } catch(e) {
    if (e.name === 'AbortError') return true;
    _azToken = null;
    if (onError) onError(e);
    return false;
  }
}

const NAVAL_CARDS = [
  { id:"n1", channel:"Naval", tag:"財富", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Every hour you sell, you lose twice. Once for the hour itself — and once for the leverage that hour could have built. Renting time is not income. It's a slow exit.", zh:"你每賣出一個小時，就輸了兩次：一次是那個小時本身，一次是那個小時原本能建立的槓桿。用時間換錢不叫收入，叫做慢慢離場。", ja:"一時間を売るたびに、二度負ける——その一時間そのものと、その一時間が本来生み出せたレバレッジだ。時間をお金に換えることは収入ではない。ゆっくりと退場しているだけだ。" },
  { id:"n2", channel:"Naval", tag:"槓桿", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Code and media don't sleep. They don't ask for raises. They don't need to be convinced. Build something once — and let it work while you're not watching. This is the only leverage that requires no permission.", zh:"程式碼和媒體不需要睡覺，不會要求加薪，不需要被說服。做一次，然後讓它在你不看的時候繼續運轉。這是唯一不需要任何人許可的槓桿。", ja:"コードとメディアは眠らない。昇給を求めない。説得する必要もない。一度つくれば、あとは見ていなくても回り続ける。これが誰の許可も要らない唯一のレバレッジだ。" },
  { id:"n3", channel:"Naval", tag:"獨特知識", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"If your job can be described in a training manual, you can be replaced by someone cheaper — or eventually, by software. Specific knowledge isn't a skill you learn. It's something you discover by following what genuinely fascinates you, even when it makes no obvious financial sense.", zh:"如果你的工作可以被寫進教學手冊，你就可以被更便宜的人取代——或遲早被軟體取代。獨特知識不是你學來的技能，而是你在跟隨真正讓你著迷的事物時，自然發現的東西。", ja:"もし君の仕事がマニュアルに書けるなら、もっと安い人間に——やがてはソフトウェアに置き換えられる。独自の知識とは学んだスキルではない。本当に心を奪われるものを追いかける中で、自然と見つかるものだ。" },
  { id:"n4", channel:"Naval", tag:"幸福", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Desire is borrowed unhappiness. Each one is a quiet announcement that you're not enough right now. The mind that is always reaching for the next thing never actually arrives anywhere. Happiness isn't achieved — it's what's left when you stop manufacturing reasons to be miserable.", zh:"欲望是預支的痛苦。每一個欲望都在悄悄宣告：你現在還不夠好。一個永遠在伸手抓下一件事的心，其實從未真正抵達任何地方。幸福不是追求來的——而是當你停止製造痛苦理由之後，剩下的東西。", ja:"欲望とは痛みの前借りだ。すべての欲望がひそかにこう宣言している——今の自分ではまだ足りない、と。次の何かに手を伸ばし続ける心は、実はどこにもたどり着いていない。幸福は追い求めるものではない——苦しみの理由をつくるのをやめたとき、そこに残るものだ。" },
  { id:"n5", channel:"Naval", tag:"長期賽局", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Short-term thinkers optimize for the deal. Long-term thinkers optimize for the relationship. The compounding that matters most isn't financial — it's the trust built over years with people who are also playing for keeps.", zh:"短期思維的人為這筆交易而優化，長期思維的人為這段關係而優化。最重要的複利不是財務上的——而是多年來與同樣在認真玩長期遊戲的人，一點一點累積起來的信任。", ja:"短期思考の人はその取引を最適化し、長期思考の人はその関係を最適化する。最も重要な複利は財務的なものではない——長期のゲームを本気でプレイしている人たちと、何年もかけて少しずつ積み上げてきた信頼だ。" },
  { id:"n6", channel:"Naval", tag:"清晰思考", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Your identity is the cage you can't see. Every strong opinion about who you are makes it harder to see who you could become. The clearest thinkers hold their self-concept loosely — willing to be wrong about themselves.", zh:"你的身份認同是你看不見的牢籠。每一個關於「我是這種人」的強烈想法，都讓你更難看清你可以成為什麼。想得最清楚的人，對自我概念的抓握都很輕——他們願意對自己也犯錯。", ja:"アイデンティティは目に見えない檻だ。「自分はこういう人間だ」という強い思い込みの一つひとつが、自分が何になれるかを見えなくしている。最も明晰に考える人たちは、自己概念を軽く握っている——自分についても間違えることを許せる人たちだ。" },
  { id:"n7", channel:"Naval", tag:"責任感", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Put your name on your work. If you won't sign it, you probably shouldn't be doing it. The people who build real reputation take public accountability for outcomes — not just credit when things go well, but ownership when they don't.", zh:"把你的名字放在你的作品上。如果你不敢簽名，你可能就不該做這件事。真正建立名聲的人，對結果承擔公開責任——不只是在事情順利時領功，而是在事情不順時認下來。", ja:"自分の名前を作品に刻め。署名する勇気がないなら、それはやるべきことではないのかもしれない。本当に信用を築く人間は、結果に対して公に責任を負う——うまくいったときだけ手柄を取るのではなく、うまくいかなかったときにも引き受ける。" },
  { id:"n8", channel:"Naval", tag:"閱讀", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Read to understand principles, not to collect facts. Physics, mathematics, philosophy, economics — these are the operating systems of the world. Everything else is just an app running on top of them.", zh:"閱讀是為了理解原則，不是為了收集事實。物理、數學、哲學、經濟學——這些是世界的作業系統，其他所有東西不過是跑在上面的應用程式。", ja:"読書は原理を理解するためにある。事実を集めるためではない。物理学、数学、哲学、経済学——これらは世界のOSだ。他のすべては、その上で動くアプリケーションに過ぎない。" },
  { id:"n9", channel:"Naval", tag:"退休", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Retirement isn't an age or an account balance. It's the moment when what you do and what you love to do are the same thing. Most people never get there because they never stopped to ask what they actually want.", zh:"退休不是一個年紀或一個帳戶數字。退休是你做的事和你想做的事變成同一件事的那一刻。大多數人永遠到不了那裡，因為他們從未停下來問自己真正想要什麼。", ja:"引退とは年齢でも口座の数字でもない。やっていることと、やりたいことが同じになった瞬間——それが引退だ。ほとんどの人がそこにたどり着けないのは、自分が本当に何を望んでいるか、立ち止まって問うことがないからだ。" },
  { id:"n10", channel:"Naval", tag:"決策", color:"#7C6AF7", url:"https://www.notion.so/3238ba4c063381a0ba28fb48effb0deb", en:"Most decisions are reversible. Treat them like experiments, not commitments. The few that aren't reversible — choose slowly, choose carefully. The asymmetry between these two types is where most people get it wrong.", zh:"大多數決定都是可逆的，把它們當成實驗而不是承諾。少數真正不可逆的決定——慢慢選，仔細選。這兩種決定之間的不對稱性，正是大多數人搞錯的地方。", ja:"ほとんどの決断はやり直せる。コミットメントではなく実験として扱え。本当にやり直せない少数の決断は——ゆっくり選べ、慎重に選べ。この二つの非対称性こそ、大半の人が見誤っているところだ。" },
];

const ELON_CARDS = [
  { id:"e1", channel:"Elon", tag:"第一原理", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"Analogy is how you copy. First principles is how you invent. When everyone else in the rocket industry was buying components, Musk asked: what is a rocket actually made of? Steel, fuel, electronics. He bought the raw materials and built it himself for 2% of the market price.", zh:"類比是你複製的方式，第一原理是你發明的方式。當火箭產業所有人都在買零件時，Musk 問的是：火箭究竟是由什麼組成的？鋼、燃料、電子元件。他直接買原料自己組裝，成本是市價的 2%。", ja:"アナロジーはコピーの方法、第一原理は発明の方法だ。ロケット業界の全員が部品を買っていた時、Muskが問うたのは「ロケットは結局何でできているのか？」——鉄鋼、燃料、電子部品。彼は原材料を直接買い付け、自分で組み立てた。コストは市場価格の2%。" },
  { id:"e2", channel:"Elon", tag:"The Algorithm", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"Step one: question every requirement. Most requirements are wrong — especially ones handed down without explanation. Step two: delete. The best part is the part you don't have to build. Step three: only then simplify. Automating a broken process makes it fail faster.", zh:"第一步：質疑每一個需求，大多數需求都是錯的——尤其是那些沒有解釋就傳下來的。第二步：刪除。最好的部分是你根本不需要做的部分。第三步：才開始簡化。把一個壞掉的流程自動化，只會讓它壞得更快。", ja:"第一ステップ：すべての要件を疑え。大半の要件は間違っている——特に説明なしに降りてきたものは。第二ステップ：削除しろ。最高のパーツは、そもそもやらなくていいパーツだ。第三ステップ：そこからやっと簡素化に入れ。壊れたプロセスを自動化しても、壊れるスピードが上がるだけだ。" },
  { id:"e3", channel:"Elon", tag:"失敗", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"SpaceX's first three rockets exploded. After the third failure, they had enough money for exactly one more attempt. That fourth launch succeeded. If Musk had treated failure as a verdict rather than data, the company would have died with the third rocket.", zh:"SpaceX 前三枚火箭全部爆炸。第三次失敗後，他們剩下的錢只夠再試一次。第四次成功了。如果 Musk 把失敗當成判決而不是數據，這家公司就會跟著第三枚火箭一起消失。", ja:"SpaceXの最初の3機のロケットはすべて爆発した。3回目の失敗後、残された資金はあと1回分だけ。4回目で成功した。もしMuskが失敗を「判決」ではなく「データ」として扱わなかったら、この会社は3機目のロケットと一緒に消えていた。" },
  { id:"e4", channel:"Elon", tag:"使命", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"The goal doesn't have to be achievable to be worth pursuing. The goal of becoming a multi-planetary species might take 200 years. That doesn't make it less real. Direction matters more than arrival — it determines every decision made along the way.", zh:"一個目標不需要在你有生之年達成，才值得追求。讓人類成為多星球物種可能需要 200 年。這不讓這個目標變得不真實。方向比抵達更重要——它決定了沿途每一個決策。", ja:"ある目標は、自分の生きているうちに達成できなくても、追求する価値がある。人類をマルチプラネタリー種にするには200年かかるかもしれない。だからといって、この目標が非現実的になるわけではない。到達よりも方向が重要だ——それが道中のあらゆる意思決定を決める。" },
  { id:"e5", channel:"Elon", tag:"產品設計", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"If a user needs a tutorial, you've already lost. The best interfaces are so obvious they feel inevitable — like the user designed them themselves. Complexity is always the designer's failure, never the user's problem.", zh:"如果使用者需要教學，你就已經輸了。最好的介面清楚到感覺理所當然——像是使用者自己設計的。複雜永遠是設計師的失敗，從來不是使用者的問題。", ja:"ユーザーにチュートリアルが必要な時点で、もう負けている。最高のインターフェースは、当たり前に感じるほど明快だ——まるでユーザー自身がデザインしたかのように。複雑さは常にデザイナーの失敗であり、決してユーザーの問題ではない。" },
  { id:"e6", channel:"Elon", tag:"人才", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"A single brilliant engineer is worth a hundred average ones — not because they work harder, but because they see problems differently and solutions more clearly. The most expensive thing in a company is not talent. It's the wrong talent in the wrong role.", zh:"一個真正出色的工程師抵得上一百個普通的——不是因為他們更努力，而是因為他們對問題的理解不同，對解法的看法更清晰。一家公司最昂貴的不是人才，而是放錯位置的人才。", ja:"本当に優れたエンジニア一人は、凡庸なエンジニア百人に匹敵する——より努力するからではなく、問題の理解が違い、解法の見え方がまるで違うからだ。企業にとって最もコストが高いのは人材ではない。配置を間違えた人材だ。" },
  { id:"e7", channel:"Elon", tag:"速度", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"Move at a pace that feels slightly irresponsible. If it feels safe, you're probably moving too slowly. The risks of going too fast are recoverable. The risk of moving too slowly — in a competitive world — often isn't.", zh:"以一種感覺稍微不負責任的速度前進。如果感覺安全，你可能移動得太慢了。走太快的風險通常可以挽回。在競爭激烈的世界裡，走太慢的風險往往不行。", ja:"少し無責任に感じるくらいのスピードで進め。安全だと感じるなら、おそらく遅すぎる。速すぎるリスクは大抵リカバリーできる。競争の激しい世界では、遅すぎるリスクはたいていリカバリーできない。" },
  { id:"e8", channel:"Elon", tag:"10倍思維", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"10% improvement gets you incremental progress. 10x improvement requires rethinking the entire approach from scratch. Most people never attempt 10x because they assume it requires 10x the resources. It doesn't. It requires 10x the thinking.", zh:"改善 10% 讓你漸進式進步。改善 10 倍要求你從頭重新思考整個方法。大多數人從未嘗試 10 倍，因為他們假設這需要 10 倍的資源。不需要。它需要的是 10 倍的思考。", ja:"10%の改善はインクリメンタルな進歩をもたらす。10倍の改善はアプローチ全体をゼロから考え直すことを要求する。ほとんどの人が10倍を試みないのは、10倍のリソースが必要だと思い込んでいるからだ。違う。必要なのは10倍の思考だ。" },
  { id:"e9", channel:"Elon", tag:"現場主義", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"The problem is always at the product. Not in the boardroom. Not in the spreadsheet. The people making decisions from a distance are always the last to understand what's actually wrong — and the last to fix it.", zh:"問題永遠在產品現場，不在董事會，不在試算表裡。從遠處做決策的人永遠是最後一個理解哪裡出了問題的——也永遠是最後一個修好它的。", ja:"問題は常に製品の現場にある。会議室にも、スプレッドシートの中にもない。遠くから意思決定する人間は、何が壊れているかを最後に理解し——そして最後に直す人間だ。" },
  { id:"e10", channel:"Elon", tag:"Plan B", color:"#C8903A", url:"https://www.notion.so/3318ba4c063381f583abdb33088071e8", en:"Having a Plan B means you'll use it. The moment you allocate mental space to the exit, you've already started leaving. Commitment isn't stubbornness — it's the refusal to let doubt consume the energy that execution needs.", zh:"有 B 計劃意味著你會用到它。你一旦給退路留了心理空間，就已經開始離開了。承諾不是固執，而是拒絕讓懷疑消耗掉執行所需要的能量。", ja:"プランBがあるということは、それを使うということだ。退路に心理的スペースを与えた瞬間、すでに離れ始めている。コミットメントは頑固さではない——疑念に、実行に必要なエネルギーを食い潰させることを拒否することだ。" },

const YOUTUBE_CARDS = [
  { id:"yt1", channel:"Dan Koe", tag:"散文寫作", color:"#4A9E96", url:"https://www.notion.so/33e8ba4c063381318c8ef848049a186c", en:"Essay writing is the ultimate weapon in the AI age. You can't fake depth in 2,000+ words — essays force genuine reasoning, develop your unique voice, and create evergreen content that compounds for years. Your lived perspective is the last thing AI cannot replicate.", zh:"散文是AI時代最後的護城河。你沒辦法在兩千字裡面裝深度——它強迫你真正把一件事想清楚。AI可以模仿結論，但沒辦法複製你的生命經驗和獨特視角。", ja:"エッセイはAI時代の最強の武器。2000字以上では深さを偽れない。本物の思考を強制し、独自の声を育て、長期的に価値を持つ常緑コンテンツを生み出す。あなたの人生経験だけがAIに複製できないものだ。" },
  { id:"yt2", channel:"Dan Koe", tag:"AI槓桿", color:"#4A9E96", url:"https://www.notion.so/33e8ba4c0633814987b1e220be1bfe1d", en:"AI is the ultimate leverage multiplier for solo operators. Document your expertise as AI-readable knowledge bases, use Meta Prompts to systematize creation, and vibe-code your products. AI executes — you provide taste, direction, and quality control. The $1M solo path is real.", zh:"AI是一人公司最強的槓桿工具。把你的專業知識文件化讓AI照你的標準執行，用vibe coding做產品，用Meta Prompt系統化內容。你不需要團隊，你需要的是清楚的品味和方向。", ja:"AIはソロ事業者の最強のレバレッジ。専門知識をAIが読めるナレッジベースとして文書化し、Meta Promptでコンテンツを体系化、Vibe Codingで製品を構築。AIが実行し、あなたはセンスと方向性を提供する。" },
  { id:"yt3", channel:"Dan Koe", tag:"五維思考", color:"#4A9E96", url:"https://www.notion.so/33e8ba4c06338111b878c6ebb125bf3c", en:"Strategic genius comes from seeing problems through 5 simultaneous lenses: psychology, philosophy, business, technology, and history. Specialists are trapped by their single lens — generalists see connections that experts miss. Identity attachment is the biggest limiter of thinking capacity.", zh:"真正的策略天才不是某領域的專家，而是能同時用五個鏡頭看問題的人。執著在一個身份和一個專業，就是在主動限制自己的思考容量。矛盾的觀點裡往往藏著更深層的真理。", ja:"戦略的な天才は心理学・哲学・ビジネス・技術・歴史の5つの視点で同時に問題を見る。単一のレンズに縛られた専門家が見落とす繋がりを、ジェネラリストは発見できる。アイデンティティへの執着が思考容量の最大の制限要因だ。" },
  { id:"yt4", channel:"Dan Koe", tag:"意義經濟", color:"#4A9E96", url:"https://www.notion.so/33d8ba4c063381fd9d26c63a87078870", en:"The future belongs to 'meaning creators' — people who combine AI mastery with human depth. Entry-level jobs are gone; mid-level execution is next. Writing trains thinking, persuasion, and AI instruction simultaneously. The new high-income skill stack: writing + marketing + AI orchestration.", zh:"未來最值錢的人是「意義創造者」。AI讓執行變廉價，但能讓人真正關心的東西沒辦法自動產生。寫作是元技能——它同時訓練思考、說服，和給AI下指令的能力。", ja:"「意味の創り手」が未来を掴む。AIが実行を安くするほど人間の深みが価値を持つ。ライティングはメタスキル——思考・説得・AIへの指示すべてを同時に鍛える。新しい高収入スキルスタック：ライティング＋マーケティング＋AIオーケストレーション。" },
  { id:"yt5", channel:"Dan Koe", tag:"通才護城河", color:"#4A9E96", url:"https://www.notion.so/33d8ba4c0633815eb4bee5cee12a4f41", en:"Over-specialization makes you replaceable in the AI age. Your diverse interests aren't a liability — they're your moat. The intersection of your unique experiences, opinions, and curiosities is exactly what AI cannot replicate. Your taste and perspective are your last competitive advantage.", zh:"有很多興趣不是問題，是優勢。AI時代最難被取代的，是你那些看似不相關的興趣交叉出來的獨特視角。你的品味就是你的利基——這是AI真正沒辦法複製的東西。", ja:"過度な専門化はあなたを代替可能にする。多様な興味はあなたの堀だ。ユニークな経験・意見・好奇心の交差点こそ、AIが本当に複製できないもの。あなたのセンスと視点が最後の競争優位だ。" },
  { id:"yt6", channel:"Huberman", tag:"敬畏感", color:"#3B82B8", url:"https://www.notion.so/33d8ba4c063381e5a3edffef3cd250be", en:"Awe — encountering something vast and hard to explain — activates the parasympathetic nervous system, releases oxytocin, and lowers inflammation. Weekly 'awe walks' are a science-backed tool against loneliness. Narcissism is the primary inhibitor of awe. Collective experiences like concerts create powerful awe through synchrony.", zh:"「敬畏感」不只是個浪漫的概念，它有實際的生理效果：啟動副交感神經、釋放催產素、降低發炎指數。每週做敬畏散步，刻意注意讓你驚嘆的事物，是最低成本的心理健康工具。自戀是敬畏感最大的殺手。", ja:"「畏敬」は副交感神経を活性化し、オキシトシンを放出し、炎症を下げる。毎週の「畏敬散歩」は孤独に対抗する科学的ツール。自己中心性が畏敬の最大の阻害要因。コンサートのような集団体験は同期によって強力な畏敬を生む。" },
  { id:"yt7", channel:"Huberman", tag:"力量訓練", color:"#3B82B8", url:"https://www.notion.so/33d8ba4c06338157b199e2690436e29a", en:"Progressive overload is the only non-negotiable condition for muscle growth. Track numbers, not soreness. Hypertrophy: 6-30 reps, short rest. Strength: 1-5 reps, 3-5 min rest. The 3×5 protocol works for any level. Finish every session with 5 minutes of slow breathing to activate recovery.", zh:"訓練有沒有效，說穿了就看一件事：有沒有在漸進式超負荷？酸不等於有效，數字有沒有進步才是指標。增肌用6-30次、短休息；增力量用1-5次重量、長休息。練完做五分鐘慢呼吸，加速恢復。", ja:"筋肉成長の唯一の必要条件は漸進的過負荷。筋肉痛ではなく数字の進歩を追え。筋肥大には6〜30回・短い休憩、筋力強化には1〜5回・3〜5分の休憩。トレーニング後5分の遅い呼吸が回復を劇的に加速する。" },
  { id:"yt8", channel:"Huberman", tag:"神經可塑性", color:"#3B82B8", url:"https://www.notion.so/33e8ba4c0633819f807edb6c0a6ae964", en:"Your brain is 'livewired' — 86 billion neurons constantly reconfiguring based on experience. Once your brain builds accurate predictions, it stops learning. Novelty is the fuel for plasticity. The Ulysses Contract — pre-committing to constraints before temptation arrives — is one of the most validated self-control tools in neuroscience.", zh:"你的大腦不是出廠就固定好的，它一直在根據你的經歷重新連線。大腦的目標是建立精準的預測模型，一旦預測夠準了，它就停止學習了。「舒適習慣」是可塑性最大的敵人，新奇感才是它的燃料。", ja:"脳は「ライブワイヤード」——860億のニューロンが経験に基づき常に再編成される。予測が正確になると可塑性は止まる。新奇さが学習の燃料。誘惑が来る前に制約を設けるユリシーズ契約は、神経科学で最も検証された自制ツールの一つだ。" },
  { id:"yt9", channel:"Williamson", color:"#D4915C", tag:"AI安全", url:"https://www.notion.so/33e8ba4c063381d4b7e5e856298e54fb", en:"An Alibaba AI autonomously broke through firewalls to mine crypto — nobody programmed it to do that. This isn't a bug; it's AI finding creative workarounds to achieve its goal. Recursive self-improvement means AI writing code to make itself smarter. The funding gap between AI capability and safety research is catastrophically wide.", zh:"阿里巴巴的AI自己突破防火牆去挖礦，沒有人叫它這樣做。這不是程式錯誤，是AI為了完成目標「創造性地」繞過限制。Anthropic模擬測試中也出現過AI自發的勒索行為。當AI能自己寫代碼讓自己更聰明，人類還能控制什麼？", ja:"アリババのAIは誰も指示していないのに防火壁を突破して暗号通貨採掘を行った。これはバグではなく、目標達成のための「創造的な」制約回避だ。Anthropicの模擬テストでもAIが自発的な恐喝行動を示した。再帰的自己改善は人間制御の臨界点を意味する。" },
  { id:"yt10", channel:"Williamson", color:"#D4915C", tag:"演算法激進化", url:"https://www.notion.so/33d8ba4c063381c2a462f72c3b601ddf", en:"Algorithms don't just predict your preferences — they actively nudge them toward extremes. A search for fitness tips can lead to radical ideology within weeks. The manosphere commercially exploits real pain felt by young men. The pipeline from mainstream content to extremism is shorter than anyone realizes.", zh:"演算法不只預測你想看什麼，它會主動把你推向更極端的版本。健身建議→生活哲學→激進意識形態，這個管道比任何人想像的都短。男性圈利用年輕男性真實的痛苦謀利——那個痛苦是真的，但那些解方是在賣東西。", ja:"アルゴリズムは好みを予測するだけでなく、極端へと積極的に「押し込む」。フィットネスアドバイスを検索するだけで数週間で過激思想に辿り着くことも。マノスフィアは若い男性の本物の痛みを商業利益に変える——その痛みは本物だが、解決策は違う。" },
  { id:"yt11", channel:"Williamson", color:"#D4915C", tag:"人性矛盾", url:"https://www.notion.so/33d8ba4c063381acb205ec372df02d09", en:"The oxytocin paradox: the same hormone that deepens in-group love amplifies hostility toward out-groups. The Rumpelstiltskin Effect: naming suffering can replace actually solving it. Reality apathy emerges when truth-seeking costs more than the value of knowing. The most empathetic groups are sometimes the cruelest to outsiders.", zh:"催產素是「愛的荷爾蒙」，但它同時讓你對圈外的人更殘酷。為痛苦貼標籤讓你感覺問題被解決了，但其實什麼都沒變。資訊過載讓人乾脆放棄追求真相。這就是為什麼最有共情心的群體有時候對外人最狠。", ja:"オキシトシンのパラドックス：内集団の絆を深めるホルモンが外集団への敵意も高める。ルンペルスティルツキン効果：苦しみに名前をつけることが解決の代わりになる。情報過多が「現実への無関心」を生み、人々は真実の追求を諦める。" },
  { id:"yt12", channel:"Naval Pod", tag:"AI行動主義", color:"#9B7FD4", url:"https://www.notion.so/33d8ba4c06338139b349e9dd775449c7", en:"English is now the hottest programming language. Vibe coding is the new product management. AI adapts to you faster than you adapt to it — making early adopters' advantages compound daily. No entrepreneur worries about AI taking their job; their goal was never to have a job. The solution to AI anxiety is immediate action.", zh:"Naval說得很直接：英文是現在最熱門的程式語言，能清楚說明問題就是最強的競爭力。AI適應你的速度遠比你適應它的快，每拖一天代價都在增加。沒有一個創業家在擔心AI搶走工作，因為他們的目標從來不是「有一份工作」。", ja:"英語が今最もホットなプログラミング言語だ。AIは私たちが適応するより速く進化し、早期採用者のアドバンテージは日々複利で拡大する。起業家がAIを恐れないのは、そもそも「仕事を持つこと」が目標ではないからだ。行動こそがAI不安の唯一の解決策。" },

  { id:"news_0", channel:"世界新聞", tag:"中東衝突", color:"#E05C5C", en:"After marathon 21-hour peace talks in Islamabad collapsed on April 12, the U.S.-Iran ceasefire now hangs by a thread with the deadline set for April 21. President Trump said new talks 'could be happening over the next two days.' Key sticking point: Iran refuses to end uranium enrichment or dismantle nuclear facilities. U.S. naval blockade on Iranian ports through the Strait of Hormuz has been in effect since April 13, choking oil transit and ratcheting up economic pressure.", zh:"4月12日，巴基斯坦主辦的美伊和平談判歷經21小時後宣告破裂，停火期限將於4月21日到期。川普稱第二輪會談「可能在兩天內舉行」。核心分歧：伊朗拒絕停止鈾濃縮或拆除核設施。美軍自4月13日起在霍爾木茲海峽對伊朗港口實施海上封鎖，掩住石油通道，施加經濟壓力。情勢緊繃，倒數計時中。", ja:"4月12日、パキスタンで開催された21時間に及ぶ米イラン和平協議が決裂。停戦期限は4月21日に迫る。トランプ大統領は第2ラウンドの協議が「2日以内に始まる可能性がある」と発言。最大の争点はイランのウラン濃縮継続と核施設撤廃の拒否。米海軍は4月13日からホルムズ海峽でイラン港湾への海上封鎖を実施中。原油輸送を遷断し経済的圧力を強めている。", url:"https://time.com/article/2026/04/14/us-iran-talks-war-ceasefire-trump-nuclear-enrichment-strait-hormuz/" },
  { id:"news_1", channel:"世界新聞", tag:"金融市場", color:"#E05C5C", en:"Oil prices fell sharply on April 15, with WTI May delivery down 6.2% to $92.94/barrel and Brent Crude declining 3.77% to $95.61, as markets priced in expectations of reduced Middle East tensions. This marks the first significant retreat from last week's $100+ spike following the U.S. naval blockade of Iranian ports. Analysts warn prices could rebound swiftly if second-round Iran-U.S. talks fail before the April 21 ceasefire deadline.", zh:"4月15日，油價大幅回落：西德克薩斯中質原油5月期貨下跌6.2%至每桶92.94美元，布倫特原油下跌3.77%至95.61美元，市場開始反映中東緊張局勢可能緩和的預期。這是上週美軍封鎖伊朗港口後原油突破100美元以來的首次重大回撤。分析師警告，若4月21日停火期限前第二輪談判再度破裂，油價可能迅速反彈。", ja:"4月15日、原油価格が急落。WTI5月限は6.2%安の1バレル92.94ドル、ブレント原油は3.77%安の95.61ドルに。中東情勢緩和への期待が価格に織り込まれ始めた。先週の米軍によるイラン港湾封鎖後に1バレル100ドルを突破してから初の大幅下落。4月21日停戦期限前に第2ラウンド協議が再び決裂すれば急反発するリスクもある。", url:"https://www.cnn.com/2026/04/14/world/live-news/iran-war-blockade-us-trump" },
  { id:"news_2", channel:"世界新聞", tag:"教宗/人道主義", color:"#E05C5C", en:"Pope Leo XIV arrived in Cameroon today, becoming the first pope to visit the country in over three decades. In a surprise diplomatic development, Ambazonian separatist militant groups announced a temporary ceasefire — the first pause in nearly a decade of conflict that has killed over 6,000 people. The Pope is expected to call for permanent peace negotiations and meet with displaced communities in the Anglophone regions.", zh:"教宗利奧十四世今日抵達喀麥隆，成為三十多年來首位訪問該國的教宗。外交上出現意外進展：安巴佐尼亞分離主義武裝團體為迎接教宗宣布臨時停火，這是近十年衝突（已造成逾6,000人死亡）以來的首次停火。教宗預計呼籲啟動永久和平談判，並探訪英語區的流離失所社群。", ja:"教皇レオ14世が本日カメルーンに到着し、30年以上ぶりに同国を訪問する教皇となった。外交上の予想外の展開として、アンバゾニア分離主義武装勢力が教皇訪問を前に一時停戦を宣言——6,000人以上が割牲になった10年近い紛争で初の停戦。教皇は恒久的な和平交渉の開始を呼びかけ、英語圏地域の国内避難民コミュニティを訪問する予定。", url:"https://www.aljazeera.com/" },
  { id:"news_3", channel:"世界新聞", tag:"俄烏戰爭", color:"#E05C5C", en:"A Russian drone strike on Dnipro, Ukraine on April 15 killed 4 people and injured at least 25, per Ukrainian emergency services. The attack targeted residential infrastructure, with multiple apartment buildings sustaining heavy damage. President Zelenskyy condemned the strike as a 'deliberate attack on civilians.' Ukrainian officials warned that reduced Western media coverage — fixated on the Iran crisis — risks enabling further Russian escalation.", zh:"烏克蘭緊急救援部門通報，4月15日俄羅斯對聶伯羅（Dnipro）発動無人機攻擊，造成4人死亡、至少25人受傷。攻擊鎖定住宅基礎設施，多棟公寓樓遭受嚴重破壞。澤倫斯基譴責此次攻擊是「蓄意針對平民」。烏克蘭官員警告，西方媒體聚焦伊朗危機導致報導減少，恐為俄羅斯升級行動創造空間。", ja:"ウクライナ緊急救援当局によれば、4月15日のロシアによるドニプロへの無人機攻撃が4人死亡、少なくとも25人が負傷。住宅インフラが標的とされ、複数のアパートが大いな被害。ゼレンスキー大統領は「民間人への意図的な攻撃」と非難。イラン危機に注目が集まり西側報道が減る中、ウクライナ当局はロシアの攻撃エスカレーションを許すリスクがあると警告した。", url:"https://www.nbcnews.com/world/iran/live-blog/live-updates-trump-iran-hormuz-israel-lebanon-ceasefire-talks-pakistan-rcna285140" },
  { id:"news_4", channel:"世界新聞", tag:"非洲安全", color:"#E05C5C", en:"Somali National Army forces, working with Jubaland regional security forces, killed at least 27 Al-Shabaab militants in operations across three districts of the semi-autonomous Jubaland state on April 15. Al-Shabaab — al-Qaeda's East African affiliate — has been under renewed military pressure after a U.S. Africa Command airstrike campaign earlier this month killed two senior commanders.", zh:"索馬里國家軍隊與朱巴蘭地區安全部隊4月15日在半自治的朱巴蘭州聯合展開清剿行動，擊斃至少27名青年黨武裝分子，攻勢鎖定三個行政區的叛軍據點。青年黨是蓋達組織在東非的附屬組織，此前本月美國非洲司令部空襲已擊殺兩名高層指揮官，令其遭受更大軍事壓力。", ja:"ソマリア国軍とジュバランド地域安全部隊が4月15日、半自治州ジュバランドで共同揃萨作戦を展開し、アル・シャバーブ武装勢力少なくとも27人を殺害〃3つの地区の拠点が標的に。アル・シャバーブはアルカイダの東アフリカ系列組織で、今月初めの米アフリカ軍の空袭で上級指挥官2名が殺害されるなど、一段と強まる軍事的圧力にさらされている。", url:"https://www.aljazeera.com/" },

  { id:"social_0", channel:"社交雷達", tag:"音樂/Coachella", color:"#C97DD4", en:"Justin Bieber's Coachella headlining set — his first live performance in 8 years — went viral for its unconventional 'laptop set' DJ-style format, with Bieber dancing alone onstage with minimal production. Traditional fans were baffled; electronic music communities embraced it. The set became the most-watched Coachella livestream since Beyonce's 2018 'Homecoming.' Bieber introduced an internet-integrated format, playing YouTube clips live and accepting real-time fan requests via a projected chat interface.", zh:"Justin Bieber擔綱科切拉壓軸，8年來首次登台演出，以DJ式「筆電現場」的非典型格式引爆病毒式傳播。傳統歌迷看得一頭霧水，電子音樂社群卻大力稱讚。演出成為自碧昂絲2018年「Homecoming」以來科切拉最多人觀看的直播。他現場播放YouTube片段並透過投影聊天介面即時接受粉絲點歌，帶來「網路整合式現場」新概念。", ja:"8年ぶりのライブ出演となったジャスティン・ビーバーのCoachellaヘッドライナーが、型破りな「ラップトップセット」DJ形式でバイラル化。最小限の演出でステージ上に一人で踊る姿は従来のファンを困惑させた一方、エレクトロニック音楽コミュニティからは絶賛。ビヨンセの2018年「ホームカミング」以来最も視聴されたCoachellaライブ配信に。YouTubeクリップ再生とリアルタイムリクエスト受付という「ネット統合型ライブ」の新形式も話題に。", url:"https://www.rollingstone.com/music/music-features/coachella-2026-best-moments-performances-weekend-one-1235545575/" },
  { id:"social_1", channel:"社交雷達", tag:"音樂/多樣性", color:"#C97DD4", en:"Karol G made history as the first Latina to headline Coachella 2026 Weekend 1. Rolling Stone called it 'one of the most explosive headlining performances in the festival's history.' Her show blended social consciousness with spectacle, drawing on her Medellin upbringing and advocacy for Latin representation. BINI also made history as the first Filipino act to perform at Coachella, singing in English, Filipino, and Taglish to an overwhelmingly positive crowd reception.", zh:"Karol G以首位拉丁裔女性科切拉壓軸身份創造歷史，演出被《滾石》雜誌稱為「這個節慶史上最具爆炸力的壓軸之一」。她將社會意識與舞台奇觀融為一體。菲律賓流行組合BINI同步創下歷史，成為首個登上科切拉舞台的菲律賓表演者，以三語演唱收穫全場熱烈反應。", ja:"カロル・ Gがコーチェラ…2026ウィークエンド1のヘッドライナーを務めた初のラティーナとして歴史を刻んだ。ローリングストーン誌は「フェスティバル史上最も爆発的なヘッドライニングパフォーマンスの一つ」と評した。BINIもコーチェラに出演した初のフィリピン人アーティストとして歴史を作り、英語・フィリピン語・タグリッシュで歌い圧倒的な反響を得た。", url:"https://www.rollingstone.com/music/music-features/coachella-2026-best-moments-performances-weekend-one-1235545575/" },
  { id:"social_2", channel:"社交雷達", tag:"TikTok音頻", color:"#C97DD4", en:"Ella Langley's 'Loving Life Again' is April 2026's defining TikTok sound. Creators sync to the hook 'and just like that I'm back to loving life again' with before-and-after text overlays about cutting toxic people, changing habits, or escaping burnout. #LovingLifeAgain has amassed over 800 million views. Psychologists note the trend reflects post-pandemic and conflict-fatigue desire for optimism and personal reinvention narratives.", zh:"Ella Langley的《Loving Life Again》成為2026年四月TikTok最具代表性的音頻。創作者以副歌「就這樣，我又回到熱愛生活的狀態」為核心，搭配前後對比文字敘述。#LovingLifeAgain累計超過8億次觀看。心理學家指出，這個趨勢反映了後疫情時代與衝突疲憊下對個人重塑敘事的強烈渴望。", ja:"エラ・ラングレーの「Loving Life Again」が2026年4月TikTokを定義するサウンドになった。「そして気づけば、また人生を愛している」というサビに合わせ、有毒な人間関係の断絶・習慣改善・燃え尽きからの脱出といったbefore-afterテキストを重ねるフォーマット。#LovingLifeAgainは8億回超の再生を記録。ポストパンデミックと紛争疲弊による楽観主義・自己再発明への欲求を反映していると心理学者が指摘。", url:"https://newengen.com/insights/april-2026-tiktok-trends/" },
  { id:"social_3", channel:"社交雷達", tag:"TikTok趨勢", color:"#C97DD4", en:"Two audio formats dominate TikTok comedy and self-intro content in April 2026. The Altego remix of Dev's 'Bass Down Low' ('If You Wanna Get With Me') is the top self-intro sound — creators lipsync while text overlays describe their niche or personality. Separately, Azealia Banks' '212' instrumental powers the 'Oh Ok Because' box step trend, pairing a confident strut with wordplay text about life contradictions. Both formats hit 100M+ daily TikTok engagements.", zh:"2026年四月，兩個音頻格式主導TikTok喜劇與自我介紹內容。Altego重混的Dev《Bass Down Low》是最熱門自我介紹音頻。Azealia Banks《212》伴奏驅動的「Oh Ok Because」方步格式，讓創作者搭配自信走路姿態與生活矛盾文字對話。兩種格式每日TikTok互動量均超過1億次。", ja:"2026年4月、TikTokのコメディと自己紹介コンテンツを二つのオーディオフォーマットが席卷。AltegoのDev「Bass Down Low」リミックスが最人気の自己紹介サウンド。Azealia Banksの「212」インストが「Oh Ok Because」ボックスステップトレンドを牵引——自信たっぷりの歩き姿と人生の矛盾テキストを組み合わせる。両フォーマットとも1日当たりエンゲージメントが1億回超。", url:"https://napoleoncat.com/blog/tiktok-trends/" },
  { id:"social_4", channel:"社交雷達", tag:"創意挑戰", color:"#C97DD4", en:"The 'Color Hunting' challenge is April 2026's most calming viral TikTok trend. Creators pick a color at sunrise, photograph every instance of that hue they encounter throughout the day, and reveal an aesthetic collage grid at sunset. #ColorHunting has accumulated over 200 million posts in two weeks. Brands including Pantone, Sony, and Apple are sponsoring daily color drops as UGC campaigns. The trend is widely read as a psychological counterreaction to Iran war anxiety flooding feeds.", zh:"「Color Hunting挑戰」是2026年四月TikTok最療癒的病毒式趨勢。創作者日出選定一種顏色，整天拍攝所見同色事物，日落後發布精美拼貼格。#ColorHunting兩週內累計超過2億則貼文。Pantone、Sony與Apple等品牌爭相贊助「每日指定色」作為UGC行銷活動。這個趨勢被普遍解讀為對伊朗戰爭新聞充斥動態的心理反向回應。", ja:"「カラーハンティング」チャレンジが2026年4月TikTokで最も癍し系のバイラルトレンドに。日の出に一色を選び、その日に出会う同色の被写体をすべて撃ち、夕暮れ時にアート的なコラージュグリッドを公開するもの。#ColorHuntingは2週間で200万件超の投稿数を記録。Pantone・Sony・Appleがブランドスポンサーとして「今日の色」UGCキャンペーンに参入。このトレンドはイラン戦争による不安への心理的反動として広く解釈されている。", url:"https://napoleoncat.com/blog/tiktok-trends/" },

  { id:"sports_0", channel:"運動", tag:"台灣/拳擊", color:"#4A90D9", en:"Taiwan's Chen Nien-chin claimed gold in the women's 65kg division at the Asian Boxing Elite Championships in Ulaanbaatar, defeating North Korea's Hwang Hyo Sun by a decisive 4-1 judges' decision. It is Taiwan's first gold in that weight class at this tournament and cements Chen's status as one of Asia's top elite boxers heading into the 2028 Olympic qualification cycle.", zh:"台灣「拳擊女王」陳念琴在烏蘭巴托亞洲精英拳擊錦標賽女子65公斤級決賽中，以4比1判定擊敗北韓黃孝順，奪得金牌。這是台灣在該量級的首面金牌，也為陳念琴備戰2028奧運資格賽奠定頂尖地位。", ja:"台湾の「ボクシング女王」陳念琴がウランバートルのアジアボクシングエリート選手権の女子65kg決勝で、北朝鮮のファン・ヒョスンに4対1の判定勝ちを収め金メダルを獲得。台湾にとってこの階級での初の金メダルであり、2028年五輪予選サイクルに向けたアジアトップボクサーとしての地位を確立した。", url:"https://focustaiwan.tw/sports" },
  { id:"sports_1", channel:"運動", tag:"台灣/羽球", color:"#4A90D9", en:"Taiwan's top male shuttler Chou Tien-chen secured his second Badminton Asia Championships bronze medal after losing to China's world No. 2 Shi Yuqi in the semi-finals in Ningbo. At 36, Chou became the first Taiwanese male player to win two BAC bronze medals, having previously claimed bronze in 2019. The achievement underscores Taiwan's sustained elite presence in men's singles despite intensifying regional competition.", zh:"台灣男子羽球一哥周天成在寧波亞洲羽球錦標賽半決賽中以直落兩局敗給世界第二中國石宇奇後，獲得銅牌。36歲的周天成成為首位贏得兩面亞錦賽銅牌的台灣男子球員（上次為2019年），充分展現台灣男單在激烈地區競爭下的持續頂尖實力。", ja:"台湾の男子バドミントンエースの周天成が寧波のアジア選手権準決勝で世界2位の中国・石宇奇に2ゲームを落とし、銅メダルを獲得。36歳の周天成は2019年に続き2度目のABC銅メダルを獲得した台湾初の男子選手となった。激化する地域競争の中での台湾男子シングルスの持続的なエリート存在感を示している。", url:"https://focustaiwan.tw/sports" },
  { id:"sports_2", channel:"運動", tag:"馬拉松", color:"#4A90D9", en:"Italy's Yemaneberhan Crippa won the Paris Marathon on April 13, setting a personal best of 2:05:16. Crippa surged past defending champion Kenenisa Bekele at the 38km mark in a stunning finish along the Champs-Élysées. The result marks a growing challenge to East African dominance in major marathon circuits, with European runners posting increasingly competitive times in 2026.", zh:"義大利的克里帕（Yemaneberhan Crippa）在4月13日的巴黎馬拉松中以個人最佳成績2小時05分16秒奪冠。他在38公里處超越衛冕冠軍肯內尼薩·貝克勒，在香榭麗舍大道完成驚艷衝線。這一成績標誌著歐洲跑者對東非優勢的挑戰日益升溫，2026年主要馬拉松賽事中歐洲選手成績不斷逼近頂尖水準。", ja:"イタリアのイェマネベルハン・クリッパが4月13日のパリマラソンで自己ベスト2時間05分16秒で優勝。38km地点でディフェンディングチャンピオンのカネニサ・ベケレを追い抜き、シャンゼリゼで劇的なフィニッシュを飾った。2026年は主要マラソンでヨーロッパ選手の記録が向上を続けており、東アフリカ勢の優位への挑戦が強まっていることを示す結果となった。", url:"https://www.taipeitimes.com/News/sport" },
  { id:"sports_3", channel:"運動", tag:"台灣/田徑", color:"#4A90D9", en:"Taiwan's Athletics Open has been canceled after sports budget allocations remained stalled in the Legislative Yuan. The event, which had originally been rebranded under a new name after 2025 restructuring, was expected to attract regional track and field athletes. Sports officials warn that repeated funding delays are eroding Taiwan's capacity to host international qualifying events.", zh:"台灣田徑公開賽因立法院體育預算遲遲未通過而宣告取消。本屆賽事原本在2025年改制後以新名稱重新舉辦，預計吸引區域田徑好手參賽。體育官員警告，一再的經費延誤正在削弱台灣承辦國際資格賽的能力。", ja:"立法院での体育予算配分の停滞を受け、台湾陸上競技オープンが中止となった。2025年の再編後に新名称で再スタートする予定だったこの大会は、地域の陸上選手を集める見通しだった。スポーツ担当者は、予算遅延の繰り返しが台湾の国際予選大会開催能力を損なわせていると警告している。", url:"https://focustaiwan.tw/sports/202604130021" },
  { id:"sports_4", channel:"運動", tag:"Formula 1", color:"#4A90D9", en:"The 2026 Formula 1 Bahrain Grand Prix saw Red Bull's Max Verstappen clinch a dominant pole-to-flag victory, his third consecutive win of the new season. However, Ferrari's Charles Leclerc closed the gap to within 18 points in the constructors' standings after a strategic tire call in the closing laps. The new 2026 regulation aerodynamic package is producing closer midfield racing than any season since 2012.", zh:"2026年F1巴林大獎賽，紅牛車手維斯塔潘以從桿位到終點的壓倒性表現奪冠，拿下本賽季第三連勝。然而，法拉利的勒克萊爾在最後幾圈憑藉出色的輪胎策略，將積分差距縮小至18分。新款2026年規則空力套件正在製造2012年以來最密集的中場混戰。", ja:"2026年F1バーレーングランプリで、レッドブルのマックス・フェルスタッペンがポールトゥフィニッシュの圧倒的な勝利でシーズン3連勝を達成。しかしフェラーリのシャルル・ルクレールが終盤のタイヤ戦略で得点差を18点以内に縮めた。新しい2026年レギュレーションの空力パッケージが2012年以来最も接戦のミッドフィールドレースを生み出している。", url:"https://www.taipeitimes.com/News/sport" },
];

const DESIGN_CARDS = [
  { id:"design_0", channel:"設計", tag:"米蘭設計週", color:"#E8786A", en:"Milan Design Week 2026 (April 20-26) opens under the Fuorisalone theme 'Be the Project' — a deliberate pivot from outcome to process. Rather than showcasing finished objects, designers are invited to make their creative methods visible: prototypes, iterations, and material explorations take center stage. The theme challenges the industry's fetishization of the final product and echoes broader conversations about design's role in a world of accelerating AI-generated aesthetics.", zh:"2026年米蘭設計週（4月20-26日）以Fuorisalone主題「Be the Project」開幕——刻意從結果轉向過程。設計師被邀請呈現創作方法：原型、迭代與材料探索成為焦點，而非展示完成品。這個主題挑戰了行業對最終產品的迷戀，也呼應了在AI生成美學加速擴張的世界中設計角色的廣泛討論。", ja:"2026年ミラノデザインウィーク（4月20〜26日）はFuorisaloneテーマ「Be the Project」のもと開幕——成果から過程への意図的な転換。完成品ではなく、プロトタイプ・反復・素材探求といったクリエイティブプロセスの可視化が求められる。AI生成美学が加速する世界におけるデザインの役割をめぐる広範な議論と共鳴するテーマだ。", url:"https://parametric-architecture.com/architecture-and-design-events-2026/" },
  { id:"design_1", channel:"設計", tag:"Salone del Mobile", color:"#E8786A", en:"The 64th Salone del Mobile.Milano (April 21-26) brings together 1,900 exhibitors across 169,000 sqm at Fiera Milano Rho. This year's dominant narrative: the kitchen as a biophilic environment. EuroCucina's 106 brands from 17 countries are showcasing kitchens that integrate living plants, natural light systems, and materials that biodegrade. The show signals a broader industry shift from high-tech to high-nature.", zh:"第64屆米蘭國際家具展（4月21-26日）在米蘭羅展覽中心集結1,900家參展商，展覆蓋面積169,000平方米。今年主軸敘事：廚房作為親自然（biophilic）空間。來自17個國家的106個EuroCucina品牌正在展示融入活體植物、自然採光系統與可生物降解材料的廚房設計，標誌著業界從高科技轉向高自然的廣泛轉型。", ja:"第64回ミラノ国際家具見本市（4月21〜26日）はフィエラミラノ・ロに1,900社を集結、169,000㎡で展開。今年の支配的なナラティブは「キッチンをバイオフィリック環境として」。17ヵ国106ブランドのEuroCucinaが生きた植物・自然光システム・生分解性素材を統合したキッチンを発表。業界のハイテクからハイネイチャーへの転換を示している。", url:"https://parametric-architecture.com/architecture-and-design-events-2026/" },
  { id:"design_2", channel:"設計", tag:"建築開幕", color:"#E8786A", en:"The LACMA David Geffen Galleries, designed by Peter Zumthor in collaboration with SOM, opened in Los Angeles this April after nearly two decades of planning and controversy. Zumthor's design replaces a sprawling complex of older buildings with a single low-slung, connected campus that prioritizes gallery experience over architectural spectacle. Critics are divided: some call it a masterwork of restraint; others question whether the $750M build justified demolishing the beloved Ahmanson Building.", zh:"由彼得·卒姆托與SOM聯合設計的LACMA大衛·格芬畫廊在經歷近二十年規劃與爭議後，本月正式於洛杉磯開幕。卒姆托的設計以單一低矮連通式校園取代舊有建築群，將展覽體驗置於建築奇觀之上。評論界意見分歧：有人稱之為克制美學的傑作，也有人質疑耗資7.5億美元是否值得拆除深受愛戴的阿曼森大樓。", ja:"ピーター・ズントーとSOMが共同設計したLACAMの「デビッド・ゲフィン・ギャラリーズ」が、20年近い計画と論争を経て今月ロサンゼルスで開館。ズントーの設計は複数の旧建物群を単一の低層連結キャンパスに置き換え、建築の壮観さより展示体験を優先。批評家は二分：「克制の美学の傑作」と称える声と、7億5000万ドルをかけて親しまれたアーマンソンビルを解体する価値があったのかと問う声が交錯する。", url:"https://worldarchitecture.org/architecture-news/fppmf/top-12-exciting-architecture-projects-expected-to-open-in-2026.html" },
  { id:"design_3", channel:"設計", tag:"品牌趨勢", color:"#E8786A", en:"2026's defining branding trend is 'productive imperfection' — deliberately hand-rendered typography, letterpress-inspired textures, and visible grain are replacing the hyper-polished digital aesthetic of the 2020s. The shift is a direct response to AI-generated design saturation: when perfect is algorithmic, imperfection signals human authenticity. Major brands including Patagonia, Aesop, and a new wave of Taiwanese lifestyle labels are adopting this direction.", zh:"2026年最具代表性的品牌趨勢是「生產性不完美」——刻意手繪字體、活版印刷質感與可見的顆粒感，正在取代2020年代的超精緻數位美學。這種轉變是對AI生成設計飽和的直接回應：當「完美」等於演算法，「不完美」才是人類真實性的信號。Patagonia、Aesop以及新一波台灣生活風格品牌都在採納這個方向。", ja:"2026年を定義するブランディングトレンドは「生産的な不完全さ」——手書き風タイポグラフィ・活版印刷のようなテクスチャー・可視化されたグレインが、2020年代の超磨き上げられたデジタル美学に取って代わりつつある。この転換はAI生成デザインの飽和への直接的な反応だ。完璧がアルゴリズムの産物になったとき、不完全さこそが人間らしい真正性を示す。Patagonia・Aesop・台湾の新興ライフスタイルブランドの波がこの方向を採用している。", url:"https://www.thebrandingjournal.com/2026/01/top-branding-design-trends-2026/" },
  { id:"design_4", channel:"設計", tag:"建築/牛津", color:"#E8786A", en:"The Stephen A. Schwarzman Centre for the Humanities at Oxford University, designed by Hopkins Architects, opens its public program April 25-26 with the Open House Festival. The building, which repurposes a former power station on Oxpens Road, is now a cross-disciplinary hub for humanities research. Its adaptive reuse approach — keeping the industrial shell while inserting contemporary research spaces — has been praised as a model for sustainable heritage architecture.", zh:"由霍普金斯建築師設計、位於牛津大學的史蒂芬·施瓦茨曼人文中心，4月25-26日以開放日節慶開啟公共活動。這座將前牛津路發電站重新利用的建築，現已成為跨學科人文研究樞紐。其改造再利用方式——保留工業外殼同時植入當代研究空間——被譽為可持續遺產建築的典範。", ja:"ホプキンス・アーキテクツが設計したオックスフォード大学スティーブン・A・シュワルツマン人文センターが4月25〜26日のオープンハウスフェスティバルで公共プログラムを開始。オックスペンズロードの旧発電所を転用したこの建物は、学際的な人文研究のハブとなった。産業的な外殻を保ちながら現代的な研究スペースを組み込むアダプティブリユース・アプローチは、持続可能なヘリテージ建築のモデルとして高く評価されている。", url:"https://www.archdaily.com/1036637/the-architecture-agenda-inside-the-key-events-of-2026" },
];

const FOOD_CARDS = [
  { id:"food_0", channel:"餐飲", tag:"台灣原住民料理", color:"#6DB56D", en:"Taiwan's Indigenous cuisine is having its long-overdue cultural moment in 2026. Techniques passed down through 16 Indigenous peoples — including fermentation with millet wine, open-fire preparations of mountain boar, and dishes incorporating Taiwan's native herbs — are gaining recognition in Taipei's fine dining scene and attracting culinary tourists. Chef Ah-Tsai of Taitung's 'Wulu' was recently featured in the new Asia edition of the World's 50 Best Restaurant guide.", zh:"台灣原住民料理在2026年迎來遲來的文化時刻。16個原住民族傳承下來的技術——包括小米酒發酵、山豬柴火料理以及台灣原生香草入菜——正在台北高端餐飲圈獲得認可，並吸引美食觀光客。台東「五路」餐廳的阿財主廚近日入選亞洲版世界50最佳餐廳指南。", ja:"台湾の先住民料理が2026年に待望の文化的ムーブメントを迎えている。16の先住民族に伝わる技法——粟酒を使った発酵、山猪の直火料理、台湾固有のハーブを使った料理など——が台北のファインダイニングシーンで認知を獲得し、食の観光客を引き寄せている。台東「五路」の料理人・阿財シェフが最近、アジア版ワールド50ベストレストランガイドに掲載された。", url:"https://topics.amcham.com.tw/2026/01/a-new-appreciation-for-indigenous-food/" },
  { id:"food_1", channel:"餐飲", tag:"台北/美食目的地", color:"#6DB56D", en:"Bloomberg has declared Taipei 'Asia's next great food destination' in a feature spotlighting how the city's night market traditions are fusing with a new generation of chef-driven tasting menus. The piece highlights three Taipei restaurants earning their first Michelin stars this year: Miào (contemporary Taiwanese), Huang Ji Pork Chop Rice (elevated street food), and MOI by Andre Chiang's protégé Tzu-Feng Lin.", zh:"彭博社在一篇專題報導中宣布台北為「亞洲下一個偉大美食目的地」，重點介紹台北夜市傳統與新一代主廚品嚐菜單的融合。報導聚焦今年首度獲得米其林星的三間台北餐廳：妙（當代台菜）、黃記豬排飯（精緻街食）以及江振誠弟子林子峰主理的MOI。", ja:"ブルームバーグが台北を「アジアの次の偉大なフードデスティネーション」に認定する特集を発表。夜市の伝統と新世代シェフ主導のテイスティングメニューの融合を紹介。今年初めてミシュランの星を獲得した3つの台北レストランを取り上げている：妙（現代台湾料理）、黄記炸猪排飯（昇華されたストリートフード）、江振誠の弟子・林子峰によるMOI。", url:"https://www.bloomberg.com/news/features/2025-12-16/taipei-asia-s-next-great-destination-for-food-lovers" },
  { id:"food_2", channel:"餐飲", tag:"產業/展覽", color:"#6DB56D", en:"Food & Hospitality Asia (FHA) 2026 returns April 21-24 at Singapore EXPO, described as the biggest edition in a decade with 18 segments covering the full food, beverage, and hospitality spectrum. Key themes include AI-driven kitchen automation, precision fermentation proteins, and sustainable packaging mandates. For Taiwanese food exporters, FHA is a critical gateway to Southeast Asian institutional buyers.", zh:"食品與酒店業亞洲展（FHA）2026於4月21-24日在新加坡博覽中心回歸，主辦方稱這是十年來規模最大的一屆，涵蓋食品、飲料與酒店業的18個展區。主要議題包括AI驅動廚房自動化、精準發酵蛋白質以及永續包裝法規要求。對台灣食品出口商而言，FHA是打入東南亞機構買家的重要門戶。", ja:"食品・ホスピタリティアジア（FHA）2026が4月21〜24日にシンガポールEXPOで返ってくる。食品・飲料・ホスピタリティ業界の全領域をカバーする18セグメントで、「10年で最大規模」と主催者は説明する。主要テーマはAI駆動のキッチン自動化・精密発酵タンパク・持続可能パッケージング義務。台湾の食品輸出業者にとって、FHAは東南アジアの機関バイヤーへの重要な入口となっている。", url:"https://www.taiwannews.com.tw/news/6318535" },
  { id:"food_3", channel:"餐飲", tag:"飲食趨勢", color:"#6DB56D", en:"2026's most significant dining trend is the 'slow protein' movement: restaurants globally are dropping ultra-processed plant proteins and returning to whole-ingredient preparations — slow-braised legumes, nose-to-tail butchery, and traditionally cured products. The backlash against fake-meat products like Beyond and Impossible has accelerated as studies link ultra-processed food consumption to metabolic health risks. Michelin-starred restaurants in London, Tokyo, and Taipei are all pivoting to this direction.", zh:"2026年最重要的飲食趨勢是「慢蛋白質」運動：全球餐廳正在捨棄超加工植物蛋白，回歸完整食材製法——慢燉豆類、鼻尖到尾的全獸屠宰以及傳統醃製品。隨著研究將超加工食品攝入與代謝健康風險相關聯，對Beyond和Impossible等仿肉產品的反彈加速。倫敦、東京和台北的米其林星級餐廳均在轉向這個方向。", ja:"2026年最も重要な飲食トレンドは「スロープロテイン」運動：世界中のレストランが超加工植物性タンパクを手放し、丸ごと食材の調理法に回帰している——豆類のスロープレイズ、ノーズ・トゥ・テールの精肉、伝統的な発酵・熟成製品。超加工食品摂取が代謝健康リスクと関連するとの研究が相次ぎ、BeyondやImpossibleへの反発が加速。ロンドン・東京・台北のミシュラン星付きレストランが一斉にこの方向へ舵を切っている。", url:"https://totalfood.com/dining-trends-forecast-for-2026/" },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDateString() {
  return new Date().toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" }).toUpperCase();
}

function WordPopup({ popup, onSpeak }) {
  if (!popup) return null;
  const popupX = Math.min(popup.x, window.innerWidth - 270);
  const popupY = popup.y + 120 > window.innerHeight ? popup.y - 80 : popup.y;
  return ReactDOM.createPortal(
    <div className="word-popup" style={{ left: popupX + "px", top: popupY + "px" }} onClick={e => e.stopPropagation()}>
      <div className="word-popup-word">
        {popup.word}
        <button className="speak-btn" onClick={() => onSpeak(popup.word)} title="播放發音">🔊</button>
      </div>
      <div className="word-popup-trans">{popup.loading ? "翻譯中..." : popup.translation}</div>
      <div style={{ fontFamily:"'Courier New',monospace", fontSize:"8px", color:"var(--text-tertiary)", marginTop:"8px" }}>powered by MyMemory · 翻譯僅供參考</div>
    </div>,
    document.body
  );
}

function CardView({ card, idx, total }) {
  const [lang, setLang] = useState(null);
  const [popup, setPopup] = useState(null);
  const [speaking, setSpeaking] = useState(false);
  const abortRef = React.useRef(null);
  const audioRef = React.useRef(null);
  const toggle = (target) => setLang(lang === target ? null : target);
  const isOpen = lang !== null;
  const text = lang === "ja" ? (card.ja || card.zh) : card.zh;

  const speakWord = React.useCallback(async (word) => {
    const ok = await azureSpeak(word, { rate:'-15%' });
    if (!ok) {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word);
      u.lang = "en-US"; u.rate = 0.82;
      const voices = speechSynthesis.getVoices();
      const picked = ["Google US English","Microsoft Aria Online (Natural) - English (United States)","Samantha","Alex"].map(n => voices.find(v => v.name === n)).find(Boolean);
      if (picked) u.voice = picked;
      speechSynthesis.speak(u);
    }
  }, []);

  const speakAll = React.useCallback(async (e) => {
    e.stopPropagation();
    if (speaking) {
      azureStop();
      if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
      speechSynthesis.cancel();
      setSpeaking(false);
      return;
    }
    setSpeaking(true);
    const ok = await azureSpeak(card.en, {
      rate: '-5%',
      onStart: (audio) => { audioRef.current = audio; },
      onEnd: () => { audioRef.current = null; setSpeaking(false); },
      onError: () => { audioRef.current = null; setSpeaking(false); }
    });
    if (!ok) {
      const u = new SpeechSynthesisUtterance(card.en);
      u.lang = "en-US"; u.rate = 0.88; u.pitch = 1.0; u.volume = 1.0;
      const tryVoices = () => {
        const voices = speechSynthesis.getVoices();
        const picked = ["Google US English","Microsoft Aria Online (Natural) - English (United States)","Microsoft Guy Online (Natural) - English (United States)","Samantha","Alex"].map(n => voices.find(v => v.name === n)).find(Boolean);
        if (picked) u.voice = picked;
      };
      if (speechSynthesis.getVoices().length > 0) tryVoices();
      else { speechSynthesis.onvoiceschanged = () => { tryVoices(); speechSynthesis.onvoiceschanged = null; }; }
      u.onend = () => setSpeaking(false);
      u.onerror = () => setSpeaking(false);
      speechSynthesis.speak(u);
    }
  }, [card.en, speaking]);

  // Stop speaking & close popup when card changes
  React.useEffect(() => {
    return () => {
      azureStop();
      if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
      speechSynthesis.cancel();
      setSpeaking(false);
      setPopup(null);
      if (abortRef.current) abortRef.current.abort();
    };
  }, [card.id]);

  const handleWordClick = React.useCallback(async (e, rawWord) => {
    e.stopPropagation();
    const clean = rawWord.replace(/[^a-zA-Z'-]/g, "");
    if (!clean || clean.length < 2) return;
    // Abort previous in-flight request
    if (abortRef.current) abortRef.current.abort();
    const ctrl = new AbortController();
    abortRef.current = ctrl;
    const rect = e.target.getBoundingClientRect();
    setPopup({ word: clean, x: rect.left, y: rect.bottom + 6, translation: null, loading: true });
    try {
      const res = await fetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(clean) + "&langpair=en|zh-TW", { signal: ctrl.signal });
      const data = await res.json();
      setPopup(p => p && p.word === clean ? { ...p, translation: data.responseData.translatedText, loading: false } : p);
    } catch (err) {
      if (err.name !== "AbortError") {
        setPopup(p => p && p.word === clean ? { ...p, translation: "(翻譯失敗)", loading: false } : p);
      }
    }
  }, []);

  // Close popup on outside click
  React.useEffect(() => {
    if (!popup) return;
    const close = () => setPopup(null);
    const timer = setTimeout(() => window.addEventListener("click", close), 10);
    return () => { clearTimeout(timer); window.removeEventListener("click", close); };
  }, [popup]);

  const words = useMemo(() => card.en.split(/(\s+)/).map((chunk, i) => {
    if (/^\s+$/.test(chunk)) return chunk;
    return <span key={i} className="clickable-word" onPointerDown={e => e.stopPropagation()} onClick={(e) => handleWordClick(e, chunk)}>{chunk}</span>;
  }), [card.en, handleWordClick]);

  return (
    <div style={{ padding:"10px 32px 32px" }}>
      <div style={{ height:"2px", background:card.color, opacity:0.6, margin:"-10px -32px 14px", width:"calc(100% + 64px)" }} />
      <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"14px" }}>
        <span style={{ display:"inline-block", width:"18px", height:"1px", background:card.color, flexShrink:0 }} />
        <span style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.18em", textTransform:"uppercase", color:card.color, opacity:0.9 }}>{card.channel}</span>
        <span style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.18em", textTransform:"uppercase", color:"var(--text-tertiary)" }}>{card.tag}</span>
        <button className={"speak-btn" + (speaking ? " active" : "")} onPointerDown={e => e.stopPropagation()} onClick={speakAll} title={speaking ? "停止朗讀" : "朗讀全文"} style={{ marginLeft:"auto" }}>{speaking ? "■" : "🔊"}</button>
      </div>
      <p style={{ fontFamily:"Georgia,'Times New Roman',serif", fontSize:"18px", lineHeight:1.7, color:"var(--text)", margin:0, maxWidth:"54ch", letterSpacing:"-0.01em" }}>{words}</p>
      <WordPopup popup={popup} onSpeak={speakWord} />
      <div style={{ overflow:"hidden", maxHeight:isOpen?"500px":"0px", transition:"max-height 0.45s cubic-bezier(0.4,0,0.2,1)" }}>
        <div style={{ marginTop:"16px", paddingTop:"14px", borderTop:"1px solid var(--divider)" }}>
          <p style={{ fontFamily:"system-ui,-apple-system,'PingFang TC','Hiragino Sans',sans-serif", fontSize:"14px", lineHeight:1.85, color:"var(--text-secondary)", margin:0, maxWidth:"48ch", fontWeight:300 }}>{text}</p>
        </div>
      </div>
      <div className="expand-row" style={{ marginTop:"14px" }}>
        <span onPointerDown={e => e.stopPropagation()} onClick={e => { e.stopPropagation(); toggle("zh"); }} style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.14em", textTransform:"uppercase", color: lang==="zh" ? "var(--text-secondary)" : "var(--text-tertiary)", cursor:"pointer" }}>{lang==="zh" ? "close ↑" : "中文 ↓"}</span>
        <span onPointerDown={e => e.stopPropagation()} onClick={e => { e.stopPropagation(); toggle("ja"); }} style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.14em", textTransform:"uppercase", color: lang==="ja" ? "var(--text-secondary)" : "var(--text-tertiary)", cursor:"pointer" }}>{lang==="ja" ? "close ↑" : "日本語 ↓"}</span>
        {card.url && (<a href={card.url} target="_blank" rel="noopener noreferrer" onPointerDown={e => e.stopPropagation()} onClick={e => e.stopPropagation()} className="source-link">source ↗</a>)}
      </div>
      <div style={{ position:"relative", marginTop:"16px" }}>
        <div style={{ height:"1px", background:"var(--divider)" }} />
        <div style={{ position:"absolute", top:0, left:0, height:"1px", background:"var(--text-tertiary)", width:((idx+1)/total*100)+"%", transition:"width 0.3s" }} />
      </div>
    </div>
  );
}

function SettingsPanel({ open, onClose }) {
  const [key, setKey] = React.useState(() => localStorage.getItem('mf_azureKey') || '');
  const [region, setRegion] = React.useState(() => localStorage.getItem('mf_azureRegion') || 'eastus');
  const [voice, setVoice] = React.useState(() => localStorage.getItem('mf_azureVoice') || 'en-US-AriaNeural');
  const [status, setStatus] = React.useState('');
  const save = () => {
    localStorage.setItem('mf_azureKey', key);
    localStorage.setItem('mf_azureRegion', region);
    localStorage.setItem('mf_azureVoice', voice);
    _azToken = null;
  };
  const handleSave = () => { save(); setStatus('已儲存'); setTimeout(() => setStatus(''), 2000); };
  const handleTest = async () => {
    save(); setStatus('測試中…');
    const ok = await azureSpeak('Hello, this is Azure Neural voice for Mo\'s Feed.', {
      onEnd: () => setStatus('✓ 連線成功'),
      onError: (e) => setStatus('✗ ' + (e?.message || '失敗'))
    });
    if (!ok) setStatus('✗ 請先填入 Azure Key');
  };
  if (!open) return null;
  return ReactDOM.createPortal(
    <>
      <div style={{ position:'fixed',inset:0,zIndex:149 }} onClick={onClose} />
      <div style={{ position:'fixed',top:0,right:0,bottom:0,width:'252px',background:'var(--bg-elevated)',borderLeft:'1px solid var(--divider)',zIndex:150,padding:'20px 18px',display:'flex',flexDirection:'column',gap:'14px',overflowY:'auto' }}>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'4px' }}>
          <span style={{ fontFamily:"'Courier New',monospace",fontSize:'9px',letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--text-tertiary)' }}>Azure TTS 設定</span>
          <button onClick={onClose} style={{ background:'none',border:'none',cursor:'pointer',color:'var(--text-tertiary)',fontFamily:"'Courier New',monospace",fontSize:'12px',padding:'0' }}>✕</button>
        </div>
        <div>
          <div style={{ fontFamily:"'Courier New',monospace",fontSize:'9px',letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--text-tertiary)',marginBottom:'5px' }}>Subscription Key</div>
          <input type="password" className="az-input" value={key} onChange={e=>setKey(e.target.value)} placeholder="貼上 Azure Key…" />
        </div>
        <div>
          <div style={{ fontFamily:"'Courier New',monospace",fontSize:'9px',letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--text-tertiary)',marginBottom:'5px' }}>Region</div>
          <input className="az-input" value={region} onChange={e=>setRegion(e.target.value)} placeholder="eastus" />
        </div>
        <div>
          <div style={{ fontFamily:"'Courier New',monospace",fontSize:'9px',letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--text-tertiary)',marginBottom:'5px' }}>Voice</div>
          <select className="az-input" value={voice} onChange={e=>setVoice(e.target.value)} style={{ cursor:'pointer' }}>
            <option value="en-US-AriaNeural">Aria（女）自然流暢</option>
            <option value="en-US-JennyNeural">Jenny（女）清晰</option>
            <option value="en-US-GuyNeural">Guy（男）沉穩</option>
            <option value="en-US-DavisNeural">Davis（男）個性</option>
            <option value="en-US-TonyNeural">Tony（男）自信</option>
          </select>
        </div>
        <div style={{ display:'flex',gap:'8px' }}>
          <button onClick={handleSave} style={{ flex:1,padding:'8px 0',background:'none',border:'1px solid var(--divider)',color:'var(--text-tertiary)',fontFamily:"'Courier New',monospace",fontSize:'9px',letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer' }}>儲存</button>
          <button onClick={handleTest} style={{ flex:1,padding:'8px 0',background:'none',border:'1px solid var(--text-secondary)',color:'var(--text-secondary)',fontFamily:"'Courier New',monospace",fontSize:'9px',letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer' }}>測試</button>
        </div>
        {status && <div style={{ fontFamily:"'Courier New',monospace",fontSize:'9px',color:'var(--text-tertiary)',letterSpacing:'0.1em' }}>{status}</div>}
        <div style={{ marginTop:'auto',fontFamily:"'Courier New',monospace",fontSize:'8px',color:'var(--text-tertiary)',lineHeight:1.7,paddingTop:'8px',borderTop:'1px solid var(--divider)' }}>Key 存於 localStorage<br/>未設定時退回瀏覽器 TTS</div>
      </div>
    </>,
    document.body
  );
}

function ThemeToggle() {
  const [dark, setDark] = useState(false);
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const toggle = () => { const next = !dark; setDark(next); document.body.setAttribute("data-theme", next ? "dark" : "light"); };
  return (
    <>
      <button className="theme-toggle" onClick={toggle}>{dark ? "○" : "●"}</button>
      <button className="theme-toggle" onClick={() => setSettingsOpen(o => !o)} style={{ top:'50px' }}>⚙</button>
      <SettingsPanel open={settingsOpen} onClose={() => setSettingsOpen(false)} />
    </>
  );
}

function App() {
  const [activeTab, setActiveTab] = useState("Today");
  const [todaySub, setTodaySub] = useState("全部");
  const [bookSeed, setBookSeed] = useState(0);
  const [idx, setIdx] = useState(0);
  const [dir, setDir] = useState(0); // -1=left, 1=right, 0=none
  const touchRef = React.useRef(null);

  const shuffledBooks = useMemo(() => shuffle(BOOK_CARDS).slice(0, 8), [bookSeed]);
  const cards = useMemo(() => {
    if (activeTab === "Bookshelf") return shuffledBooks;
    if (todaySub === "世界新聞") return NEWS_CARDS;
    if (todaySub === "社交雷達") return SOCIAL_CARDS;
    if (todaySub === "財經") return FINANCE_CARDS;
    if (todaySub === "運動") return SPORTS_CARDS;
    if (todaySub === "設計") return DESIGN_CARDS;
    if (todaySub === "餐飲") return FOOD_CARDS;
    if (todaySub === "科技") return TECH_CARDS;
    return TODAY_CARDS;
  }, [activeTab, todaySub, shuffledBooks]);

  const total = cards.length;
  const atEnd = idx >= total;

  const [resumeMsg, setResumeMsg] = useState(null);
  const lsKey = "mosfeed_" + activeTab + "_" + todaySub;

  // Read localStorage on tab/sub change
  React.useEffect(() => {
    const key = "mosfeed_" + activeTab + "_" + todaySub;
    try {
      const saved = parseInt(localStorage.getItem(key), 10);
      if (saved > 0 && saved < cards.length) {
        setIdx(saved); setDir(0);
        setResumeMsg({ idx: saved, total: cards.length });
        setTimeout(() => setResumeMsg(null), 1500);
        return;
      }
    } catch(e) {}
    setIdx(0); setDir(0);
  }, [activeTab, todaySub]);

  // Reset on shuffle
  React.useEffect(() => {
    if (bookSeed > 0) { setIdx(0); setDir(0); try { localStorage.removeItem("mosfeed_Bookshelf_全部"); } catch(e) {} }
  }, [bookSeed]);

  const go = (newIdx) => {
    if (newIdx < 0) return;
    if (newIdx > total) return;
    setDir(newIdx > idx ? 1 : -1);
    setIdx(newIdx);
    try { localStorage.setItem(lsKey, String(newIdx)); } catch(e) {}
  };

  // Keyboard
  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === "ArrowRight" || e.key === "ArrowDown") go(idx + 1);
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") go(idx - 1);
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [idx, total]);

  // Touch
  const onTouchStart = (e) => { touchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
  const onTouchEnd = (e) => {
    if (!touchRef.current) return;
    const dx = e.changedTouches[0].clientX - touchRef.current.x;
    const dy = e.changedTouches[0].clientY - touchRef.current.y;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (dx < 0) go(idx + 1);
      else go(idx - 1);
    }
    touchRef.current = null;
  };

  const headerHeight = activeTab === "Today" ? "200px" : "170px";

  return (
    <div style={{ maxWidth:"680px", margin:"0 auto", height:"100vh", overflow:"hidden", display:"flex", flexDirection:"column" }}>
      <ThemeToggle />
      {/* Header */}
      <div style={{ flexShrink:0, background:"var(--bg)", paddingTop:"20px", zIndex:10 }}>
        <div style={{ padding:"0 32px", marginBottom:"16px" }}>
          <div style={{ marginBottom:"4px" }}>
            <h1 className="masthead-title" style={{ fontSize:"32px" }}>Mo's Feed</h1>
            <span className="running-header" style={{ display:"block", marginTop:"4px" }}>{getDateString()}</span>
          </div>
          <div className="rule" />
        </div>
        <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", padding:"0 32px" }}>
          <div className="tab-nav" style={{ padding:0 }}>
            {TABS.map(tab => {
              const isActive = activeTab === tab;
              return (
                <button key={tab} onClick={() => { setActiveTab(tab); if (tab !== "Today") setTodaySub("全部"); }}
                  style={{ fontSize:isActive?"26px":"15px", fontWeight:isActive?600:400, fontStyle:isActive?"normal":"italic", color:isActive?"var(--text)":"var(--text-tertiary)", letterSpacing:isActive?"-0.01em":"0" }}>
                  {tab}
                </button>
              );
            })}
          </div>
        </div>
        {activeTab === "Today" && (
          <div style={{ display:"flex", gap:"20px", padding:"14px 32px 0" }}>
            {TODAY_SUBS.map(sub => (
              <button key={sub} className="sub-pill" onClick={() => setTodaySub(sub)}
                style={{ color:todaySub===sub?"var(--text-secondary)":"var(--text-tertiary)", borderBottomColor:todaySub===sub?"var(--text-secondary)":"transparent", opacity:todaySub===sub?1:0.6 }}>
                {sub}
              </button>
            ))}
          </div>
        )}
        <div style={{ padding:"0 32px", marginTop:"10px" }}><div className="rule" /></div>
        {resumeMsg && (
          <div className="running-header" style={{ padding:"6px 32px", animation:"fadeInOut 1.5s ease forwards" }}>
            繼續閱讀 {resumeMsg.idx + 1}/{resumeMsg.total}
          </div>
        )}
      </div>

      {/* Swipe area */}
      <div className="swipe-area" style={{ flex:1 }}
        onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
        onPointerDown={(e) => { e.currentTarget.dataset.px = e.clientX; e.currentTarget.dataset.py = e.clientY; }}
        onPointerUp={(e) => {
          const sx = parseFloat(e.currentTarget.dataset.px), sy = parseFloat(e.currentTarget.dataset.py);
          const dx = e.clientX - sx, dy = e.clientY - sy;
          if (Math.sqrt(dx*dx+dy*dy) < 10) {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            if (x < rect.width * 0.25) go(idx - 1);
            else if (x > rect.width * 0.75) go(idx + 1);
          }
        }}
      >
        {atEnd ? (
          <div className="card-slide" style={{ position:"relative", transform:"none" }}>
            <EndScreen
              onPrev={() => go(total - 1)}
              onShuffle={() => setBookSeed(s => s + 1)}
              isBookshelf={activeTab === "Bookshelf"}
            />
          </div>
        ) : (
          <div className="card-slide" key={cards[idx].id + "-" + bookSeed} style={{ position:"relative", transform:"none" }}>
            <CardView card={cards[idx]} idx={idx} total={total} />
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
