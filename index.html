<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mo's Feed</title>
<link rel="icon" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f1ea; --bg-elevated: #ede9e1;
    --text: #1c1a17; --text-secondary: #8a8680;
    --text-tertiary: #b8b4ae; --divider: #ddd9d1;
    --noise-opacity: 0.035;
  }
  [data-theme="dark"] {
    --bg: #0f0e0c; --bg-elevated: #161410;
    --text: #e8e4dc; --text-secondary: #5a5650;
    --text-tertiary: #383430; --divider: #242018;
    --noise-opacity: 0.06;
  }
  body {
    background: var(--bg); -webkit-font-smoothing: antialiased;
    font-family: Georgia, 'Times New Roman', serif;
    transition: background 0.4s ease, color 0.4s ease; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    opacity: var(--noise-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 180px 180px;
  }
  #root { position: relative; z-index: 1; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 4px; }
  .masthead-title { font-family: Georgia, serif; font-weight: 400; font-style: italic; letter-spacing: -0.02em; color: var(--text); line-height: 1; }
  .tab-nav { display: flex; align-items: baseline; gap: 28px; padding: 0 32px; }
  .tab-nav button { background: none; border: none; cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: Georgia, serif; transition: all 0.3s ease; padding: 0; line-height: 1.2; }
  .sub-pill { background: none; border: none; cursor: pointer; font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 0; transition: all 0.2s ease; border-bottom: 1px solid transparent; }
  .feed-item { padding: 0 0 56px 0; margin-bottom: 56px; border-bottom: 1px solid var(--divider); cursor: pointer; animation: fadeUp 0.5s ease both; }
  .feed-item:last-child { border-bottom: none; }
  .expand-row { display: flex; align-items: center; gap: 20px; margin-top: 18px; }
  .source-link { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.1em; text-decoration: none; border-bottom: 1px solid var(--divider); padding-bottom: 1px; transition: all 0.2s ease; color: var(--text-tertiary); }
  .source-link:hover { color: var(--text-secondary); border-color: var(--text-secondary); }
  .refresh-btn { display: block; margin: 0 auto 60px; padding: 10px 24px; background: none; border: 1px solid var(--divider); color: var(--text-tertiary); font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.25s ease; }
  .refresh-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
  .theme-toggle { position: fixed; top: 28px; right: 28px; z-index: 100; background: none; border: none; cursor: pointer; font-size: 15px; color: var(--text-tertiary); padding: 4px; line-height: 1; transition: color 0.3s ease; font-family: 'Courier New', monospace; }
  .theme-toggle:hover { color: var(--text-secondary); }
  .rule { height: 1px; background: var(--divider); }
  .running-header { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); }
</style>
</head>
<body data-theme="light">
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const NAVAL_CARDS = [
  { id:"n1", channel:"Naval", tag:"財富", color:"#7C6AF7", en:"Every hour you sell, you lose twice. Once for the hour itself — and once for the leverage that hour could have built. Renting time is not income. It's a slow exit.", zh:"你每賣出一個小時，就輸了兩次：一次是那個小時本身，一次是那個小時原本能建立的槓桿。用時間換錢不叫收入，叫做慢慢離場。" },
  { id:"n2", channel:"Naval", tag:"槓桿", color:"#7C6AF7", en:"Code and media don't sleep. They don't ask for raises. They don't need to be convinced. Build something once — and let it work while you're not watching. This is the only leverage that requires no permission.", zh:"程式碼和媒體不需要睡覺，不會要求加薪，不需要被說服。做一次，然後讓它在你不看的時候繼續運轉。這是唯一不需要任何人許可的槓桿。" },
  { id:"n3", channel:"Naval", tag:"獨特知識", color:"#7C6AF7", en:"If your job can be described in a training manual, you can be replaced by someone cheaper — or eventually, by software. Specific knowledge isn't a skill you learn. It's something you discover by following what genuinely fascinates you, even when it makes no obvious financial sense.", zh:"如果你的工作可以被寫進教學手冊，你就可以被更便宜的人取代——或遲早被軟體取代。獨特知識不是你學來的技能，而是你在跟隨真正讓你著迷的事物時，自然發現的東西。" },
  { id:"n4", channel:"Naval", tag:"幸福", color:"#7C6AF7", en:"Desire is borrowed unhappiness. Each one is a quiet announcement that you're not enough right now. The mind that is always reaching for the next thing never actually arrives anywhere. Happiness isn't achieved — it's what's left when you stop manufacturing reasons to be miserable.", zh:"欲望是預支的痛苦。每一個欲望都在悄悄宣告：你現在還不夠好。一個永遠在伸手抓下一件事的心，其實從未真正抵達任何地方。幸福不是追求來的——而是當你停止製造痛苦理由之後，剩下的東西。" },
  { id:"n5", channel:"Naval", tag:"長期賽局", color:"#7C6AF7", en:"Short-term thinkers optimize for the deal. Long-term thinkers optimize for the relationship. The compounding that matters most isn't financial — it's the trust built over years with people who are also playing for keeps.", zh:"短期思維的人為這筆交易而優化，長期思維的人為這段關係而優化。最重要的複利不是財務上的——而是多年來與同樣在認真玩長期遊戲的人，一點一點累積起來的信任。" },
  { id:"n6", channel:"Naval", tag:"清晰思考", color:"#7C6AF7", en:"Your identity is the cage you can't see. Every strong opinion about who you are makes it harder to see who you could become. The clearest thinkers hold their self-concept loosely — willing to be wrong about themselves.", zh:"你的身份認同是你看不見的牢籠。每一個關於「我是這種人」的強烈想法，都讓你更難看清你可以成為什麼。想得最清楚的人，對自我概念的抓握都很輕——他們願意對自己也犯錯。" },
  { id:"n7", channel:"Naval", tag:"責任感", color:"#7C6AF7", en:"Put your name on your work. If you won't sign it, you probably shouldn't be doing it. The people who build real reputation take public accountability for outcomes — not just credit when things go well, but ownership when they don't.", zh:"把你的名字放在你的作品上。如果你不敢簽名，你可能就不該做這件事。真正建立名聲的人，對結果承擔公開責任——不只是在事情順利時領功，而是在事情不順時認下來。" },
  { id:"n8", channel:"Naval", tag:"閱讀", color:"#7C6AF7", en:"Read to understand principles, not to collect facts. Physics, mathematics, philosophy, economics — these are the operating systems of the world. Everything else is just an app running on top of them.", zh:"閱讀是為了理解原則，不是為了收集事實。物理、數學、哲學、經濟學——這些是世界的作業系統，其他所有東西不過是跑在上面的應用程式。" },
  { id:"n9", channel:"Naval", tag:"退休", color:"#7C6AF7", en:"Retirement isn't an age or an account balance. It's the moment when what you do and what you love to do are the same thing. Most people never get there because they never stopped to ask what they actually want.", zh:"退休不是一個年紀或一個帳戶數字。退休是你做的事和你想做的事變成同一件事的那一刻。大多數人永遠到不了那裡，因為他們從未停下來問自己真正想要什麼。" },
  { id:"n10", channel:"Naval", tag:"決策", color:"#7C6AF7", en:"Most decisions are reversible. Treat them like experiments, not commitments. The few that aren't reversible — choose slowly, choose carefully. The asymmetry between these two types is where most people get it wrong.", zh:"大多數決定都是可逆的，把它們當成實驗而不是承諾。少數真正不可逆的決定——慢慢選，仔細選。這兩種決定之間的不對稱性，正是大多數人搞錯的地方。" },
];

const ELON_CARDS = [
  { id:"e1", channel:"Elon", tag:"第一原理", color:"#C8903A", en:"Analogy is how you copy. First principles is how you invent. When everyone else in the rocket industry was buying components, Musk asked: what is a rocket actually made of? Steel, fuel, electronics. He bought the raw materials and built it himself for 2% of the market price.", zh:"類比是你複製的方式，第一原理是你發明的方式。當火箭產業所有人都在買零件時，Musk 問的是：火箭究竟是由什麼組成的？鋼、燃料、電子元件。他直接買原料自己組裝，成本是市價的 2%。" },
  { id:"e2", channel:"Elon", tag:"The Algorithm", color:"#C8903A", en:"Step one: question every requirement. Most requirements are wrong — especially ones handed down without explanation. Step two: delete. The best part is the part you don't have to build. Step three: only then simplify. Automating a broken process makes it fail faster.", zh:"第一步：質疑每一個需求，大多數需求都是錯的——尤其是那些沒有解釋就傳下來的。第二步：刪除。最好的部分是你根本不需要做的部分。第三步：才開始簡化。把一個壞掉的流程自動化，只會讓它壞得更快。" },
  { id:"e3", channel:"Elon", tag:"失敗", color:"#C8903A", en:"SpaceX's first three rockets exploded. After the third failure, they had enough money for exactly one more attempt. That fourth launch succeeded. If Musk had treated failure as a verdict rather than data, the company would have died with the third rocket.", zh:"SpaceX 前三枚火箭全部爆炸。第三次失敗後，他們剩下的錢只夠再試一次。第四次成功了。如果 Musk 把失敗當成判決而不是數據，這家公司就會跟著第三枚火箭一起消失。" },
  { id:"e4", channel:"Elon", tag:"使命", color:"#C8903A", en:"The goal doesn't have to be achievable to be worth pursuing. The goal of becoming a multi-planetary species might take 200 years. That doesn't make it less real. Direction matters more than arrival — it determines every decision made along the way.", zh:"一個目標不需要在你有生之年達成，才值得追求。讓人類成為多星球物種可能需要 200 年。這不讓這個目標變得不真實。方向比抵達更重要——它決定了沿途每一個決策。" },
  { id:"e5", channel:"Elon", tag:"產品設計", color:"#C8903A", en:"If a user needs a tutorial, you've already lost. The best interfaces are so obvious they feel inevitable — like the user designed them themselves. Complexity is always the designer's failure, never the user's problem.", zh:"如果使用者需要教學，你就已經輸了。最好的介面清楚到感覺理所當然——像是使用者自己設計的。複雜永遠是設計師的失敗，從來不是使用者的問題。" },
  { id:"e6", channel:"Elon", tag:"人才", color:"#C8903A", en:"A single brilliant engineer is worth a hundred average ones — not because they work harder, but because they see problems differently and solutions more clearly. The most expensive thing in a company is not talent. It's the wrong talent in the wrong role.", zh:"一個真正出色的工程師抵得上一百個普通的——不是因為他們更努力，而是因為他們對問題的理解不同，對解法的看法更清晰。一家公司最昂貴的不是人才，而是放錯位置的人才。" },
  { id:"e7", channel:"Elon", tag:"速度", color:"#C8903A", en:"Move at a pace that feels slightly irresponsible. If it feels safe, you're probably moving too slowly. The risks of going too fast are recoverable. The risk of moving too slowly — in a competitive world — often isn't.", zh:"以一種感覺稍微不負責任的速度前進。如果感覺安全，你可能移動得太慢了。走太快的風險通常可以挽回。在競爭激烈的世界裡，走太慢的風險往往不行。" },
  { id:"e8", channel:"Elon", tag:"10倍思維", color:"#C8903A", en:"10% improvement gets you incremental progress. 10x improvement requires rethinking the entire approach from scratch. Most people never attempt 10x because they assume it requires 10x the resources. It doesn't. It requires 10x the thinking.", zh:"改善 10% 讓你漸進式進步。改善 10 倍要求你從頭重新思考整個方法。大多數人從未嘗試 10 倍，因為他們假設這需要 10 倍的資源。不需要。它需要的是 10 倍的思考。" },
  { id:"e9", channel:"Elon", tag:"現場主義", color:"#C8903A", en:"The problem is always at the product. Not in the boardroom. Not in the spreadsheet. The people making decisions from a distance are always the last to understand what's actually wrong — and the last to fix it.", zh:"問題永遠在產品現場，不在董事會，不在試算表裡。從遠處做決策的人永遠是最後一個理解哪裡出了問題的——也永遠是最後一個修好它的。" },
  { id:"e10", channel:"Elon", tag:"Plan B", color:"#C8903A", en:"Having a Plan B means you'll use it. The moment you allocate mental space to the exit, you've already started leaving. Commitment isn't stubbornness — it's the refusal to let doubt consume the energy that execution needs.", zh:"有 B 計劃意味著你會用到它。你一旦給退路留了心理空間，就已經開始離開了。承諾不是固執，而是拒絕讓懷疑消耗掉執行所需要的能量。" },
];

const DAN_CARDS = [
  { id:"d1", channel:"Dan Koe", tag:"創造力", color:"#4A9E96", en:"Cognitive burnout doesn't feel like exhaustion. It feels like thinking hard while producing nothing. The cure isn't rest — it's removing what's narrowing your mind: the obligation to be productive, the habit of multitasking, the reflex to reach for your phone every 90 seconds.", zh:"認知疲勞的感覺不像筋疲力竭，它感覺像是在拼命思考卻什麼都生不出來。解藥不是休息，而是移除正在收窄你思維的東西：必須有生產力的義務、多工的習慣、每 90 秒就伸手拿手機的反射動作。" },
  { id:"d2", channel:"Dan Koe", tag:"一人公司", color:"#4A9E96", en:"AI raised the floor — now anyone can produce. It also raised the ceiling — now the gap between average and excellent is wider than ever. The market isn't more crowded. It's more separated. The question is which side of that gap you're building toward.", zh:"AI 拉高了地板——現在所有人都能生產內容。它同時也拉高了天花板——現在平均與卓越之間的差距比以往任何時候都更大。市場不是變得更擁擠，而是變得更分裂。問題是你在往哪一側建造。" },
  { id:"d3", channel:"Dan Koe", tag:"多元興趣", color:"#4A9E96", en:"Specialization made sense when the world moved slowly. Now the most valuable people are the ones who can connect ideas across domains — who can make a room full of specialists see something they missed. Your scattered interests aren't a liability. They're the view from somewhere no one else is standing.", zh:"在世界移動緩慢的時代，專精是有道理的。現在最有價值的人是能夠跨領域連結想法的人——能讓一屋子的專家看見他們錯過的東西。你分散的興趣不是負擔，而是你站在一個沒有其他人站過的地方才有的視角。" },
  { id:"d4", channel:"Dan Koe", tag:"AI 時代", color:"#4A9E96", en:"Three types of people in the AI era. The resisters, who build their identity around the old way. The watchers, who believe the trend will pass. The curious, who experiment without knowing where it leads. History has always rewarded the third group — not because they were smarter, but because they were willing to be temporarily lost.", zh:"AI 時代有三種人：抗拒者，把身份認同建立在舊方式上；觀望者，相信趨勢會過去；好奇者，在不知道終點的情況下持續實驗。歷史永遠獎勵第三種人——不是因為他們更聰明，而是因為他們願意暫時迷路。" },
  { id:"d5", channel:"Dan Koe", tag:"意義", color:"#4A9E96", en:"When machines can generate anything, the question becomes: who decides what's worth generating? Taste, curiosity, and the willingness to struggle toward something uncertain — these are now the scarcest inputs in the economy. And they can't be automated.", zh:"當機器可以生成任何東西，問題就變成：誰來決定什麼值得被生成？品味、好奇心，以及願意朝著不確定的事物掙扎前進——這些現在是經濟中最稀缺的投入，而且無法被自動化。" },
  { id:"d6", channel:"Dan Koe", tag:"寫作", color:"#4A9E96", en:"Writing isn't content production. It's thinking made visible. The discipline of finishing a sentence forces you to commit to an idea — to discover whether you actually believe it or just assumed you did. Most people avoid writing because they're afraid of what they'll find.", zh:"寫作不是內容生產，而是把思考變得可見。完成一個句子的紀律迫使你對一個想法表態——讓你發現你究竟真的相信它，還是只是以為自己相信。大多數人逃避寫作，是因為害怕自己會發現什麼。" },
  { id:"d7", channel:"Dan Koe", tag:"注意力", color:"#4A9E96", en:"Attention is the one resource you can't earn back. You can make more money. You can't make more time. And even within the time you have, most of it is spent in a state that produces nothing worth keeping. Guard your focus the way you'd guard your last hour.", zh:"注意力是唯一無法賺回來的資源。你可以賺更多錢，但無法製造更多時間。而且即使在你擁有的時間裡，大多數時候你都處於一種什麼值錢的東西都生產不出來的狀態。保護你的專注力，就像保護你最後一個小時一樣。" },
  { id:"d8", channel:"Dan Koe", tag:"生產力", color:"#4A9E96", en:"The productivity trap is real. You optimize your system. You color-code your calendar. You measure your output. And somewhere in all of that, you lose track of what the output was supposed to be for. Efficiency in service of the wrong goal is just a faster way to arrive at the wrong place.", zh:"生產力陷阱是真實存在的。你優化系統，用顏色區分行事曆，測量產出。在這一切之中，你不知不覺忘了這些產出究竟是為了什麼。在錯誤目標上的效率，只是更快抵達錯誤地方的方式。" },
  { id:"d9", channel:"Dan Koe", tag:"身份", color:"#4A9E96", en:"You don't have a brand problem. You have an identity problem. The people who build audiences aren't performing — they're clarifying. They've done the uncomfortable work of deciding who they actually are, and then said it out loud, repeatedly, until the right people heard.", zh:"你沒有品牌問題，你有身份問題。那些能吸引受眾的人不是在表演——他們是在釐清自己。他們做了不舒服的功課，決定自己究竟是誰，然後大聲說出來，反覆說，直到對的人聽見。" },
  { id:"d10", channel:"Dan Koe", tag:"槓桿", color:"#4A9E96", en:"The difference between a freelancer and a business owner is leverage. The freelancer gets paid for hours. The business owner builds systems that pay without the hours. The gap between these two is not talent — it's the willingness to stop trading time and start building assets.", zh:"自由工作者和企業主之間的差距是槓桿。自由工作者用小時換錢，企業主建立的系統在沒有小時投入的情況下繼續付錢。這兩者之間的差距不是才能，而是停止用時間換錢、開始建立資產的意願。" },
];

const NEWS_CARDS = [
  { id:"news_0", channel:"世界新聞", tag:"財經", color:"#C0604A", en:"Brent crude has surged 50% to $109.77 a barrel since the Iran war broke out on Feb 28, with Trump's 8 PM Tuesday deadline to reopen the Strait of Hormuz keeping markets on a knife's edge. Analysts warn oil could hit $150 if the strait stays closed, though futures are pricing in a ceasefire that would bring Brent back to $90 by August.", zh:"川普對伊朗發出最後通牒，要求在4月7日晚間8點前重新開放荷莫茲海峽，否則將轟炸伊朗的橋樑與發電廠。布倫特原油飆升至每桶109.77美元，較2月28日開戰以來上漲約50%；美國汽油均價已從戰前的2.98美元升至4.11美元。分析師警告，若海峽持續關閉，油價可能在數週內衝上150美元。", url:"https://www.cnbc.com/2026/04/06/trump-iran-deadline-investors-markets-trade-deal-war-.html" },
  { id:"news_1", channel:"世界新聞", tag:"財經", color:"#C0604A", en:"Powell's Fed is stuck in a holding pattern at 3.50%-3.75% as energy-driven inflation from the Iran war blocks any rate cuts before late 2026. His term expires May 15, and Trump's nominee Kevin Warsh remains stalled in Senate confirmation.", zh:"聯準會維持利率在3.50%-3.75%不變，主席鮑威爾表示將以「臨時主席」身份留任至繼任者獲確認為止，其任期將於5月15日届滿。川普提名的鷹派人選Warsh在參議院遇阻，能源通膨高企讓降息窗口持續延後。", url:"https://www.cnbc.com/2026/03/18/powell-says-he-will-stay-on-as-head-of-the-fed-until-warsh-is-confirmed.html" },

const BOOK_CARDS = [...NAVAL_CARDS, ...ELON_CARDS, ...DAN_CARDS];
const TODAY_CARDS = [...NEWS_CARDS, ...SOCIAL_CARDS];
const TABS = ["Today", "Bookshelf"];
const TODAY_SUBS = ["全部", "世界新聞", "社交雷達"];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDateString() {
  return new Date().toLocaleDateString("en-US", { month:"long", day:"numeric", year:"numeric" }).toUpperCase();
}

function FeedItem({ card, index }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <div className="feed-item" onClick={() => setExpanded(!expanded)} style={{ animationDelay:`${Math.min(index * 0.06, 0.6)}s` }}>
      <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"20px" }}>
        <span style={{ display:"inline-block", width:"18px", height:"1px", background:card.color, flexShrink:0 }} />
        <span style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.18em", textTransform:"uppercase", color:card.color, opacity:0.9 }}>{card.channel}</span>
        <span style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.18em", textTransform:"uppercase", color:"var(--text-tertiary)" }}>{card.tag}</span>
      </div>
      <p style={{ fontFamily:"Georgia,'Times New Roman',serif", fontSize:"19px", lineHeight:1.76, color:"var(--text)", margin:0, maxWidth:"54ch", letterSpacing:"-0.01em" }}>{card.en}</p>
      <div style={{ overflow:"hidden", maxHeight:expanded?"400px":"0px", transition:"max-height 0.45s cubic-bezier(0.4,0,0.2,1)" }}>
        <div style={{ marginTop:"24px", paddingTop:"22px", borderTop:"1px solid var(--divider)" }}>
          <p style={{ fontFamily:"system-ui,-apple-system,'PingFang TC',sans-serif", fontSize:"14px", lineHeight:1.95, color:"var(--text-secondary)", margin:0, maxWidth:"48ch", fontWeight:300 }}>{card.zh}</p>
        </div>
      </div>
      <div className="expand-row">
        <span style={{ fontFamily:"'Courier New',monospace", fontSize:"9px", letterSpacing:"0.14em", textTransform:"uppercase", color:"var(--text-tertiary)" }}>{expanded ? "close ↑" : "中文 ↓"}</span>
        {card.url && (<a href={card.url} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} className="source-link">source ↗</a>)}
      </div>
    </div>
  );
}

function ThemeToggle() {
  const [dark, setDark] = useState(false);
  const toggle = () => { const next = !dark; setDark(next); document.body.setAttribute("data-theme", next ? "dark" : "light"); };
  return <button className="theme-toggle" onClick={toggle}>{dark ? "○" : "●"}</button>;
}

function App() {
  const [activeTab, setActiveTab] = useState("Today");
  const [todaySub, setTodaySub] = useState("全部");
  const [bookSeed, setBookSeed] = useState(0);
  const shuffledBooks = useMemo(() => shuffle(BOOK_CARDS).slice(0, 8), [bookSeed]);
  const cards = useMemo(() => {
    if (activeTab === "Bookshelf") return shuffledBooks;
    if (todaySub === "世界新聞") return NEWS_CARDS;
    if (todaySub === "社交雷達") return SOCIAL_CARDS;
    return TODAY_CARDS;
  }, [activeTab, todaySub, shuffledBooks]);

  return (
    <div style={{ maxWidth:"680px", margin:"0 auto", minHeight:"100vh" }}>
      <ThemeToggle />
      <div style={{ position:"sticky", top:0, zIndex:10, background:"var(--bg)", paddingTop:"36px" }}>
        <div style={{ padding:"0 32px", marginBottom:"28px" }}>
          <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", marginBottom:"6px" }}>
            <h1 className="masthead-title" style={{ fontSize:"42px" }}>Mo's Feed</h1>
            <span className="running-header" style={{ paddingBottom:"8px" }}>{getDateString()}</span>
          </div>
          <div className="rule" />
        </div>
        <div className="tab-nav">
          {TABS.map(tab => {
            const isActive = activeTab === tab;
            return (
              <button key={tab} onClick={() => { setActiveTab(tab); if (tab !== "Today") setTodaySub("全部"); }}
                style={{ fontSize:isActive?"26px":"15px", fontWeight:isActive?600:400, fontStyle:isActive?"normal":"italic", color:isActive?"var(--text)":"var(--text-tertiary)", letterSpacing:isActive?"-0.01em":"0" }}>
                {tab}
              </button>
            );
          })}
        </div>
        {activeTab === "Today" && (
          <div style={{ display:"flex", gap:"20px", padding:"14px 32px 0" }}>
            {TODAY_SUBS.map(sub => (
              <button key={sub} className="sub-pill" onClick={() => setTodaySub(sub)}
                style={{ color:todaySub===sub?"var(--text-secondary)":"var(--text-tertiary)", borderBottomColor:todaySub===sub?"var(--text-secondary)":"transparent", opacity:todaySub===sub?1:0.6 }}>
                {sub}
              </button>
            ))}
          </div>
        )}
        <div style={{ padding:"0 32px", marginTop:"20px" }}><div className="rule" /></div>
      </div>
      <div style={{ padding:"52px 32px 80px" }}>
        {cards.map((card, i) => <FeedItem key={card.id + "-" + bookSeed} card={card} index={i} />)}
        {activeTab === "Bookshelf" && (
          <button className="refresh-btn" onClick={() => setBookSeed(s => s + 1)}>↻ Shuffle</button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
