<link rel="apple-touch-icon" href="apple-touch-icon.png" />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f1ea;
    --bg-elevated: #ede9e1;
    --text: #1c1a17;
    --text-secondary: #8a8680;
    --text-tertiary: #b8b4ae;
    --divider: #ddd9d1;
    --noise-opacity: 0.035;
  }

  [data-theme="dark"] {
    --bg: #0f0e0c;
    --bg-elevated: #161410;
    --text: #e8e4dc;
    --text-secondary: #5a5650;
    --text-tertiary: #383430;
    --divider: #242018;
    --noise-opacity: 0.06;
  }

  body {
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    font-family: Georgia, 'Times New Roman', serif;
    transition: background 0.4s ease, color 0.4s ease;
    position: relative;
  }

  /* Paper texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: var(--noise-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 180px 180px;
  }

  /* All content above texture */
  #root { position: relative; z-index: 1; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 4px; }

  /* Masthead */
  .masthead-title {
    font-family: Georgia, serif;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
  }

  /* Tab navigation — editorial style */
  .tab-nav {
    display: flex;
    align-items: baseline;
    gap: 28px;
    padding: 0 32px;
  }
  .tab-nav button {
    background: none;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: Georgia, serif;
    transition: all 0.3s ease;
    padding: 0;
    line-height: 1.2;
  }

  /* Sub-filter pills */
  .sub-pill {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 0;
    transition: all 0.2s ease;
    border-bottom: 1px solid transparent;
  }

  /* Feed item */
  .feed-item {
    padding: 0 0 52px 0;
    margin-bottom: 52px;
    border-bottom: 1px solid var(--divider);
    cursor: pointer;
    animation: fadeUp 0.5s ease both;
  }
  .feed-item:last-child {
    border-bottom: none;
  }

  /* Expand toggle */
  .expand-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 16px;
  }

  /* Source link */
  .source-link {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-decoration: none;
    border-bottom: 1px solid var(--divider);
    padding-bottom: 1px;
    transition: all 0.2s ease;
    color: var(--text-tertiary);
  }
  .source-link:hover {
    color: var(--text-secondary);
    border-color: var(--text-secondary);
  }

  /* Refresh button */
  .refresh-btn {
    display: block;
    margin: 0 auto 60px;
    padding: 10px 24px;
    background: none;
    border: 1px solid var(--divider);
    color: var(--text-tertiary);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .refresh-btn:hover {
    border-color: var(--text-secondary);
    color: var(--text-secondary);
  }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: 28px;
    right: 28px;
    z-index: 100;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    color: var(--text-tertiary);
    padding: 4px;
    line-height: 1;
    transition: color 0.3s ease;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.05em;
  }
  .theme-toggle:hover { color: var(--text-secondary); }

  /* Divider rule */
  .rule { height: 1px; background: var(--divider); }

  /* Running header — issue info */
  .running-header {
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
</style>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── Date string ───────────────────────────────────────────
function getDateString() {
  const now = new Date();
  return now.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }).toUpperCase();
}

// ─── Theme Toggle ──────────────────────────────────────────
function ThemeToggle() {
  const [dark, setDark] = useState(false);
  const toggle = () => {
    const next = !dark;
    setDark(next);
    document.body.setAttribute("data-theme", next ? "dark" : "light");
  };
  return (
    <button className="theme-toggle" onClick={toggle}>
      {dark ? "○" : "●"}
    </button>
  );
}

              Mo's Feed
            </h1>
            <span className="running-header" style={{ paddingBottom: "8px" }}>
              {dateStr}
            </span>
          </div>
          <div className="rule" />
        </div>

        {/* Tab nav */}
        <div className="tab-nav" style={{ marginBottom: "0" }}>
          {TABS.map(tab => {
            const isActive = activeTab === tab;
            return (
              <button
                key={tab}
                onClick={() => { setActiveTab(tab); if (tab !== "Today") setTodaySub("全部"); }}
                style={{
                  fontSize: isActive ? "26px" : "15px",
                  fontWeight: isActive ? 600 : 400,
                  fontStyle: isActive ? "normal" : "italic",
                  color: isActive ? "var(--text)" : "var(--text-tertiary)",
                  letterSpacing: isActive ? "-0.01em" : "0",
                }}
              >
                {tab}
              </button>
            );
          })}
        </div>

        {/* Sub-filters */}
        {activeTab === "Today" && (
          <div style={{
            display: "flex",
            gap: "20px",
            padding: "14px 32px 0",
          }}>
            {TODAY_SUBS.map(sub => (
              <button
                key={sub}
                className="sub-pill"
                onClick={() => setTodaySub(sub)}
                style={{
                  color: todaySub === sub ? "var(--text-secondary)" : "var(--text-tertiary)",
                  borderBottomColor: todaySub === sub ? "var(--text-secondary)" : "transparent",
                  opacity: todaySub === sub ? 1 : 0.6,
                }}
              >
                {sub}
              </button>
            ))}
          </div>
        )}

        {/* Bottom rule */}
        <div style={{ padding: "0 32px", marginTop: "20px" }}>
          <div className="rule" />
        </div>
      </div>

      {/* Feed */}
      <div style={{ padding: "52px 32px 80px" }}>
        {cards.length === 0 && (
          <p style={{
            fontFamily: "'Courier New', monospace",
            fontSize: "11px",
            color: "var(--text-tertiary)",
            letterSpacing: "0.1em",
          }}>
            No entries.
          </p>
        )}

        {cards.map((card, i) => (
          <FeedItem key={card.id + "-" + bookSeed} card={card} index={i} />
        ))}

        {activeTab === "Bookshelf" && (
          <button className="refresh-btn" onClick={() => setBookSeed(s => s + 1)}>
            ↻ Shuffle
          </button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
