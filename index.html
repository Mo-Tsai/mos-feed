const TABS = ["Bookshelf", "Today"];

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── Components ──────────────────────────────────────────
function TabNav({ active, onChange }) {
  return (
    <div className="tab-nav">
      {TABS.map(tab => {
        const isActive = active === tab;
        return (
          <button
            key={tab}
            onClick={() => onChange(tab)}
            style={{
              fontSize: isActive ? "28px" : "16px",
              fontWeight: isActive ? 600 : 400,
              color: "var(--text)",
              opacity: isActive ? 1 : 0.3,
              lineHeight: 1.2,
            }}
          >
            {tab}
          </button>
        );
      })}
    </div>
  );
}

// ─── Theme Toggle ────────────────────────────────────────
function ThemeToggle() {
  const [dark, setDark] = useState(false);
  const toggle = () => {
    const next = !dark;
    setDark(next);
    document.body.setAttribute("data-theme", next ? "dark" : "light");
  };
  return (
    <button onClick={toggle} style={{
      position: "fixed",
      top: "20px",
      right: "20px",
      zIndex: 100,
      background: "none",
      border: "none",
      cursor: "pointer",
      fontSize: "18px",
      color: "var(--text-secondary)",
      padding: "4px",
      lineHeight: 1,
      transition: "color 0.3s ease",
    }}>
      {dark ? "☽" : "☀︎"}
    </button>
  );
}

        )}
        {cards.map((card, i) => <FeedItem key={card.id + "-" + bookSeed} card={card} index={i} />)}

        {/* Refresh button for Bookshelf */}
        {activeTab === "Bookshelf" && (
          <button className="refresh-btn" onClick={() => setBookSeed(s => s + 1)}>
            ↻ REFRESH
          </button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
